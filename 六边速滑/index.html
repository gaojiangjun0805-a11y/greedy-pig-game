<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>六边速滑</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffef79;
      --panel: rgba(255, 255, 255, .9);
      --panel-strong: rgba(255, 255, 255, .96);
      --line: #ff941c;
      --line-soft: rgba(247, 183, 51, .32);
      --red: #f83f7c;
      --ice: #2ec7ff;
      --mint: #28c76f;
      --amber: #ffc857;
      --text: #243456;
      --muted: #61708b;
      --danger: #ff6377;
      --pink: #ff9ac9;
      --lavender: #bba7ff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100dvh;
      overflow-x: hidden;
      color: var(--text);
      font-family: "PingFang SC", "Microsoft YaHei", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(115deg, transparent 0 10%, rgba(255, 71, 142, .26) 10% 18%, transparent 18% 30%, rgba(30, 194, 255, .26) 30% 39%, transparent 39% 62%, rgba(255, 170, 32, .30) 62% 72%, transparent 72%),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, .44) 0 9px, transparent 9px 28px),
        linear-gradient(150deg, #ffe966 0%, #7fe6ff 45%, #ffc0e6 100%),
        var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .48;
      background-image:
        linear-gradient(45deg, transparent 0 47%, rgba(255, 61, 135, .34) 47% 53%, transparent 53%),
        linear-gradient(-45deg, transparent 0 47%, rgba(28, 187, 255, .30) 47% 53%, transparent 53%),
        repeating-linear-gradient(90deg, transparent 0 54px, rgba(255, 255, 255, .38) 54px 58px);
      background-size: 44px 44px, 52px 52px, 120px 100%;
      mask-image: linear-gradient(90deg, transparent, black 7%, black 93%, transparent);
    }

    #stars {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: .86;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(1280px, 100%);
      min-height: 100dvh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(232px, 280px) minmax(0, 1fr) minmax(218px, 260px);
      gap: 16px;
      padding: 18px;
      align-items: center;
    }

    .app::before {
      content: "";
      position: fixed;
      inset: auto -6vw 4vh -6vw;
      height: 24vh;
      pointer-events: none;
      background:
        repeating-linear-gradient(110deg, rgba(255, 255, 255, .36) 0 18px, transparent 18px 42px),
        linear-gradient(90deg, rgba(255, 115, 177, .28), rgba(46, 199, 255, .26), rgba(255, 199, 87, .30));
      transform: rotate(-3deg);
      border-top: 4px solid rgba(255, 255, 255, .44);
      border-bottom: 4px solid rgba(255, 255, 255, .34);
    }

    .panel {
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, .92);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.78)),
        repeating-linear-gradient(135deg, rgba(255, 91, 155, .18) 0 9px, transparent 9px 20px),
        linear-gradient(90deg, rgba(255, 217, 74, .30), rgba(86, 222, 255, .24));
      box-shadow: 0 18px 46px rgba(94, 128, 170, .25), 0 7px 0 rgba(255, 145, 54, .25), inset 0 1px 0 rgba(255, 255, 255, .95);
      backdrop-filter: blur(14px);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 7px;
      background: linear-gradient(90deg, #ff4f93, #ffc857 30%, #27c9ff 64%, #9c80ff);
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    .left {
      align-self: center;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 15px;
    }

    .brand {
      padding-bottom: 4px;
      border-bottom: 2px dashed rgba(255, 154, 201, .38);
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1;
      letter-spacing: 0;
      background: linear-gradient(90deg, #ff3d87, #ff9f1c 45%, #20c7ff 78%, #7b61ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255, 255, 255, .82);
      filter: drop-shadow(0 4px 0 rgba(255,255,255,.95)) drop-shadow(0 12px 14px rgba(255, 61, 135, .34));
    }

    .tagline {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      min-height: 72px;
      padding: 11px 12px;
      border: 1px solid rgba(92, 216, 255, .28);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .98), rgba(220, 248, 255, .84)),
        linear-gradient(90deg, rgba(255, 91, 155, .24), rgba(255, 205, 77, .20));
      box-shadow: inset 0 -4px 0 rgba(46, 199, 255, .18), 0 5px 0 rgba(255, 255, 255, .48);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 7px;
      color: var(--text);
      font-size: 25px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .controls,
    .segmented {
      display: grid;
      gap: 8px;
    }

    .controls {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .segmented {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      padding: 4px;
      border: 1px solid rgba(255, 154, 201, .26);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,236,249,.7));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.7), 0 10px 20px rgba(95,125,155,.12);
    }

    button {
      appearance: none;
      min-height: 42px;
      border: 1px solid rgba(76, 174, 224, .26);
      border-radius: 8px;
      color: var(--text);
      background: linear-gradient(180deg, #ffffff, #c9f2ff);
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .12s ease, border-color .16s ease, background .16s ease, opacity .16s ease;
      box-shadow: 0 7px 0 rgba(68, 129, 168, .18), 0 12px 20px rgba(91, 139, 182, .16), inset 0 1px 0 rgba(255, 255, 255, .95);
    }

    button:hover {
      border-color: rgba(255, 154, 201, .7);
      background: linear-gradient(180deg, #fff, #ffeaf4);
    }

    button:active {
      transform: translateY(1px) scale(.98);
    }

    button:disabled {
      cursor: default;
      opacity: .42;
      transform: none;
    }

    .primary {
      color: #071018;
      border-color: rgba(255, 193, 82, .92);
      background: linear-gradient(180deg, #fff089, #ffbc35 62%, #ff9f1c);
      box-shadow: 0 7px 0 rgba(214, 123, 18, .28), 0 14px 24px rgba(255, 184, 66, .28), inset 0 1px 0 rgba(255, 255, 255, .75);
    }

    .controls button:nth-child(2) {
      background: linear-gradient(180deg, #eff9ff, #aeefff);
      border-color: rgba(46, 199, 255, .46);
    }

    .controls button:nth-child(4) {
      background: linear-gradient(180deg, #f7f1ff, #d9ccff);
      border-color: rgba(123, 97, 255, .32);
    }

    .controls button:nth-child(5) {
      background: linear-gradient(180deg, #fff5fb, #ffcbe2);
      border-color: rgba(255, 77, 135, .34);
    }

    .controls button:nth-child(7) {
      background: linear-gradient(180deg, #ffffff, #e6eaff);
      border-color: rgba(123, 97, 255, .24);
    }

    .music-on {
      border-color: rgba(255, 205, 86, .58);
      background: linear-gradient(180deg, #fff0be, #d7963a);
      color: #3a1808;
    }

    .segmented button {
      min-height: 34px;
      border-color: transparent;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
    }

    .segmented button.active {
      color: #08111a;
      background: linear-gradient(180deg, #9af6ff, #34d0ff 70%, #24aee8);
      box-shadow: 0 4px 0 rgba(29, 136, 190, .2), inset 0 1px 0 rgba(255,255,255,.78);
    }

    .stage {
      position: relative;
      display: grid;
      place-items: center;
      min-width: 0;
      min-height: 0;
    }

    .board-frame {
      position: relative;
      width: min(78vh, 68vw, 760px);
      min-width: 350px;
      aspect-ratio: 1.16 / 1;
      display: grid;
      place-items: center;
      border: 3px solid rgba(255, 255, 255, .95);
      border-radius: 8px;
      background:
        linear-gradient(115deg, rgba(255,255,255,.0) 0 22%, rgba(255,255,255,.68) 22% 24%, rgba(255,255,255,.0) 24% 48%, rgba(255,255,255,.60) 48% 50%, rgba(255,255,255,.0) 50%),
        repeating-linear-gradient(0deg, rgba(46, 199, 255, .14) 0 13px, rgba(255, 255, 255, .10) 13px 28px),
        linear-gradient(155deg, #fff7cf, #c5f4ff 45%, #ffd7ec);
      box-shadow:
        inset 0 0 0 3px rgba(103, 219, 255, .38),
        inset 0 -12px 30px rgba(48, 195, 255, .12),
        0 0 0 5px rgba(255, 175, 41, .42),
        0 12px 0 rgba(81, 146, 185, .16),
        0 26px 70px rgba(93, 136, 178, .30);
      overflow: hidden;
    }

    .board-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(120deg, transparent 0 34px, rgba(255, 154, 201, .16) 34px 38px, transparent 38px 76px),
        repeating-linear-gradient(30deg, transparent 0 42px, rgba(255, 199, 87, .14) 42px 46px, transparent 46px 86px);
    }

    .board-frame::after {
      content: "";
      position: absolute;
      inset: 12px;
      pointer-events: none;
      border: 2px dashed rgba(46, 199, 255, .26);
      border-radius: 8px;
      box-shadow: inset 0 0 26px rgba(255, 255, 255, .72);
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .outer-hex {
      fill: rgba(255, 250, 221, .56);
      stroke: rgba(255, 150, 26, .72);
      stroke-width: 2.2;
      vector-effect: non-scaling-stroke;
    }

    .slot {
      fill: rgba(255, 255, 255, .58);
      stroke: rgba(255, 148, 28, .98);
      stroke-width: 2.35;
      vector-effect: non-scaling-stroke;
    }

    .slot.goal-empty {
      fill: rgba(46, 199, 255, .17);
      stroke-dasharray: 5 5;
    }

    .empty-marker {
      fill: rgba(46, 199, 255, .22);
      stroke: rgba(30, 172, 228, .92);
      stroke-width: 3;
      stroke-dasharray: 7 5;
      vector-effect: non-scaling-stroke;
      filter: drop-shadow(0 0 12px rgba(46, 199, 255, .58));
    }

    .tile {
      cursor: default;
      outline: none;
    }

    .tile polygon {
      fill: url(#tileFill);
      stroke: rgba(255, 255, 255, .95);
      stroke-width: 3.05;
      vector-effect: non-scaling-stroke;
      filter: drop-shadow(0 6px 0 rgba(255, 157, 58, .22)) drop-shadow(0 11px 15px rgba(109, 131, 155, .24));
      transition: fill .16s ease, stroke .16s ease, filter .16s ease, opacity .16s ease;
    }

    .tile.tone-0 polygon,
    .tile.tone-1 polygon,
    .tile.tone-2 polygon,
    .tile.tone-3 polygon { fill: url(#tileFill); }

    .tile text {
      pointer-events: none;
      fill: #fb2f7d;
      font-size: 33px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: central;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, .92);
      stroke-width: 5px;
      stroke-linejoin: round;
      font-variant-numeric: tabular-nums;
    }

    .tile.movable {
      cursor: pointer;
    }

    .tile.movable polygon {
      fill: url(#moveFill);
      stroke: rgba(30, 183, 255, .98);
      filter: drop-shadow(0 0 14px rgba(46, 199, 255, .64)) drop-shadow(0 7px 0 rgba(30, 183, 255, .16)) drop-shadow(0 11px 15px rgba(109, 131, 155, .22));
    }

    .tile.correct polygon {
      fill: url(#correctFill);
      stroke: rgba(255, 205, 86, .95);
      filter: drop-shadow(0 0 15px rgba(244, 188, 89, .58)) drop-shadow(0 7px 0 rgba(169, 104, 28, .18)) drop-shadow(0 11px 15px rgba(109, 131, 155, .18));
    }

    .tile.correct text {
      fill: #7a350d;
      stroke: #fff1c9;
    }

    .tile.hint polygon {
      animation: hintPulse .72s ease-in-out 2;
    }

    .tile.bump polygon {
      animation: bump .22s ease;
    }

    @keyframes hintPulse {
      50% {
        stroke: #ff6aa2;
        filter: drop-shadow(0 0 20px rgba(255, 106, 162, .54));
      }
    }

    @keyframes bump {
      35% { opacity: .45; }
      70% { opacity: 1; }
    }

    #toast {
      position: absolute;
      left: 50%;
      bottom: 18px;
      min-height: 32px;
      max-width: min(86%, 430px);
      transform: translateX(-50%) translateY(14px);
      opacity: 0;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, .72);
      border-radius: 8px;
      background: rgba(255, 255, 255, .86);
      color: #34526f;
      font-size: 13px;
      text-align: center;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      backdrop-filter: blur(10px);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .target {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      color: #ff6aa2;
      font-size: 17px;
      font-weight: 900;
    }

    .panel-title small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .target-board {
      width: 100%;
      aspect-ratio: 1.16 / 1;
      border: 1px solid rgba(92, 216, 255, .24);
      border-radius: 8px;
      background:
        repeating-linear-gradient(135deg, rgba(255, 200, 87, .14) 0 8px, transparent 8px 19px),
        linear-gradient(180deg, rgba(255, 255, 255, .78), rgba(223, 248, 255, .62));
      box-shadow: inset 0 -4px 0 rgba(46, 199, 255, .10);
    }

    .target-board .slot {
      fill: rgba(255, 253, 238, .52);
      stroke-width: 1.4;
    }

    .target-board text {
      fill: var(--red);
      font-size: 25px;
      font-weight: 900;
      text-anchor: middle;
      dominant-baseline: central;
      paint-order: stroke;
      stroke: rgba(255, 255, 255, .94);
      stroke-width: 3px;
    }

    .fineprint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
      margin: 0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(176, 219, 246, .38);
      backdrop-filter: blur(10px);
    }

    .overlay.show {
      display: grid;
    }

    .win-card {
      width: min(92vw, 430px);
      border: 2px solid rgba(255, 255, 255, .82);
      border-radius: 8px;
      background: var(--panel-strong);
      box-shadow: 0 28px 90px rgba(98, 132, 174, .32);
      padding: 22px;
      text-align: center;
    }

    .win-card h2 {
      margin: 0 0 8px;
      color: #ff6aa2;
      font-size: 30px;
      line-height: 1.1;
    }

    .win-card p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.7;
    }

    .win-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .win-stats div {
      padding: 11px 8px;
      border: 1px solid rgba(92, 216, 255, .22);
      border-radius: 8px;
      background: rgba(255, 255, 255, .72);
      color: var(--muted);
      font-size: 12px;
    }

    .win-stats b {
      display: block;
      margin-top: 5px;
      color: var(--text);
      font-size: 22px;
      font-variant-numeric: tabular-nums;
    }

    .win-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .left,
      .target {
        align-self: auto;
      }

      .left {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(240px, 330px);
        align-items: start;
      }

      .brand {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .metrics {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-column: 1 / -1;
      }

      .controls,
      .segmented {
        grid-column: 1 / -1;
      }

      .board-frame {
        width: min(96vw, 720px);
        min-width: 0;
      }

      .target {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(180px, 240px);
        align-items: center;
      }

      .target button,
      .fineprint {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 10px;
        gap: 10px;
      }

      .left {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      h1 {
        font-size: 34px;
      }

      .metrics {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .metric {
        min-height: 54px;
        padding: 8px 7px;
      }

      .metric span {
        font-size: 11px;
      }

      .metric strong {
        font-size: 19px;
      }

      .board-frame {
        width: 100%;
        aspect-ratio: 1.04 / 1;
      }

      .target {
        grid-template-columns: 1fr;
      }

      .target-board {
        max-width: 360px;
        justify-self: center;
      }
    }

    /* Solid wood edition */
    :root {
      --bg: #6b391b;
      --panel: rgba(62, 31, 13, .9);
      --panel-strong: #f4dfbf;
      --line: #e9bd72;
      --red: #d72f2e;
      --ice: #c9904a;
      --mint: #d6a24a;
      --amber: #e4a84b;
      --text: #f8e6c7;
      --muted: #d6b782;
      --dark: #251006;
      --wood-a: #9f6230;
      --wood-b: #6b391b;
      --wood-c: #c9823e;
      --brass: #e6ba65;
      --ivory: #f7e5c3;
    }

    body {
      color: var(--text);
      background:
        repeating-linear-gradient(92deg, rgba(255, 229, 173, .08) 0 2px, transparent 2px 16px),
        repeating-linear-gradient(87deg, transparent 0 26px, rgba(37, 16, 6, .18) 26px 31px, transparent 31px 62px),
        linear-gradient(90deg, #4b2410 0%, #8d552b 22%, #b76f35 46%, #7a431f 70%, #3d1b0c 100%);
    }

    body::before {
      opacity: .65;
      background-image:
        repeating-linear-gradient(96deg, rgba(255, 235, 185, .09) 0 1px, transparent 1px 12px),
        linear-gradient(90deg, rgba(36, 13, 4, .20), transparent 24%, rgba(255, 224, 156, .08) 48%, transparent 72%, rgba(28, 10, 3, .18));
      background-size: 100% 100%, 100% 100%;
      mix-blend-mode: multiply;
      mask-image: none;
    }

    #stars {
      opacity: .18;
      filter: sepia(1) saturate(.75);
    }

    .app {
      width: min(1180px, 100%);
      min-height: 100dvh;
      display: block;
      padding: 12px;
    }

    .app::before {
      inset: auto -8vw -4vh -8vw;
      height: 20vh;
      background:
        repeating-linear-gradient(88deg, rgba(255, 232, 171, .10) 0 3px, transparent 3px 21px),
        linear-gradient(90deg, rgba(38, 15, 6, .34), rgba(145, 82, 37, .36), rgba(38, 15, 6, .36));
      border-top: 3px solid rgba(245, 201, 128, .26);
      border-bottom: 0;
      transform: none;
    }

    .game-cabinet {
      position: relative;
      z-index: 1;
      min-height: calc(100dvh - 24px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      align-items: center;
      justify-items: center;
      gap: 10px;
    }

    .top-title {
      width: min(980px, 100%);
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 14px;
      padding: 8px 14px;
      border: 1px solid rgba(238, 188, 102, .58);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(122, 66, 29, .94), rgba(58, 27, 11, .94)),
        repeating-linear-gradient(95deg, rgba(255, 225, 154, .16) 0 2px, transparent 2px 15px);
      box-shadow: inset 0 1px 0 rgba(255, 236, 185, .24), inset 0 -4px 0 rgba(33, 13, 5, .28), 0 12px 28px rgba(26, 9, 2, .28);
    }

    .eyebrow {
      margin: 0;
      color: #dca85c;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .top-title h1,
    .start-card h2 {
      margin: 0;
      color: #ffe3a9;
      background: none;
      -webkit-background-clip: initial;
      background-clip: initial;

<body>
<canvas id="stars" aria-hidden="true"></canvas>
<audio id="bgm" src="audio/bgm.mp3" loop preload="auto"></audio>

<div class="app">
  <main class="game-cabinet">
    <header class="top-title">
      <p class="eyebrow">wood edition</p>
      <h1>六边速滑</h1>
      <p class="tagline">1-22 归位，空位在最后</p>
    </header>

    <section class="stage">
      <div class="board-frame">
        <svg id="board" role="img" aria-label="六边速滑盘面"></svg>
        <div id="toast" aria-live="polite"></div>
      </div>
    </section>

    <section class="panel control-deck">
      <div class="metrics">
        <div class="metric"><span>步数</span><strong id="moves">0</strong></div>
        <div class="metric"><span>用时</span><strong id="time">00:00</strong></div>
        <div class="metric"><span>可滑</span><strong id="lanes">0</strong></div>
        <div class="metric"><span>最佳</span><strong id="best">--</strong></div>
      </div>

      <div class="controls">
        <button class="primary" id="newGame" title="新局">↻ 新局</button>
        <button id="example" title="载入题面">▦ 题面</button>
        <button id="undo" title="撤销" disabled>↶ 撤销</button>
        <button id="reset" title="复位">↺ 复位</button>
        <button id="hint" title="提示">◇ 提示</button>
        <button id="music" title="音乐开关">♫ 音乐</button>
        <button id="targetFocus" title="目标">◎ 目标</button>
      </div>

      <div class="segmented" aria-label="新局难度">
        <button data-depth="48">短道</button>
        <button class="active" data-depth="92">标准</button>
        <button data-depth="150">长道</button>
      </div>

      <aside class="target" id="targetPanel">
        <div class="panel-title">目标 <small>空位在末位</small></div>
        <svg class="target-board" id="targetBoard" aria-label="目标盘面"></svg>
        <p class="fineprint">点击可滑三角块，整段会沿物理滑道滑入连续空位；三角块不会翻转。</p>
        <button id="loadGoal" title="直接查看完成态">完成态</button>
      </aside>
    </section>
  </main>
</div>

<div class="start-screen show" id="start">
  <div class="start-card">
    <p class="eyebrow">game start</p>
    <div class="game-logo">G-Game</div>
    <h2>六边速滑</h2>
    <div class="start-mark" aria-hidden="true"></div>
    <p>实木盘面 · 物理滑道 · 数字归位</p>
    <button class="primary" id="startGame">开始游戏</button>
  </div>
</div>

<div class="overlay" id="win">
  <div class="win-card">
    <h2>复原完成</h2>
    <p id="winLine">所有数字已经回到 1-22 顺序。</p>
    <div class="win-stats">
      <div>步数<b id="winMoves">0</b></div>
      <div>用时<b id="winTime">00:00</b></div>
    </div>
    <div class="win-actions">
      <button id="again">再来一局</button>
      <button class="primary" id="closeWin">留在盘面</button>
    </div>
  </div>
</div>

<script>
(() => {

      makeLine(1.5, 3, h * 3),
      makeLine(2, 2, h * 4),
    ];

    function makeLine(start, segments, y) {
      return Array.from({ length: segments + 1 }, (_, i) => ({
        x: ox + (start + i) * u,
        y: oy + y
      }));
    }

    function withMeta(points, orient) {
      const center = points.reduce((acc, p) => ({ x: acc.x + p.x / 3, y: acc.y + p.y / 3 }), { x: 0, y: 0 });
      return { points, center, orient };
    }

    function expand(top, bottom) {
      const list = [];
      for (let i = 0; i < top.length; i++) {
        list.push(withMeta([bottom[i], bottom[i + 1], top[i]], "up"));
        if (i < top.length - 1) {
          list.push(withMeta([top[i], top[i + 1], bottom[i + 1]], "down"));
        }
      }
      return list;
    }

    function contract(top, bottom) {
      const list = [];
      for (let i = 0; i < bottom.length; i++) {
        list.push(withMeta([top[i], top[i + 1], bottom[i]], "down"));
        if (i < bottom.length - 1) {
          list.push(withMeta([bottom[i], bottom[i + 1], top[i + 1]], "up"));
        }
      }
      return list;
    }

    const band1 = expand(lines[0], lines[1]);
    const band2 = expand(lines[1], lines[2]);
    const band3 = contract(lines[2], lines[3]);
    const band4 = contract(lines[3], lines[4]);
    cells = band1.concat(band2, band3, band4);

    const allPoints = cells.flatMap(cell => cell.points);
    const minX = Math.min(...allPoints.map(p => p.x)) - 38;
    const minY = Math.min(...allPoints.map(p => p.y)) - 34;
    const maxX = Math.max(...allPoints.map(p => p.x)) + 38;
    const maxY = Math.max(...allPoints.map(p => p.y)) + 34;
    viewBox = `${minX} ${minY} ${maxX - minX} ${maxY - minY}`;

    buildSlideLanes();
  }

  function buildSlideLanes() {
    const s3 = Math.sqrt(3);
    const axes = [
      { dir: { x: 1, y: 0 }, normal: { x: 0, y: 1 } },
      { dir: { x: .5, y: s3 / 2 }, normal: { x: -s3 / 2, y: .5 } },
      { dir: { x: -.5, y: s3 / 2 }, normal: { x: s3 / 2, y: .5 } },
    ];
    slideLanes = [];
    const dot = (point, vec) => point.x * vec.x + point.y * vec.y;
    axes.forEach(axis => {
      const groups = new Map();
      cells.forEach((cell, idx) => {
        const projections = cell.points.map(point => dot(point, axis.normal));
        const mid = (Math.min(...projections) + Math.max(...projections)) / 2;
        const key = Math.round(mid * 1000);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(idx);
      });
      groups.forEach(indices => {
        if (indices.length > 1) {
          slideLanes.push(indices.slice().sort((a, b) => dot(cells[a].center, axis.dir) - dot(cells[b].center, axis.dir)));
        }
      });
    });
  }

  function pointString(points) {
    return points.map(p => `${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(" ");
  }

  function localPointString(pos, scale = .88) {
    const cell = cells[pos];
    return cell.points.map(p => {
      const x = (p.x - cell.center.x) * scale;
      const y = (p.y - cell.center.y) * scale;
      return `${x.toFixed(2)},${y.toFixed(2)}`;
    }).join(" ");
  }

  function buildBoard() {

    const defs = svgEl("defs");

      }));

    const emptyLayer = svgEl("g", { id: "emptyLayer" });
    els.board.appendChild(emptyLayer);

    const tileLayer = svgEl("g", { id: "tileLayer" });
    tileEls = new Map();
    for (let n = 1; n <= TILE_COUNT; n++) {
      const g = svgEl("g", {

      });

      g.append(poly, text);
      g.addEventListener("click", () => onTile(n));
      g.addEventListener("keydown", event => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();

        }
      });

  function buildTargetBoard() {
    els.targetBoard.innerHTML = "";
    els.targetBoard.setAttribute("viewBox", viewBox);

      }));
      const n = GOAL[idx];
      if (n !== EMPTY) {
        const text = svgEl("text", {

        });

      }

  }

  function layoutTiles(previousPositions = null) {
    const legal = new Set(legalMoves().map(move => move.tilePos));
    updateEmptyMarker();

    for (let n = 1; n <= TILE_COUNT; n++) {
      const pos = state.indexOf(n);
      const tile = tileEls.get(n);
      const cell = cells[pos];
      const was = previousPositions ? previousPositions[n] : pos;
      const oldCell = cells[was] || cell;
      const classes = ["tile", `tone-${(n - 1) % 4}`];
      if (legal.has(pos) && !won) classes.push("movable");
      if (pos === n - 1) classes.push("correct");
      tile.g.setAttribute("class", classes.join(" "));
      tile.poly.setAttribute("points", localPointString(pos));
      tile.g.setAttribute("transform", `translate(${cell.center.x.toFixed(2)} ${cell.center.y.toFixed(2)})`);
      if (previousPositions && was !== pos) {
        tile.g.animate([
          { transform: `translate(${oldCell.center.x}px, ${oldCell.center.y}px)` },
          { transform: `translate(${cell.center.x}px, ${cell.center.y}px)` }
        ], {
          duration: 185,
          easing: "cubic-bezier(.2,.9,.25,1)"
        });
      }
    }

    els.lanes.textContent = String(legal.size);
    els.undo.disabled = history.length === 0 || won;
  }

  function updateEmptyMarker() {
    const emptyLayer = els.board.querySelector("#emptyLayer");
    emptyLayer.innerHTML = "";
    state.forEach((value, idx) => {
      if (value !== EMPTY) return;
      emptyLayer.appendChild(svgEl("polygon", {
        class: "empty-marker",
        points: pointString(cells[idx].points)
      }));
    });
  }

  function positionsByTile() {
    const out = {};
    state.forEach((value, pos) => {
      if (value !== EMPTY) out[value] = pos;
    });
    return out;
  }

  function legalMoves() {
    const moves = [];
    const seen = new Set();
    slideLanes.forEach((lane, laneIndex) => {
      for (let pairAt = 0; pairAt < lane.length - 1; pairAt++) {
        if (state[lane[pairAt]] !== EMPTY || state[lane[pairAt + 1]] !== EMPTY) continue;

        for (let clicked = pairAt - 1; clicked >= 0 && state[lane[clicked]] !== EMPTY; clicked--) {
          addMove({ laneIndex, pairAt, clicked, delta: 2, tilePos: lane[clicked] });
        }

        for (let clicked = pairAt + 2; clicked < lane.length && state[lane[clicked]] !== EMPTY; clicked++) {
          addMove({ laneIndex, pairAt, clicked, delta: -2, tilePos: lane[clicked] });
        }
      }
    });
    return moves;

    function addMove(move) {
      const key = `${move.laneIndex}:${move.pairAt}:${move.clicked}:${move.delta}`;
      if (seen.has(key)) return;
      seen.add(key);
      moves.push(move);
    }
  }

  function moveForPos(pos) {
    return legalMoves()
      .filter(move => move.tilePos === pos)
      .sort((a, b) => Math.abs(a.pairAt - a.clicked) - Math.abs(b.pairAt - b.clicked))[0] || null;
  }

  function onTile(n) {
    if (won) return;
    startBgm();
    const pos = state.indexOf(n);
    const move = moveForPos(pos);
    if (!move) {
      bump(n);
      showToast("这块没有通向两个连续空位的物理滑道");
      playTone("bad");
      return;
    }
    if (!startedAt) startTimer();
    applyMove(move, true);
  }

  function shiftMove(move) {
    const lane = slideLanes[move.laneIndex];
    const next = state.slice();

    if (move.delta === 2) {
      for (let i = move.pairAt - 1; i >= move.clicked; i--) {
        next[lane[i + 2]] = state[lane[i]];
      }
      next[lane[move.clicked]] = EMPTY;
      next[lane[move.clicked + 1]] = EMPTY;
    } else {
      for (let i = move.pairAt + 2; i <= move.clicked; i++) {
        next[lane[i - 2]] = state[lane[i]];
      }
      next[lane[move.clicked - 1]] = EMPTY;
      next[lane[move.clicked]] = EMPTY;
    }

    state = next;
  }

  function applyMove(move, record) {
    const before = positionsByTile();
    const oldState = state.slice();
    shiftMove(move);

    if (record) {
      history.push({ before: oldState, elapsed: elapsedMs(), moves });
      moves++;
      updateHud();
      playTone("slide");
      showToast("整道滑行 2 格");
    }

    layoutTiles(before);
    if (record && isSolved()) finish();
  }

  function undo() {
    const last = history.pop();
    if (!last || won) return;
    const before = positionsByTile();
    state = last.before.slice();
    elapsedBefore = last.elapsed;
    moves = last.moves;
    if (moves === 0) stopTimer(false);
    updateHud();
    layoutTiles(before);
    playTone("undo");
    showToast("已撤销");
  }

  function resetPuzzle() {
    const before = positionsByTile();
    state = startState.slice();
    history = [];
    moves = 0;
    won = false;
    stopTimer(true);
    els.win.classList.remove("show");
    updateHud();
    layoutTiles(before);
    showToast("已复位");
  }

  function loadExample() {
    loadState(EXAMPLE, "题面已载入");
  }

  function loadGoalState() {
    loadState(GOAL, "完成态");
  }

  function loadState(next, message) {
    const before = positionsByTile();
    state = next.slice();
    startState = next.slice();
    history = [];
    moves = 0;
    won = isSolved();
    stopTimer(true);
    els.win.classList.remove("show");
    updateHud();
    layoutTiles(before);
    showToast(message);
  }

  function newGame() {
    const before = positionsByTile();
    state = GOAL.slice();
    for (let i = 0; i < shuffleDepth; i++) {
      const options = legalMoves();
      const pick = options[Math.floor(Math.random() * options.length)];
      shiftMove(pick);
    }
    if (isSolved()) {
      const first = legalMoves()[0];
      if (first) shiftMove(first);
    }
    startState = state.slice();
    history = [];
    moves = 0;
    won = false;
    stopTimer(true);
    updateHud();
    layoutTiles(before);
    showToast("新局已开始");
  }

  function hint() {
    if (won) return;
    const moves = legalMoves();
    if (!moves.length) return;
    let move = moves.find(candidate => {
      const lane = slideLanes[candidate.laneIndex];
      const target = lane[candidate.clicked + candidate.delta];
      return GOAL[target] === state[candidate.tilePos];
    });
    if (!move) {
      move = moves.slice().sort((a, b) => Math.abs(a.pairAt - a.clicked) - Math.abs(b.pairAt - b.clicked))[0];
    }
    const tileNumber = state[move.tilePos];
    const tile = tileEls.get(tileNumber);
    tile.g.classList.add("hint");
    setTimeout(() => tile.g.classList.remove("hint"), 1500);
    playTone("hint");
  }

  function bump(n) {
    const tile = tileEls.get(n);
    tile.g.classList.add("bump");
    setTimeout(() => tile.g.classList.remove("bump"), 260);
  }

  function isSolved() {
    return state.every((value, idx) => value === GOAL[idx]);
  }

  function startTimer() {
    startedAt = performance.now();
    clearInterval(timer);
    timer = setInterval(updateHud, 250);
  }

  function stopTimer(resetElapsed) {
    clearInterval(timer);
    timer = 0;
    startedAt = 0;
    if (resetElapsed) elapsedBefore = 0;
  }

  function elapsedMs() {
    return elapsedBefore + (startedAt ? performance.now() - startedAt : 0);
  }

  function formatTime(ms) {
    const total = Math.floor(ms / 1000);
    const m = Math.floor(total / 60);
    const s = total % 60;
    return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
  }

  function updateHud() {
    els.moves.textContent = String(moves);
    els.time.textContent = formatTime(elapsedMs());
    const best = getBest();
    els.best.textContent = best ? `${best.moves}` : "--";
  }

  function finish() {
    won = true;
    elapsedBefore = elapsedMs();
    stopTimer(false);
    const timeText = formatTime(elapsedBefore);
    const best = getBest();
    if (!best || moves < best.moves || (moves === best.moves && elapsedBefore < best.time)) {
      localStorage.setItem(BEST_KEY, JSON.stringify({ moves, time: elapsedBefore }));
      els.winLine.textContent = "新最佳记录已经刷新。";
    } else {
      els.winLine.textContent = "所有数字已经回到 1-22 顺序。";
    }
    updateHud();
    layoutTiles();
    els.winMoves.textContent = String(moves);
    els.winTime.textContent = timeText;
    els.win.classList.add("show");
    playTone("win");
  }

  function getBest() {
    try {
      return JSON.parse(localStorage.getItem(BEST_KEY) || "null");
    } catch {
      return null;
    }
  }

  let toastTimer = 0;
  function showToast(text) {
    clearTimeout(toastTimer);
    els.toast.textContent = text;
    els.toast.classList.add("show");
    toastTimer = setTimeout(() => els.toast.classList.remove("show"), 1250);
  }

  function syncMusicButton() {
    els.music.classList.toggle("music-on", musicEnabled);
    els.music.textContent = musicEnabled ? "♫ 音乐" : "♩ 静音";
    els.music.title = musicEnabled ? "音乐开启" : "音乐关闭";
  }

  function startBgm() {
    if (!musicEnabled || !els.bgm) return;
    els.bgm.volume = .16;
    const play = els.bgm.play();
    if (play && typeof play.catch === "function") play.catch(() => {});
  }

  function stopBgm() {
    if (!els.bgm) return;
    els.bgm.pause();
  }

  function toggleMusic() {
    musicEnabled = !musicEnabled;
    localStorage.setItem("hex-speed-skate-music", musicEnabled ? "on" : "off");
    syncMusicButton();
    if (musicEnabled) {
      startBgm();
      showToast("音乐开启");
    } else {
      stopBgm();
      showToast("音乐关闭");
    }
  }

  function getAudioContext() {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    if (!audioCtx) audioCtx = new Ctx();
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function playTone(kind) {
    const ac = getAudioContext();
    if (!ac) return;
    const now = ac.currentTime;

    if (kind === "slide") {
      woodKnock(now, 196, .24, .105);
      woodKnock(now + .058, 294, .17, .082);
      woodKnock(now + .108, 392, .095, .058);
      playNoise(now, .085, .045, 920);
      return;
    }

    const notes = {
      undo: [320, 250],
      bad: [150, 112],
      hint: [760, 980],
      win: [523, 659, 784, 1046]
    }[kind] || [520];

    notes.forEach((freq, i) => {
      const gain = ac.createGain();
      const osc = ac.createOscillator();
      const t = now + i * .075;
      osc.type = kind === "bad" ? "triangle" : "sine";
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(kind === "bad" ? .024 : .045, t + .012);
      gain.gain.exponentialRampToValueAtTime(.0001, t + (kind === "win" ? .38 : .16));
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(t);
      osc.stop(t + (kind === "win" ? .42 : .18));
    });

    function woodKnock(start, freq, volume, duration) {
      const gain = ac.createGain();
      const body = ac.createBiquadFilter();
      const osc = ac.createOscillator();
      body.type = "bandpass";
      body.frequency.value = freq * 2.15;
      body.Q.value = 7.5;
      osc.type = "triangle";
      osc.frequency.setValueAtTime(freq, start);
      osc.frequency.exponentialRampToValueAtTime(freq * .72, start + duration);
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(volume, start + .004);
      gain.gain.exponentialRampToValueAtTime(.0001, start + duration);
      osc.connect(body);
      body.connect(gain);
      gain.connect(ac.destination);
      osc.start(start);
      osc.stop(start + duration + .02);
    }

    function playNoise(start, duration, volume, cutoff = 1200) {
      const frames = Math.max(1, Math.floor(ac.sampleRate * duration));
      const buffer = ac.createBuffer(1, frames, ac.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < frames; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / frames);
      const source = ac.createBufferSource();
      const gain = ac.createGain();
      const filter = ac.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = cutoff;
      gain.gain.setValueAtTime(volume, start);
      gain.gain.exponentialRampToValueAtTime(.0001, start + duration);
      source.buffer = buffer;
      source.connect(filter);
      filter.connect(gain);
      gain.connect(ac.destination);
      source.start(start);
      source.stop(start + duration);
    }
  }

  function initStars() {
    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    let stars = [];

    function resize() {
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      canvas.style.width = `${innerWidth}px`;
      canvas.style.height = `${innerHeight}px`;
      const count = Math.max(55, Math.floor(innerWidth * innerHeight / 15000));
      stars = Array.from({ length: count }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: (Math.random() * 4 + 3) * dpr,
        a: Math.random() * .42 + .18,
        v: (Math.random() * .16 + .035) * dpr,
        spin: (Math.random() * .018 - .009),
        rot: Math.random() * Math.PI,
        shape: Math.floor(Math.random() * 3),
        hue: Math.random() > .5 ? "#f2d39b" : Math.random() > .5 ? "#c58a4a" : "#fff2c5"
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(star => {
        star.y += star.v;
        if (star.y > canvas.height + 8) {
          star.y = -8;
          star.x = Math.random() * canvas.width;
        }
        ctx.globalAlpha = star.a;
        ctx.fillStyle = star.hue;
        ctx.strokeStyle = star.hue;
        ctx.lineWidth = Math.max(1, dpr * 1.4);
        star.rot += star.spin;
        ctx.save();
        ctx.translate(star.x, star.y);
        ctx.rotate(star.rot);
        if (star.shape === 0) {
          ctx.beginPath();
          ctx.moveTo(0, -star.r);
          ctx.lineTo(star.r * .86, star.r * .58);
          ctx.lineTo(-star.r * .86, star.r * .58);
          ctx.closePath();
          ctx.fill();
        } else if (star.shape === 1) {
          ctx.fillRect(-star.r * .55, -star.r * .55, star.r * 1.1, star.r * 1.1);
        } else {
          ctx.beginPath();
          ctx.moveTo(-star.r, 0);
          ctx.lineTo(star.r, 0);
          ctx.moveTo(0, -star.r);
          ctx.lineTo(0, star.r);
          ctx.stroke();
        }
        ctx.restore();
      });
      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }

    resize();
    addEventListener("resize", resize, { passive: true });
    draw();
  }

  function bindEvents() {
    syncMusicButton();
    els.bgm.volume = .16;
    els.newGame.addEventListener("click", newGame);
    els.example.addEventListener("click", loadExample);
    els.undo.addEventListener("click", undo);
    els.reset.addEventListener("click", resetPuzzle);
    els.hint.addEventListener("click", hint);
    els.music.addEventListener("click", toggleMusic);
    els.startGame.addEventListener("click", () => {
      els.start.classList.remove("show");
      if (!musicEnabled) {
        musicEnabled = true;
        localStorage.setItem("hex-speed-skate-music", "on");
        syncMusicButton();
      }
      startBgm();
      playTone("hint");
    });
    document.addEventListener("pointerdown", () => startBgm(), { once: true, passive: true });
    document.addEventListener("keydown", () => startBgm(), { once: true });
    els.targetFocus.addEventListener("click", () => {
      document.getElementById("targetPanel").scrollIntoView({ behavior: "smooth", block: "nearest" });
      showToast("目标：1-22，空位在末位");
    });
    els.loadGoal.addEventListener("click", loadGoalState);
    els.again.addEventListener("click", () => {
      els.win.classList.remove("show");
      newGame();
    });
    els.closeWin.addEventListener("click", () => els.win.classList.remove("show"));
    document.querySelectorAll(".segmented button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".segmented button").forEach(item => item.classList.remove("active"));
        btn.classList.add("active");
        shuffleDepth = Number(btn.dataset.depth);
      });
    });
  }

  buildGeometry();
  buildBoard();
  buildTargetBoard();
  bindEvents();
  initStars();
  updateHud();
  layoutTiles();
})();
</script>
<script id="touchGuardScript">
(function(){
  const allowText = 'input, textarea, [contenteditable="true"]';
  const isAllowed = target => {
    const el = target && target.nodeType === 1 ? target : target && target.parentElement;
    return !!(el && el.closest && el.closest(allowText));
  };
  ['selectstart','dragstart','contextmenu'].forEach(type => {
    document.addEventListener(type, event => {
      if(!isAllowed(event.target)) event.preventDefault();
    }, {passive:false});
  });
})();
</script>
<script id="hubReturnScript">
(function(){
  if(document.getElementById('hubReturnBtn')) return;
  function hubHref(){
    const url = new URL(location.href);
    const parts = url.pathname.split('/');
    const decoded = parts.map(part => {
      try{return decodeURIComponent(part);}catch(e){return part;}
    });
    const markers = ['G-Game-发布版','g-game-hub','写程序'];
    let pivot = -1;
    markers.forEach(marker => {
      const idx = decoded.lastIndexOf(marker);
      if(idx > pivot) pivot = idx;
    });
    if(pivot >= 0){
      url.pathname = parts.slice(0, pivot + 1).join('/') + '/G-Game/index.html';
      url.search = '?v=return-hub';
      const myGameId = new URLSearchParams(location.search).get('gameId');
      if(myGameId) url.searchParams.set('fromGame', myGameId);
      url.hash = '';
      return url.href;
    }
    const fallback = new URL('../G-Game/index.html?v=return-hub', location.href);
    const myGameId = new URLSearchParams(location.search).get('gameId');
    if(myGameId) fallback.searchParams.set('fromGame', myGameId);
    return fallback.href;
  }
  function mount(){
    if(!document.body) return;
    const link = document.createElement('a');
    link.id = 'hubReturnBtn';
    link.href = hubHref();
    link.target = '_top';
    link.textContent = '返回大厅';
    link.setAttribute('aria-label', '返回大厅');
    document.body.appendChild(link);
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', mount, {once:true});
  else mount();
})();
</script>
