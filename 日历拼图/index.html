<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>日历拼图</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cell:36px;--gap:4px;--piece-cell:36px;
  --ink:#ece5ff;--line:#62b6ff;--paper:#213f72;
}
html,body{width:100%;height:100%;overflow:hidden;overscroll-behavior:none}
body{
  min-height:100dvh;
  font-family:"Trebuchet MS","Microsoft YaHei",system-ui,sans-serif;
  color:#efe8ff;
  background:
    radial-gradient(circle at 16% 18%,rgba(85,57,178,.48),transparent 34%),
    radial-gradient(circle at 78% 22%,rgba(33,184,255,.16),transparent 28%),
    radial-gradient(circle at 58% 83%,rgba(133,73,255,.22),transparent 30%),
    linear-gradient(135deg,#26135c 0%,#150734 48%,#09051d 100%);
}
body::before{
  content:"✦  ♫  ✿  ✧  ✦  ✿  ♫  ✧";position:fixed;inset:0;z-index:0;pointer-events:none;
  color:rgba(255,255,255,.18);font-size:34px;letter-spacing:74px;line-height:23vh;
  transform:rotate(-12deg) scale(1.12);filter:blur(.2px);
}
button{font:900 .9rem inherit;border:0;cursor:pointer;touch-action:manipulation}
#app{
  position:relative;z-index:1;width:min(520px,100%);height:100dvh;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:10px 10px max(10px,env(safe-area-inset-bottom));
}
#left,#right{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0;width:100%}
#top{
  width:100%;display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;
  padding:4px 4px 2px;background:transparent;border:0;box-shadow:none;
}
h1{
  text-align:center;font-size:clamp(1.72rem,8vw,2.65rem);line-height:1;font-weight:900;letter-spacing:10px;
  color:#e7b4ff;text-shadow:0 0 18px rgba(189,118,255,.55),0 4px 0 rgba(40,21,88,.75);
}
#sub{margin-top:4px;color:#b8a9ff;font-weight:900;font-size:clamp(.72rem,3vw,.9rem);letter-spacing:1px;text-align:center}
#todayCard{
  min-width:92px;text-align:center;padding:7px 9px;border-radius:999px;
  background:rgba(58,42,107,.78);border:2px solid rgba(114,198,255,.7);
  box-shadow:0 0 20px rgba(75,191,255,.22),inset 0 1px 0 rgba(255,255,255,.16);
}
#todayCard b{display:block;font-size:.9rem;color:#fff176}
#todayCard span{display:block;margin-top:2px;font-size:.62rem;color:#c9bdff;font-weight:900}
body.level-b #todayCard{
  background:linear-gradient(145deg,rgba(255,255,255,.22),rgba(128,138,150,.5));
  border-color:#d7e2ef;box-shadow:0 0 24px rgba(210,225,240,.24),inset 0 1px 0 rgba(255,255,255,.7);
}
body.level-a #todayCard{
  background:linear-gradient(145deg,rgba(255,248,191,.28),rgba(169,101,16,.48));
  border-color:#ffd86b;box-shadow:0 0 28px rgba(255,216,107,.3),inset 0 1px 0 rgba(255,255,255,.64);
}
body.level-s #todayCard{
  background:linear-gradient(145deg,rgba(255,255,255,.25),rgba(106,218,255,.34),rgba(199,169,255,.25));
  border-color:#d9f8ff;box-shadow:0 0 30px rgba(194,244,255,.34),inset 0 1px 0 rgba(255,255,255,.8);
}
#boardShell{
  width:max-content;padding:7px;border-radius:20px;margin:72px 0 52px;
  background:rgba(43,32,83,.78);border:3px solid rgba(133,117,190,.38);
  box-shadow:0 20px 60px rgba(0,0,0,.28),0 0 70px rgba(88,77,211,.22),inset 0 0 0 3px rgba(255,255,255,.04);
}
body.level-b #boardShell{
  background:
    linear-gradient(135deg,rgba(255,255,255,.42),rgba(145,156,169,.55) 32%,rgba(255,255,255,.28) 50%,rgba(94,107,122,.46) 74%,rgba(226,235,244,.38)),
    rgba(43,32,83,.78);
  border-color:#d7e2ef;box-shadow:0 20px 60px rgba(0,0,0,.28),0 0 62px rgba(210,225,240,.28),inset 0 0 0 3px rgba(255,255,255,.16);
}
body.level-a #boardShell{
  background:
    linear-gradient(135deg,rgba(255,248,191,.5),rgba(211,154,32,.58) 28%,rgba(255,243,166,.34) 48%,rgba(169,101,16,.5) 72%,rgba(255,216,107,.44)),
    rgba(43,32,83,.78);
  border-color:#ffd86b;box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 72px rgba(255,216,107,.34),inset 0 0 0 3px rgba(255,255,255,.15);
}
body.level-s #boardShell{
  background:
    linear-gradient(130deg,rgba(255,255,255,.45) 0 12%,rgba(143,238,255,.4) 12% 30%,rgba(255,255,255,.34) 30% 45%,rgba(201,180,255,.38) 45% 62%,rgba(116,217,255,.4) 62% 82%,rgba(255,255,255,.38) 82%),
    rgba(43,32,83,.78);
  border-color:#d9f8ff;box-shadow:0 20px 64px rgba(0,0,0,.3),0 0 86px rgba(194,244,255,.34),inset 0 0 0 3px rgba(255,255,255,.18);
}
#board{
  position:relative;margin:0 auto;display:grid;grid-template-columns:repeat(7,var(--cell));
  grid-template-rows:repeat(8,var(--cell));gap:var(--gap);width:max-content;padding:6px;
  border-radius:17px;background:rgba(16,11,44,.56);
  box-shadow:inset 0 0 0 2px rgba(163,145,255,.16);
}
.slot{
  position:relative;width:var(--cell);height:var(--cell);display:grid;place-items:center;
  border-radius:10px;border:2px solid #62aaff;background:linear-gradient(180deg,#3f5f86,#214d88 55%,#1f4a81);
  color:#f1eaff;font-weight:900;font-size:.86rem;text-shadow:0 2px 0 rgba(26,16,57,.65);
  box-shadow:inset 0 9px 18px rgba(255,255,255,.12),inset 0 -8px 0 rgba(17,38,88,.15);
  user-select:none;
}
.slot.date{font-size:1.22rem}
.slot.month{font-size:.82rem;white-space:nowrap;line-height:1}
.slot.week{font-size:.78rem}
.slot.target{
  color:#fff;background:linear-gradient(180deg,#6e477e,#42236e 58%,#32175e);
  border-color:#c879ff;box-shadow:0 0 0 2px rgba(199,121,255,.38),0 0 22px rgba(202,113,255,.5),inset 0 8px 18px rgba(255,255,255,.12);
}
.slot.covered{color:transparent;text-shadow:none}
.slot.covered::after{
  content:"";position:absolute;inset:6px;border-radius:7px;background:rgba(255,255,255,.12);
}
.slot.invalid{visibility:hidden}
#stamp{
  height:17px;align-self:stretch;text-align:center;font-size:.8rem;font-weight:900;color:#fff176;
  text-shadow:0 0 12px rgba(255,241,118,.45);
}
#tools,#pieceTools{
  width:100%;display:flex;justify-content:center;gap:7px;flex-wrap:nowrap;
}
#levelPill{
  min-height:30px;padding:5px 16px;border-radius:999px;display:flex;align-items:center;gap:8px;
  color:#15102a;background:linear-gradient(135deg,#eef3f8 0%,#9aa7b6 24%,#ffffff 42%,#7d8793 64%,#dce7f1 100%);
  box-shadow:0 8px 20px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.36);
  font-weight:900;position:relative;z-index:45;overflow:hidden;border:1px solid rgba(255,255,255,.46);
}
#levelPill::before{
  content:"";position:absolute;inset:-45% -20%;background:linear-gradient(115deg,transparent 26%,rgba(255,255,255,.72) 42%,transparent 58%);
  transform:translateX(-70%);animation:levelShine 4.8s ease-in-out infinite;pointer-events:none;
}
@keyframes levelShine{0%,42%{transform:translateX(-78%)}72%,100%{transform:translateX(78%)}}
#levelPill.level-b{
  background:
    linear-gradient(135deg,#f8fbff 0%,#aab5c2 18%,#ffffff 36%,#7f8a96 54%,#dbe4ee 74%,#a1abb8 100%);
  color:#182234;box-shadow:0 8px 22px rgba(126,154,184,.22),inset 0 1px 0 rgba(255,255,255,.76),inset 0 -10px 20px rgba(70,82,96,.16);
}
#levelPill.level-a{
  background:
    linear-gradient(135deg,#fff8bf 0%,#d39a20 18%,#fff3a6 36%,#a96510 56%,#ffd86b 76%,#fff4bd 100%);
  color:#2e1800;box-shadow:0 8px 24px rgba(255,194,76,.28),inset 0 1px 0 rgba(255,255,255,.7),inset 0 -10px 22px rgba(120,61,8,.18);
}
#levelPill.level-s{
  background:
    linear-gradient(135deg,rgba(255,255,255,.98) 0%,rgba(158,237,255,.9) 15%,rgba(255,255,255,.95) 31%,rgba(196,169,255,.82) 47%,rgba(106,218,255,.92) 63%,rgba(255,255,255,.96) 82%,rgba(181,242,255,.9) 100%);
  color:#101c3a;box-shadow:0 8px 28px rgba(112,212,255,.34),0 0 30px rgba(199,239,255,.18),inset 0 1px 0 rgba(255,255,255,.88),inset 0 -9px 20px rgba(56,127,160,.12);
}
#levelName{font-size:.92rem}
#levelSubtitle{font-size:.66rem;color:rgba(21,16,42,.7)}
#levelPill.level-s #levelSubtitle{color:rgba(12,24,54,.72)}
#pieceTools{position:relative;z-index:45}
#tools button,#pieceTools button{
  min-height:36px;padding:0 11px;border-radius:999px;color:#101029;
  background:linear-gradient(135deg,#fff27a,#ffae22);border:0;
  box-shadow:0 8px 20px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.44);
  transition:transform .12s ease,filter .12s ease;
}
#tools button:active,#pieceTools button:active{transform:scale(.94)}
#tools .hot{background:linear-gradient(135deg,#ff6978,#ef4662);color:#fff}
#tools .sound{background:linear-gradient(135deg,#63ddff,#45bff0);color:#111832}
#tools .sound.off{background:linear-gradient(135deg,#77708f,#4d4668);color:#d7d0f0}
#msg{
  min-height:22px;text-align:center;font-weight:900;color:#c9bdff;font-size:.72rem;
  padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.07);
}
#tray{
  width:100%;height:42px;position:relative;border-radius:999px;padding:0;
  background:transparent;border:0;
  box-shadow:none;
  overflow:visible;
}
#trayTitle{
  width:100%;display:flex;justify-content:space-between;align-items:center;gap:8px;
  color:#efe8ff;font-weight:900;font-size:.78rem;
  display:none;
}
#trayTitle span:last-child{font-size:.68rem;color:#a99dff}
#pieces{position:fixed;inset:0;z-index:20;pointer-events:none}
.piece{
  position:fixed;touch-action:none;cursor:grab;filter:drop-shadow(0 9px 8px rgba(0,0,0,.28));
  transition:filter .12s ease,transform .08s ease;z-index:3;
  pointer-events:auto;
}
.piece.dragging{cursor:grabbing;z-index:80;filter:drop-shadow(0 18px 18px rgba(0,0,0,.34))}
.piece.selected{filter:drop-shadow(0 0 0 #fff) drop-shadow(0 0 16px rgba(255,255,255,.96)) drop-shadow(0 12px 10px rgba(0,0,0,.24))}
.pcell{
  position:absolute;width:var(--piece-cell);height:var(--piece-cell);border-radius:8px;
  background:var(--pcolor);border:2px solid rgba(255,255,255,.7);
  box-shadow:inset 0 7px 12px rgba(255,255,255,.22),inset 0 -7px 0 rgba(30,16,51,.16);
}
.piece.onboard .pcell,.piece.lifted .pcell{width:var(--cell);height:var(--cell);border-radius:8px}
#win{
  position:fixed;inset:0;z-index:200;display:none;place-items:center;padding:18px;
  background:
    radial-gradient(circle at 20% 22%,rgba(255,255,255,.16),transparent 20%),
    radial-gradient(circle at 78% 15%,rgba(112,210,255,.2),transparent 23%),
    rgba(8,5,29,.82);
  backdrop-filter:blur(8px);
}
#win.show{display:grid}
#confettiLayer{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.confetti{
  position:absolute;top:-12vh;left:50%;width:9px;height:16px;border-radius:3px;
  background:var(--c,#fff176);opacity:.95;
  transform:translate3d(var(--x,0),-10vh,0) rotate(var(--r,0deg));
  animation:confettiFall var(--d,2.8s) cubic-bezier(.18,.72,.22,1) var(--delay,0s) forwards;
}
.confetti.round{width:10px;height:10px;border-radius:50%}
.confetti.ribbon{width:7px;height:22px;border-radius:999px}
@keyframes confettiFall{
  0%{transform:translate3d(var(--x,0),-12vh,0) rotate(0deg);opacity:0}
  8%{opacity:1}
  100%{transform:translate3d(calc(var(--x,0) + var(--drift,0px)),112vh,0) rotate(var(--spin,540deg));opacity:.08}
}
#winCard{
  width:min(92vw,430px);padding:26px 20px;text-align:center;border-radius:18px;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#261a5f,#180d43);border:3px solid rgba(139,216,255,.7);
  box-shadow:0 24px 70px rgba(0,0,0,.42),0 0 50px rgba(116,195,255,.22);
}
#winCard::before{
  content:"";position:absolute;inset:-55px -30px auto;height:132px;pointer-events:none;
  background:
    radial-gradient(circle at 15% 45%,rgba(255,241,118,.72) 0 3px,transparent 4px),
    radial-gradient(circle at 31% 24%,rgba(255,146,208,.68) 0 4px,transparent 5px),
    radial-gradient(circle at 51% 52%,rgba(126,226,142,.65) 0 3px,transparent 4px),
    radial-gradient(circle at 70% 23%,rgba(112,212,255,.75) 0 4px,transparent 5px),
    radial-gradient(circle at 88% 50%,rgba(255,241,118,.68) 0 3px,transparent 4px);
  filter:drop-shadow(0 0 12px rgba(255,255,255,.32));
}
#winCard::after{
  content:"";position:absolute;inset:-90px 50% auto auto;width:240px;height:240px;margin-right:-120px;border-radius:50%;
  background:conic-gradient(from 0deg,transparent 0 9deg,rgba(255,241,118,.22) 9deg 13deg,transparent 13deg 24deg,rgba(112,212,255,.18) 24deg 28deg,transparent 28deg 42deg);
  animation:haloSpin 9s linear infinite;pointer-events:none;
}
@keyframes haloSpin{to{transform:rotate(360deg)}}
#winMedal{
  width:70px;height:70px;margin:0 auto 8px;display:grid;place-items:center;border-radius:50%;
  background:radial-gradient(circle at 35% 28%,#fff7a8,#ffb82d 58%,#d36dff 100%);
  color:#1b123c;font-size:2rem;font-weight:900;box-shadow:0 0 28px rgba(255,241,118,.55),inset 0 2px 0 rgba(255,255,255,.58);
  position:relative;z-index:1;
}
#winBadge{
  display:inline-grid;place-items:center;min-width:74px;height:34px;padding:0 16px;margin-bottom:12px;
  border-radius:999px;background:rgba(255,255,255,.13);color:#fff176;font-weight:900;position:relative;z-index:1;
}
#winCard h2{font-size:2.15rem;color:#ff92d0;text-shadow:0 0 18px rgba(255,146,208,.45);margin-bottom:8px;position:relative;z-index:1}
#winCard p{line-height:1.7;color:#d8d0ff;font-weight:800;margin-bottom:16px;position:relative;z-index:1}
#winStats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
#winStats div{
  padding:11px 8px;border-radius:14px;background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.16);
  position:relative;z-index:1;
}
#winStats span{display:block;font-size:.7rem;color:#bfb4ff;font-weight:900;margin-bottom:4px}
#winStats b{font-size:1.06rem;color:#fff;font-weight:900}
#winRibbon{min-height:22px;color:#fff176;font-weight:900;margin-bottom:15px;position:relative;z-index:1}
#winCard button{height:42px;padding:0 22px;border-radius:999px;background:#7ee28e;color:#194722;border:0;position:relative;z-index:1}
#win.level-b #winCard{border-color:#70d4ff}
#win.level-b #winCard{
  background:
    linear-gradient(160deg,rgba(255,255,255,.11),transparent 28%),
    linear-gradient(180deg,#26345a,#141e3d);
  border-color:#d7e2ef;box-shadow:0 24px 70px rgba(0,0,0,.42),0 0 58px rgba(190,211,232,.3);
}
#win.level-b #winBadge{
  background:linear-gradient(135deg,#ffffff,#aab5c2 36%,#edf4fb 58%,#7f8a96 100%);
  color:#182234;box-shadow:inset 0 1px 0 rgba(255,255,255,.82),0 0 20px rgba(210,225,240,.25);
}
#win.level-b #winMedal{
  font-size:1.65rem;background:radial-gradient(circle at 35% 28%,#ffffff,#c3cdd9 44%,#7d8793 74%,#eef4fb);
  box-shadow:0 0 32px rgba(210,226,244,.44),inset 0 2px 0 rgba(255,255,255,.85),inset 0 -10px 18px rgba(70,82,96,.22);
}
#win.level-a #winCard{
  border-color:#ffd86b;
  background:
    linear-gradient(150deg,rgba(255,248,191,.18),transparent 30%),
    linear-gradient(180deg,#3b2555,#1a103a);
  box-shadow:0 24px 70px rgba(0,0,0,.42),0 0 76px rgba(255,194,76,.36),0 0 36px rgba(255,216,107,.16);
}
#win.level-a #winCard h2{color:#ffe58a;text-shadow:0 0 22px rgba(255,216,107,.48)}
#win.level-a #winBadge{
  background:linear-gradient(135deg,#fff8bf,#d39a20 32%,#fff3a6 54%,#a96510 100%);
  color:#2e1800;box-shadow:inset 0 1px 0 rgba(255,255,255,.75),0 0 22px rgba(255,216,107,.35);
}
#win.level-a #winMedal{
  background:radial-gradient(circle at 35% 28%,#fff8bf,#ffd86b 44%,#c17a18 72%,#fff1a6);
  box-shadow:0 0 38px rgba(255,216,107,.55),inset 0 2px 0 rgba(255,255,255,.78),inset 0 -10px 18px rgba(150,78,12,.22);
}
#win.level-s{
  background:
    radial-gradient(circle at 50% 18%,rgba(232,250,255,.44),transparent 24%),
    radial-gradient(circle at 18% 70%,rgba(196,169,255,.3),transparent 26%),
    radial-gradient(circle at 82% 72%,rgba(99,221,255,.34),transparent 26%),
    rgba(8,5,29,.88);
}
#win.level-s #winCard{
  border-color:#d9f8ff;
  background:
    linear-gradient(130deg,rgba(255,255,255,.2) 0 10%,transparent 10% 21%,rgba(126,226,255,.13) 21% 35%,transparent 35% 49%,rgba(199,169,255,.15) 49% 64%,transparent 64%),
    linear-gradient(180deg,#25306a,#12092f);
  box-shadow:0 24px 80px rgba(0,0,0,.48),0 0 110px rgba(112,212,255,.46),0 0 65px rgba(255,255,255,.18);
}
#win.level-s #winCard::after{width:330px;height:330px;margin-right:-165px;top:-126px;opacity:1}
#win.level-s #winCard h2{color:#effcff;text-shadow:0 0 24px rgba(194,244,255,.74),0 0 14px rgba(199,169,255,.45)}
#win.level-s #winBadge{
  background:
    linear-gradient(135deg,#ffffff 0%,#8feeff 20%,#ffffff 36%,#c9b4ff 52%,#74d9ff 70%,#ffffff 100%);
  color:#101c3a;box-shadow:inset 0 1px 0 rgba(255,255,255,.92),0 0 28px rgba(194,244,255,.52);
}
#win.level-s #winMedal{
  width:84px;height:84px;font-size:2.35rem;
  background:
    conic-gradient(from 18deg,#ffffff,#8feeff,#ffffff,#c9b4ff,#74d9ff,#ffffff,#bff6ff,#ffffff);
  clip-path:polygon(50% 0,78% 16%,100% 42%,50% 100%,0 42%,22% 16%);
  border-radius:0;color:#17244a;
  box-shadow:0 0 48px rgba(194,244,255,.78),0 0 80px rgba(199,169,255,.36),inset 0 2px 0 rgba(255,255,255,.9);
}
@media(max-width:560px){
  :root{--cell:min(6.75vw,25px);--gap:3px;--piece-cell:min(6.75vw,25px)}
  #app{gap:6px;padding:7px 7px max(7px,env(safe-area-inset-bottom))}
  #top{grid-template-columns:1fr auto}
  h1{letter-spacing:7px}
  #sub{font-size:.67rem}
  #boardShell{padding:6px;border-radius:18px;margin:74px 0 76px}
  #board{padding:5px;border-radius:14px}
  .slot{font-size:.64rem;border-width:2px}.slot.month{font-size:.54rem}.slot.date{font-size:.98rem}.slot.week{font-size:.58rem}
  #tools button,#pieceTools button{min-height:32px;padding:0 8px;font-size:.76rem}
  #tray{height:0;padding:0}
  #msg{font-size:.65rem}
}
@media(max-height:740px){
  :root{--cell:min(6.75vw,25px);--gap:3px;--piece-cell:min(6.75vw,25px)}
  #app{gap:4px;padding-top:5px}
  #sub{display:none}
  #stamp{height:12px;font-size:.68rem}
  #boardShell{margin:64px 0 66px}
  #tray{height:0}
  #tools button,#pieceTools button{min-height:30px;font-size:.7rem;padding:0 7px}
  #msg{display:none}
}
</style>
<style id="touchGuardStyle">
  html, body, body *{
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
  }
  img, svg, canvas{
    -webkit-user-drag:none;
    user-drag:none;
  }
  input, textarea, [contenteditable="true"]{
    -webkit-user-select:text;
    user-select:text;
    -webkit-touch-callout:default;
  }
</style>
<style id="hubReturnStyle">
  #hubReturnBtn{
    position:fixed;
    left:max(10px, env(safe-area-inset-left));
    top:max(10px, env(safe-area-inset-top));
    z-index:2147483000;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:74px;
    height:34px;
    padding:0 12px;
    border-radius:999px;
    border:1px solid rgba(159,216,255,.48);
    background:rgba(6,12,24,.74);
    color:#f3f7ff;
    box-shadow:0 10px 30px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.12);
    -webkit-backdrop-filter:blur(12px);
    backdrop-filter:blur(12px);
    font:900 13px/1 "PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif;
    letter-spacing:0;

const labelById=new Map(labels.map(x=>[x.id,x]));
const validKeys=new Set(labels.map(cellKey));

function cellKey(cell){return cell.r+","+cell.c;}
function keyRC(r,c){return r+","+c;}
function normalize(cells){
  const minX=Math.min(...cells.map(c=>c[0])),minY=Math.min(...cells.map(c=>c[1]));
  return cells.map(([x,y])=>[x-minX,y-minY]).sort((a,b)=>a[1]-b[1]||a[0]-b[0]);
}
function variantCells(cells,rot=0,flip=false){
  return normalize(cells.map(([x,y])=>{
    let nx=flip?-x:x,ny=y;
    for(let i=0;i<rot;i++) [nx,ny]=[-ny,nx];
    return [nx,ny];
  }));
}
function allVariants(cells){
  const out=[],seen=new Set();
  for(let flip=0;flip<2;flip++) for(let rot=0;rot<4;rot++){
    const v=variantCells(cells,rot,!!flip),k=v.map(p=>p.join(":")).join("|");
    if(!seen.has(k)){seen.add(k);out.push(v);}
  }
  return out;
}
function allOrientations(cells){
  const out=[],seen=new Set();
  for(let flip=0;flip<2;flip++) for(let rot=0;rot<4;rot++){
    const shape=variantCells(cells,rot,!!flip),k=shape.map(p=>p.join(":")).join("|");
    if(!seen.has(k)){seen.add(k);out.push({shape,rot,flip:!!flip});}
  }
  return out;
}

function solveWithPieces(pieceDefs){
  const allowed=[...validKeys].filter(k=>!state.target.has(k));
  const allowedSet=new Set(allowed);
  const placements={};
  pieceDefs.forEach(p=>{
    placements[p.id]=[];
    allOrientations(p.cells).forEach(orient=>{
      for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
        const cells=orient.shape.map(([x,y])=>keyRC(r+y,c+x));
        if(cells.every(k=>allowedSet.has(k))) placements[p.id].push({cells,...orient,anchor:{r,c}});
      }
    });
  });
  const byCell=Object.fromEntries(allowed.map(c=>[c,[]]));
  pieceDefs.forEach(p=>placements[p.id].forEach((pl,i)=>pl.cells.forEach(c=>byCell[c].push([p.id,i]))));
  let ticks=0;
  function rec(used,occ,sol){
    ticks++;
    if(ticks>180000)return null;
    if(sol.length===pieceDefs.length)return occ.size===allowed.length?sol:null;
    let opts=null;
    for(const cell of allowed){
      if(occ.has(cell))continue;
      const o=byCell[cell].filter(([pid,i])=>!used.has(pid)&&placements[pid][i].cells.every(c=>!occ.has(c)));
      if(!o.length)return null;
      if(!opts||o.length<opts.length)opts=o;
    }
    opts.sort(()=>Math.random()-.5);
    for(const [pid,i] of opts){
      const pl=placements[pid][i];
      used.add(pid);pl.cells.forEach(c=>occ.add(c));
      const res=rec(used,occ,sol.concat({id:pid,...pl}));
      if(res)return res;
      pl.cells.forEach(c=>occ.delete(c));used.delete(pid);
    }
    return null;
  }
  return rec(new Set(),new Set(),[]);
}

  });

function makeAudio(src,volume,loop=false){

  playClip(clip,volume);
}

function carveFallback(){
  const sizes=[5,5,5,5,5,5,5,5,4,3],open=[...validKeys].filter(k=>!state.target.has(k));
  const openSet=new Set(open),chunks=[];
  sizes.forEach((size,idx)=>{
    const start=[...openSet][0],chunk=[start];openSet.delete(start);
    while(chunk.length<size){
      const edges=[];
      chunk.forEach(k=>{
        const [r,c]=k.split(",").map(Number);
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dr,dc])=>{
          const nk=keyRC(r+dr,c+dc);if(openSet.has(nk))edges.push(nk);
        });
      });
      const pick=edges[0]||[...openSet][0];
      chunk.push(pick);openSet.delete(pick);
    }
    const pts=chunk.map(k=>k.split(",").map(Number));
    const minR=Math.min(...pts.map(p=>p[0])),minC=Math.min(...pts.map(p=>p[1]));
    chunks.push({id:basePieces[idx].id,name:basePieces[idx].name,cells:pts.map(([r,c])=>[c-minC,r-minR])});
  });
  return chunks;
}
function makePieces(){
  state.draft=state.editing?loadDraft():null;
  const defs=pieceDefsFromDraft();
  const solution=solveWithPieces(defs);
  state.solution=solution;
  const draftMap=state.editing?draftPieceMap():new Map();
  state.pieces=defs.map((p,i)=>({
    ...p,
    rot:state.editing?(draftMap.get(p.id)?.homeRot ?? p.homeRot ?? 0):(p.homeRot ?? 0),
    homeRot:state.editing?(draftMap.get(p.id)?.homeRot ?? p.homeRot ?? 0):(p.homeRot ?? 0),
    flip:state.editing?!!(draftMap.get(p.id)?.homeFlip ?? p.homeFlip):!!p.homeFlip,
    homeFlip:state.editing?!!(draftMap.get(p.id)?.homeFlip ?? p.homeFlip):!!p.homeFlip,
    manualHome:state.editing&&draftMap.has(p.id)
      ? {dx:draftMap.get(p.id).homeDx,dy:draftMap.get(p.id).homeDy,step:draftMap.get(p.id).homeStep||HOME_REF_STEP}
      : {dx:p.homeDx||0,dy:p.homeDy||0,step:p.homeStep||HOME_REF_STEP},
    x:0,y:0,homeX:0,homeY:0,lifted:false,
    placed:false,boardR:null,boardC:null,solution:solution?.find(s=>s.id===p.id)
  }));
  layoutTrayPieces();
  drawPieces();
}
function layoutTrayPieces(){
  const board=document.getElementById("boardShell").getBoundingClientRect();
  const viewW=window.innerWidth,viewH=window.innerHeight,pad=3;
  const step=cellStep();
  const sizeOf=p=>{
    const shape=variantCells(p.cells,p.rot,p.flip);
    return {
      w:(Math.max(...shape.map(c=>c[0]))+1)*step-cellGap(),
      h:(Math.max(...shape.map(c=>c[1]))+1)*step-cellGap()
    };
  };
  const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
  const topYFor=p=>clamp(board.top-sizeOf(p).h-6,50,board.top-step);
  const bottomY=clamp(board.bottom+6,board.bottom+4,viewH-step*5.5);
  const leftX=pad;
  const rightXBase=viewW-pad;
  const presets={
    A:p=>({x:board.left-sizeOf(p).w-4,y:topYFor(p)}),
    B:p=>({x:board.left+step*1.35,y:topYFor(p)}),
    C:p=>({x:board.right+4,y:topYFor(p)}),
    D:p=>({x:board.left-sizeOf(p).w-4,y:board.top+step*1.35}),
    E:p=>({x:board.left-sizeOf(p).w-4,y:board.top+step*4.55}),
    J:p=>({x:board.right+4,y:board.top+step*1.45}),
    H:p=>({x:board.right+4,y:board.top+step*4.95}),
    F:p=>({x:board.left-sizeOf(p).w-4,y:bottomY}),
    G:p=>({x:board.left+step*1.55,y:bottomY}),
    I:p=>({x:board.right+4,y:bottomY})
  };
  state.pieces.forEach((p,i)=>{
    const size=sizeOf(p);
    let pos;
    if(p.manualHome){
      const savedStep=p.manualHome.step||HOME_REF_STEP;
      const scale=step/savedStep;
      pos={x:board.left+p.manualHome.dx*scale,y:board.top+p.manualHome.dy*scale};
    }else{
      pos=(presets[p.id]||(()=>({x:board.left+i*step,y:bottomY})))(p);
    }
    const homeX=clamp(pos.x,pad,viewW-size.w-pad);
    const homeY=clamp(pos.y,52,viewH-size.h-42);
    p.homeX=homeX;p.homeY=homeY;
    if(!p.placed&&!p.lifted){p.x=homeX;p.y=homeY;}
  });
}
function drawPieces(){
  piecesEl.innerHTML="";
  state.pieces.forEach(p=>{
    const el=document.createElement("div");
    el.className="piece"+(state.selected===p.id?" selected":"")+(p.placed?" onboard":"")+(p.lifted?" lifted":"");
    el.dataset.id=p.id;
    el.style.left=p.x+"px";el.style.top=p.y+"px";el.style.setProperty("--pcolor",p.color);
    const shape=variantCells(p.cells,p.rot,p.flip);
    const unit=cellStep();
    el.style.width=(Math.max(...shape.map(c=>c[0]))+1)*unit+"px";
    el.style.height=(Math.max(...shape.map(c=>c[1]))+1)*unit+"px";
    shape.forEach(([x,y])=>{
      const c=document.createElement("div");
      c.className="pcell";c.style.left=x*unit+"px";c.style.top=y*unit+"px";
      el.appendChild(c);
    });
    el.addEventListener("pointerdown",startDrag);
    piecesEl.appendChild(el);
  });
}
function cssVarPx(name){
  const probe=document.createElement("div");
  probe.style.cssText=`position:absolute;visibility:hidden;pointer-events:none;width:var(${name});height:0;`;
  document.body.appendChild(probe);
  const value=probe.getBoundingClientRect().width;
  probe.remove();
  return value;
}
function cellBox(){return state.slots.values().next().value?.getBoundingClientRect().width||cssVarPx("--cell");}
function cellGap(){return cssVarPx("--gap");}
function cellStep(){return cellBox()+cellGap();}
function boardOrigin(){
  const rect=boardEl.getBoundingClientRect();
  const pad=parseFloat(getComputedStyle(boardEl).paddingLeft);
  return {x:rect.left+pad,y:rect.top+pad};
}
function markSelected(id){
  state.selected=id;
  [...document.querySelectorAll(".piece")].forEach(el=>el.classList.toggle("selected",el.dataset.id===id));
}
function pieceAt(id){return state.pieces.find(p=>p.id===id);}
function shapeAbs(p,r=p.boardR,c=p.boardC){
  return variantCells(p.cells,p.rot,p.flip).map(([x,y])=>keyRC(r+y,c+x));
}
function removeCoverage(p){
  if(!p.placed)return;
  shapeAbs(p).forEach(k=>{if(state.covered.get(k)===p.id)state.covered.delete(k);});
  p.placed=false;p.boardR=null;p.boardC=null;
  refreshCovered();
}
function canPlace(p,r,c){
  return shapeAbs({...p,boardR:r,boardC:c},r,c).every(k=>validKeys.has(k)&&!state.target.has(k)&&(!state.covered.has(k)||state.covered.get(k)===p.id));
}
function placePiece(p,r,c){
  removeCoverage(p);
  if(!canPlace(p,r,c))return false;
  p.placed=true;p.lifted=false;p.boardR=r;p.boardC=c;
  shapeAbs(p).forEach(k=>state.covered.set(k,p.id));
  const origin=boardOrigin(),step=cellStep();
  p.x=origin.x+c*step;
  p.y=origin.y+r*step;
  refreshCovered();drawPieces();checkWin();return true;
}
function refreshCovered(){
  state.slots.forEach((el,k)=>el.classList.toggle("covered",state.covered.has(k)));
}
function startDrag(e){
  const id=e.currentTarget.dataset.id,p=pieceAt(id);
  const wasPlaced=p.placed;
  markSelected(id);
  playSfx("pick");
  if(wasPlaced)p.lifted=true;
  removeCoverage(p);drawPieces();
  const el=[...document.querySelectorAll(".piece")].find(x=>x.dataset.id===id);
  const rect=el.getBoundingClientRect();
  state.drag={id,dx:e.clientX-rect.left,dy:e.clientY-rect.top};
  el.classList.add("dragging");el.setPointerCapture(e.pointerId);
  window.addEventListener("pointermove",dragMove);
  window.addEventListener("pointerup",dragEnd,{once:true});
}
function dragMove(e){
  if(!state.drag)return;
  const p=pieceAt(state.drag.id);
  p.x=e.clientX-state.drag.dx;p.y=e.clientY-state.drag.dy;
  const el=[...document.querySelectorAll(".piece")].find(x=>x.dataset.id===p.id);
  if(el){el.style.left=p.x+"px";el.style.top=p.y+"px";}
}
function dragEnd(e){
  window.removeEventListener("pointermove",dragMove);
  const d=state.drag;if(!d)return;
  const p=pieceAt(d.id),origin=boardOrigin(),step=cellStep();
  if(state.editing){
    const board=document.getElementById("boardShell").getBoundingClientRect();
    p.placed=false;p.lifted=false;p.homeX=p.x;p.homeY=p.y;
    p.manualHome={dx:Math.round(p.x-board.left),dy:Math.round(p.y-board.top),step:Math.round(cellStep()*1000)/1000};
    saveDraft();playSfx("drop");drawPieces();state.drag=null;return;
  }
  const baseC=Math.round((p.x-origin.x)/step);
  const baseR=Math.round((p.y-origin.y)/step);
  const candidates=[];
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    const r=baseR+dr,c=baseC+dc;
    const dist=Math.hypot(p.x-(origin.x+c*step),p.y-(origin.y+r*step));
    candidates.push({r,c,dist});
  }
  candidates.sort((a,b)=>a.dist-b.dist);
  const hit=candidates.find(o=>o.r>=0&&o.c>=0&&o.r<ROWS&&o.c<COLS&&o.dist<step*1.25&&canPlace(p,o.r,o.c));
  if(hit&&placePiece(p,hit.r,hit.c)){playSfx("drop");msg("吸附成功。");}
  else{
    p.placed=false;p.lifted=false;p.x=p.homeX;p.y=p.homeY;
    drawPieces();playSfx("bad");msg("靠近格线松手会自动吸附。");
  }
  state.drag=null;
}
function transformSelected(kind){
  const p=pieceAt(state.selected);if(!p){playSfx("bad");return msg("先点选一块拼图。");}
  const wasPlaced=p.placed,old={rot:p.rot,flip:p.flip,r:p.boardR,c:p.boardC,x:p.x,y:p.y};
  removeCoverage(p);
  if(kind==="left")p.rot=(p.rot+3)%4;
  if(kind==="right")p.rot=(p.rot+1)%4;
  if(kind==="flip")p.flip=!p.flip;
  if(state.editing){
    p.homeRot=p.rot;p.homeFlip=p.flip;
    saveDraft();playSfx(kind==="flip"?"flip":"rotate");drawPieces();return;
  }
  if(wasPlaced){
    if(placePiece(p,old.r,old.c)){playSfx(kind==="flip"?"flip":"rotate");msg(kind==="flip"?"已在盘面上翻转。":"已在盘面上旋转。");}
    else{
      p.rot=old.rot;p.flip=old.flip;p.x=old.x;p.y=old.y;
      placePiece(p,old.r,old.c);playSfx("bad");msg("这个位置变化后会撞到边界。");
    }
    return;
  }
  playSfx(kind==="flip"?"flip":"rotate");
  drawPieces();
}
function resetAll(){
  state.won=false;
  state.covered.clear();
  layoutTrayPieces();
  state.pieces.forEach(p=>Object.assign(p,{rot:p.homeRot||0,flip:!!p.homeFlip,placed:false,lifted:false,boardR:null,boardC:null,x:p.homeX,y:p.homeY}));
  refreshCovered();drawPieces();playSfx("reset");msg("拼图块已全部收回。");stampEl.textContent="";
}
function startLevel(card,announce=false){
  if(!CARD_CONFIGS[card])return;
  state.card=card;
  state.levelIndex=CARD_ORDER.indexOf(card);
  state.editing=false;
  state.covered.clear();state.selected=null;state.won=false;state.lastClear=null;
  state.levelStart=Date.now();
  stampEl.textContent="";
  winEl.className="";
  updateLevelUI();
  makePieces();refreshCovered();
  if(announce)playSfx("card");
  msg(`${LEVEL_META[card].label}开始，完成后继续下一卡。`);
}
function setCard(card){
  startLevel(card,true);
}
function hintOne(){
  const next=state.pieces.find(p=>!p.placed);if(!next){playSfx("bad");return;}
  const sol=next.solution;if(!sol){playSfx("bad");return;}
  next.flip=sol.flip;next.rot=sol.rot;
  placePiece(next,sol.anchor.r,sol.anchor.c);
  playSfx("hint");
  msg(`提示：${next.name}已经放到答案位置。`);
}
function launchConfetti(level){
  const layer=document.getElementById("confettiLayer");
  layer.innerHTML="";
  const counts={B:46,A:78,S:128};
  const colors=["#fff176","#ff92d0","#70d4ff","#7ee28e","#c879ff","#ffb347","#ffffff"];
  const count=counts[level]||56;
  for(let i=0;i<count;i++){
    const piece=document.createElement("i");
    const shape=i%7===0?" round":i%5===0?" ribbon":"";
    piece.className=`confetti${shape}`;
    piece.style.setProperty("--c",colors[i%colors.length]);
    piece.style.setProperty("--x",`${Math.round(Math.random()*112-56)}vw`);
    piece.style.setProperty("--drift",`${Math.round(Math.random()*180-90)}px`);
    piece.style.setProperty("--spin",`${Math.round(360+Math.random()*900)}deg`);
    piece.style.setProperty("--d",`${(2.1+Math.random()*2.3).toFixed(2)}s`);
    piece.style.setProperty("--delay",`${(Math.random()*(level==="S"?1.1:.55)).toFixed(2)}s`);
    piece.style.setProperty("--r",`${Math.round(Math.random()*180)}deg`);
    layer.appendChild(piece);
  }
}
function showCelebration(){
  const meta=LEVEL_META[state.card];
  const elapsed=Date.now()-state.levelStart;
  state.lastClear={card:state.card,elapsed,date:todayLabel()};
  stampEl.textContent=state.card==="S"?"今日三卡已完成":`${meta.label}已完成`;
  document.getElementById("winBadge").textContent=meta.label;
  document.getElementById("winTitle").textContent=meta.title;
  document.getElementById("winText").textContent=
    state.card==="S"
      ? "今天的三张打卡全部完成，日历盘面已经被你拿下。"
      : `${meta.label}完成，下一张打卡已经准备好。`;
  document.getElementById("winTime").textContent=formatElapsed(elapsed);
  document.getElementById("winDate").textContent=todayLabel();
  document.getElementById("winRibbon").textContent=meta.ribbon;
  document.getElementById("closeWin").textContent=meta.next;
  document.getElementById("winMedal").textContent=state.card==="S"?"♛":state.card==="A"?"★":"✓";
  winEl.className=`show ${meta.className}`;
  launchConfetti(state.card);
  playSfx("win");
}
function continueAfterWin(){
  winEl.className="";
  document.getElementById("confettiLayer").innerHTML="";
  if(state.card==="S"){
    msg("今日白银、黄金、钻石三卡全部完成。");
    return;
  }
  const next=CARD_ORDER[state.levelIndex+1]||"S";
  startLevel(next,true);
}
function checkWin(){
  const need=[...validKeys].filter(k=>!state.target.has(k)).length;
  if(state.covered.size===need&&!state.won){
    state.won=true;
    showCelebration();
  }
}
function msg(text){msgEl.textContent=text;}
function init(){
  renderBoard();state.today=getToday();setTargets();startLevel("B");refreshSoundButton();
}
document.getElementById("rotateBtn").onclick=()=>transformSelected("right");
document.getElementById("flipBtn").onclick=()=>transformSelected("flip");
document.getElementById("newBtn").onclick=()=>{startLevel(state.card,true);msg(`${LEVEL_META[state.card].label}已重新开始。`);};
document.getElementById("hintBtn").onclick=hintOne;
document.getElementById("soundBtn").onclick=toggleSound;
document.getElementById("closeWin").onclick=continueAfterWin;
document.addEventListener("pointerdown",primeAudio,{passive:true});
document.addEventListener("keydown",primeAudio);
window.addEventListener("resize",()=>{layoutTrayPieces();state.pieces.filter(p=>p.placed).forEach(p=>placePiece(p,p.boardR,p.boardC));drawPieces();});
init();
</script>
<script id="touchGuardScript">
(function(){
  const allowText = 'input, textarea, [contenteditable="true"]';
  const isAllowed = target => {
    const el = target && target.nodeType === 1 ? target : target && target.parentElement;
    return !!(el && el.closest && el.closest(allowText));
  };
  ['selectstart','dragstart','contextmenu'].forEach(type => {
    document.addEventListener(type, event => {
      if(!isAllowed(event.target)) event.preventDefault();
    }, {passive:false});
  });
})();
</script>
<script id="hubReturnScript">
(function(){
  if(document.getElementById('hubReturnBtn')) return;
  function hubHref(){
    const url = new URL(location.href);
    const parts = url.pathname.split('/');
    const decoded = parts.map(part => {
      try{return decodeURIComponent(part);}catch(e){return part;}
    });
    const markers = ['G-Game-发布版','g-game-hub','写程序'];
    let pivot = -1;
    markers.forEach(marker => {
      const idx = decoded.lastIndexOf(marker);
      if(idx > pivot) pivot = idx;
    });
    if(pivot >= 0){
      url.pathname = parts.slice(0, pivot + 1).join('/') + '/G-Game/index.html';
      url.search = '?v=return-hub';
      const myGameId = new URLSearchParams(location.search).get('gameId');
      if(myGameId) url.searchParams.set('fromGame', myGameId);
      url.hash = '';
      return url.href;
    }
    const fallback = new URL('../G-Game/index.html?v=return-hub', location.href);
    const myGameId = new URLSearchParams(location.search).get('gameId');
    if(myGameId) fallback.searchParams.set('fromGame', myGameId);
    return fallback.href;
  }
  function mount(){
    if(!document.body) return;
    const link = document.createElement('a');
    link.id = 'hubReturnBtn';
    link.href = hubHref();
    link.target = '_top';
    link.textContent = '返回大厅';
    link.setAttribute('aria-label', '返回大厅');
    document.body.appendChild(link);
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', mount, {once:true});
  else mount();
})();
</script>
