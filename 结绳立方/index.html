      const pan = clamp((head.x / Math.max(1, window.innerWidth)) * 2 - 1, -.75, .75);
      panner.pan.value = pan;
      panner.connect(audioState.sfx);
      return panner;
    }

    function schedulePullSfx(context, destination, time) {
      const noise = context.createBufferSource();
      noise.buffer = makeNoiseBuffer(context, .22);
      const noiseFilter = context.createBiquadFilter();
      noiseFilter.type = "highpass";
      noiseFilter.frequency.value = 740;
      const noiseGain = context.createGain();
      noiseGain.gain.setValueAtTime(.0001, time);
      noiseGain.gain.exponentialRampToValueAtTime(AUDIO_MIX.pullSfx * .56, time + .018);
      noiseGain.gain.exponentialRampToValueAtTime(.0001, time + .19);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(destination);
      noise.start(time);
      noise.stop(time + .23);

      const osc = context.createOscillator();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(180, time);
      osc.frequency.exponentialRampToValueAtTime(660, time + .18);
      const gain = context.createGain();
      gain.gain.setValueAtTime(.0001, time);
      gain.gain.exponentialRampToValueAtTime(AUDIO_MIX.pullSfx, time + .028);
      gain.gain.exponentialRampToValueAtTime(.0001, time + .28);
      osc.connect(gain);
      gain.connect(destination);
      osc.start(time);
      osc.stop(time + .31);
    }

    function scheduleHitSfx(context, destination, time) {
      const osc = context.createOscillator();
      osc.type = "square";
      osc.frequency.setValueAtTime(130, time);
      osc.frequency.exponentialRampToValueAtTime(72, time + .16);
      const gain = context.createGain();
      gain.gain.setValueAtTime(.0001, time);
      gain.gain.exponentialRampToValueAtTime(AUDIO_MIX.hitSfx, time + .012);
      gain.gain.exponentialRampToValueAtTime(.0001, time + .18);
      osc.connect(gain);
      gain.connect(destination);
      osc.start(time);
      osc.stop(time + .21);
    }

    function makeNoiseBuffer(context, duration) {
      const length = Math.max(1, Math.floor(context.sampleRate * duration));
      const buffer = context.createBuffer(1, length, context.sampleRate);
      const data = buffer.getChannelData(0);
      let last = 0;
      for (let i = 0; i < length; i += 1) {
        last = last * .72 + (Math.random() * 2 - 1) * .28;
        data[i] = last;
      }
      return buffer;
    }

    async function measureAudioProfile() {
      const OfflineClass = window.OfflineAudioContext || window.webkitOfflineAudioContext;
      if (!OfflineClass) return { supported: false, runtime: audioDebugSnapshot() };
      const pull = await renderOfflineAudio(.62, (context, buses) => {
        schedulePullSfx(context, buses.sfx, .05);
      });
      const hit = await renderOfflineAudio(.42, (context, buses) => {
        scheduleHitSfx(context, buses.sfx, .05);
      });
      return {
        supported: true,
        source: `${BGM_TITLE} MP3; BGM loudness measured offline from local file`,
        mix: AUDIO_MIX,
        runtime: audioDebugSnapshot(),
        pullSfx: analyzeBuffer(pull),
        hitSfx: analyzeBuffer(hit)
      };
    }

    async function renderOfflineAudio(seconds, scheduler) {
      const sampleRate = 44100;
      const OfflineClass = window.OfflineAudioContext || window.webkitOfflineAudioContext;
      const context = new OfflineClass(1, Math.ceil(sampleRate * seconds), sampleRate);
      const buses = createAudioBuses(context, context.destination);
      scheduler(context, buses);
      return context.startRendering();
    }

    function scheduleProfileDrone(context, destination, time, duration) {
      const gain = context.createGain();
      gain.gain.setValueAtTime(0, time);
      gain.gain.linearRampToValueAtTime(AUDIO_MIX.bgmDrone, time + .6);
      gain.gain.setValueAtTime(AUDIO_MIX.bgmDrone, time + Math.max(.7, duration - .4));
      gain.gain.linearRampToValueAtTime(.0001, time + duration);
      gain.connect(destination);
      [98, 147].forEach((freq, index) => {
        const osc = context.createOscillator();
        osc.type = index ? "sine" : "triangle";
        osc.frequency.value = freq;
        osc.connect(gain);
        osc.start(time);
        osc.stop(time + duration + .02);
      });
    }

    function analyzeBuffer(buffer) {
      const data = buffer.getChannelData(0);
      let peak = 0;
      let sum = 0;
      for (let i = 0; i < data.length; i += 1) {
        const value = Math.abs(data[i]);
        peak = Math.max(peak, value);
        sum += value * value;
      }
      const rms = Math.sqrt(sum / Math.max(1, data.length));
      return {
        peak: Number(peak.toFixed(4)),
        peakDb: dbfs(peak),
        rms: Number(rms.toFixed(4)),
        rmsDb: dbfs(rms)
      };
    }

    function dbfs(value) {
      if (!value) return "-Infinity";
      return Number((20 * Math.log10(value)).toFixed(1));
    }

    function audioDebugSnapshot() {
      const audio = audioState.bgmAudio;
      return {
        source: BGM_SOURCE,
        title: BGM_TITLE,
        contextState: audioState.ctx ? audioState.ctx.state : "not-created",
        muted: audioState.muted,
        bgmRunning: Boolean(audio && !audio.paused),
        bgmReadyState: audio ? audio.readyState : 0,
        bgmCurrentTime: audio ? Number(audio.currentTime.toFixed(2)) : 0,
        mix: AUDIO_MIX
      };
    }

    function showToast(text, tone = "") {
      toastEl.textContent = text;
      toastEl.className = tone;
      window.clearTimeout(showToast.timer);
      requestAnimationFrame(() => toastEl.classList.add("show"));
      showToast.timer = window.setTimeout(() => toastEl.classList.remove("show"), 1200);
    }

    function mulberry32(seed) {
      return function rand() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }

    function easeInOutCubic(t) {
      return t < .5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function toChineseCount(num) {
      const basic = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
      if (num <= 10) return basic[num];
      if (num < 20) return `十${basic[num - 10]}`;
      if (num < 100) {
        const tens = Math.floor(num / 10);
        const ones = num % 10;
        return `${basic[tens]}十${ones ? basic[ones] : ""}`;
      }
      return String(num);
    }

    window.__ropeWeave = {
      stats() {
        return debugSnapshot().stats;
      },
      arrows() {
        return debugSnapshot().arrows;
      },
      audio() {
        return audioDebugSnapshot();
      },
      measureAudio() {
        return measureAudioProfile();
      }
    };

    function debugSnapshot() {
      return {
        stats: {
          started: state.started,
          level: state.level,
          lives: state.lives,
          moves: state.moves,
          hits: state.hits,
          remaining: remainingRopes(),
          ropes: state.ropes.length,
          occupied: state.occupancy.size,
          cells: state.board.cols * state.board.rows,
          minLength: ropeLengthSummary().min,
          maxLength: ropeLengthSummary().max,
          oneCellRopes: ropeLengthSummary().one,
          viewport: isHardLandscape(window.innerWidth, window.innerHeight) ? "landscape-hard" : "standard",
          layout: {
            x: state.layout.x,
            y: state.layout.y,
            cell: state.layout.cell,
            w: state.layout.w,
            h: state.layout.h
          }
        },
        arrows: state.ropes
          .filter(ropeItem => !ropeItem.removed)
          .map(ropeItem => {
            const head = cellCenter(ropeItem.cells[0]);
            const dir = dirFor(ropeItem.dir);
            return {
              id: ropeItem.id,
              x: head.x + dir.x * state.layout.cell * .34,
              y: head.y + dir.y * state.layout.cell * .34,
              blocked: Boolean(findBlocker(ropeItem))
            };
          }),
        tutorial: tutorialDebugSnapshot(),
        audio: audioDebugSnapshot()
      };
    }

    function tutorialDebugSnapshot() {
      if (!shouldShowTutorialHand()) return { show: false, target: null };
      const rope = tutorialTargetRope();
      if (!rope) return { show: false, target: null };
      const target = arrowCenterFor(rope);
      return {
        show: true,
        target: rope.id,
        x: Math.round(target.x),
        y: Math.round(target.y)
      };
    }

    function ropeLengthSummary() {
      const lengths = state.ropes
        .filter(ropeItem => !ropeItem.removed)
        .map(ropeItem => ropeItem.cells.length);
      if (!lengths.length) return { min: 0, max: 0, one: 0 };
      return {
        min: Math.min(...lengths),
        max: Math.max(...lengths),
        one: lengths.filter(length => length === 1).length
      };
    }

    function syncDebugData() {
      document.documentElement.dataset.ropeWeave = JSON.stringify(debugSnapshot());
    }

  </script>
</body>
