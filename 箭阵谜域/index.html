<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>箭阵谜域</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --level-total:36;
  --ink:#07091a;
  --panel:#15224a;
  --line:rgba(157,226,255,.18);
  --gold:#ffe08a;
  --blue:#7aa2ff;
  --cyan:#9de2ff;
  --text:#eaf0ff;
}
html,body{width:100%;height:100%;overflow:hidden;overscroll-behavior:none}
body{
  min-height:100dvh;
  font-family:'Nunito','Microsoft YaHei',system-ui,sans-serif;
  color:var(--text);
  background:radial-gradient(ellipse at 20% 20%, #1b2f5e 0%, #0d1430 45%, #07091a 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  position:relative;
  padding:env(safe-area-inset-top,12px) 0 env(safe-area-inset-bottom,8px);
}
#mist{position:fixed;inset:0;z-index:0;pointer-events:none}
#app{
  position:relative;z-index:1;width:100%;max-width:480px;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;gap:7px;
  padding:6px 12px 8px;justify-content:flex-start;
}
#title-wrap{text-align:center}
h1{
  font-size:clamp(1.3rem,6vw,1.9rem);font-weight:900;letter-spacing:6px;line-height:1.05;
  background:linear-gradient(135deg,#9de2ff,#7aa2ff,#c9b8ff);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;
  filter:drop-shadow(0 0 14px #7aa2ff66);
  animation:titlePop 3s ease-in-out infinite alternate;
}
@keyframes titlePop{from{letter-spacing:6px}to{letter-spacing:9px;filter:drop-shadow(0 0 22px #9db8ff99)}}
#subtitle{font-size:clamp(.58rem,2.2vw,.72rem);color:#8ea2d6;letter-spacing:1.5px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#level-card{
  width:100%;max-width:430px;padding:9px 12px 10px;border:1px solid var(--line);border-radius:16px;
  background:linear-gradient(145deg,rgba(255,255,255,.075),rgba(255,255,255,.035));
  box-shadow:0 10px 30px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.08);
}
#level-top{display:flex;align-items:center;justify-content:space-between;gap:8px;color:#9aa6d6;font-size:.72rem;font-weight:800;letter-spacing:1px}
#level-meta{display:flex;align-items:center;gap:8px;min-width:0}
#level-kicker{white-space:nowrap}
#level-size{padding:4px 8px;border-radius:999px;background:rgba(157,226,255,.08);border:1px solid rgba(157,226,255,.14);color:#c9d7ff;white-space:nowrap}
#level-name{margin-top:4px;color:#eaf0ff;font-size:clamp(.94rem,3.4vw,1.12rem);font-weight:900;letter-spacing:1px}
#level-note{margin-top:4px;color:#8ea2d6;font-size:clamp(.68rem,2.6vw,.78rem);line-height:1.35;min-height:1.05em}
#level-rail{display:grid;grid-template-columns:repeat(var(--level-total),1fr);gap:2px;margin-top:9px}
.rail-dot{height:5px;border-radius:999px;background:rgba(255,255,255,.11)}
.rail-dot.done{background:#4ade80;box-shadow:0 0 8px rgba(74,222,128,.55)}
.rail-dot.current{background:#9de2ff;box-shadow:0 0 10px rgba(157,226,255,.75)}
#prevBtn{
  height:28px;padding:0 10px;border-radius:999px;font-size:.68rem;color:#dce8ff;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);box-shadow:none;
}
button{
  padding:9px 16px;border:none;border-radius:999px;font-size:clamp(.75rem,3vw,.84rem);
  cursor:pointer;font-family:inherit;font-weight:700;letter-spacing:.5px;color:#08142a;
  transition:all .14s cubic-bezier(.34,1.56,.64,1);box-shadow:0 3px 12px #0004;
  touch-action:manipulation;
}
button:active{transform:scale(.93)}
button:disabled{opacity:.3;pointer-events:none;filter:saturate(.55)}
#hud,#tools{
  display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:7px;width:100%;
}
#hud{
  width:auto;max-width:100%;padding:6px 14px;border:1px solid rgba(255,255,255,.1);border-radius:999px;
  background:rgba(255,255,255,.06);color:#aebde8;font-size:clamp(.72rem,2.8vw,.86rem);
  box-shadow:none;row-gap:3px;
}
#hud b{color:#ffe19a}
#boardWrap{
  width:min(94vw,430px,calc(100dvh - 246px));aspect-ratio:1/1;min-width:260px;
  padding:12px;border-radius:18px;border:2px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  box-shadow:0 0 50px #3b6aed22,0 16px 50px #00000055,inset 0 1px 0 rgba(255,255,255,.1);
}
#board{width:100%;height:100%;display:block;border-radius:8px;touch-action:none;cursor:pointer}
#tools button:nth-child(1){background:linear-gradient(135deg,#60a5fa,#3b6aed);color:#fff}
#tools button:nth-child(2){background:linear-gradient(135deg,#64748b,#4b5563);color:#fff}
#tools button:nth-child(3){background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff}
#msg{
  min-height:1.2rem;max-width:430px;text-align:center;color:#ffe08a;font-weight:700;
  font-size:clamp(.75rem,3vw,.88rem);letter-spacing:1px;text-shadow:0 0 10px #ffe08a88;
  padding:0;background:transparent;border-radius:0;
}
#win{
  position:fixed;inset:0;z-index:5;display:none;place-items:center;background:rgba(6,8,7,.76);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
}
#win.show{display:grid}
#winCard{
  width:min(92vw,430px);padding:28px 24px 22px;border-radius:30px;text-align:center;
  border:2px solid #7aa2ff;background:linear-gradient(160deg,#15224a,#0d1430);
  box-shadow:0 0 70px #3b6aed77,0 24px 70px #000b;
}
#winCard h2{font-size:2rem;margin-bottom:8px;color:#fff}
#winCard p{color:#c2d8cc;line-height:1.75;margin-bottom:16px}
#winStats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0 18px;
}
.stat{
  padding:10px 6px;border-radius:8px;border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.1);color:#d8fff3;font-size:.74rem;
}
.stat b{display:block;margin-top:4px;color:#ffe19a;font-size:1.15rem}
#winBtns{display:flex;gap:8px}
#winBtns button{flex:1}
#welcome-mask{
  position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 28%,#1b2f5e 0%,#0d1430 52%,#07091a 100%);
  transition:opacity .5s ease;overflow:hidden;
}
#welcome-mask::before{
  content:"";position:absolute;inset:-20%;
  background:
    radial-gradient(circle at 30% 28%,rgba(157,226,255,.18),transparent 28%),
    radial-gradient(circle at 68% 72%,rgba(122,162,255,.16),transparent 30%);
  filter:blur(10px);animation:coverGlow 5s ease-in-out infinite alternate;
}
#welcome-mask.hide{opacity:0;pointer-events:none}
#welcome-card{
  position:relative;width:min(88vw,430px);padding:0 24px;text-align:center;animation:coverIn .58s ease both;
}
@keyframes coverIn{from{opacity:0;transform:translateY(22px) scale(.96)}to{opacity:1;transform:none}}
@keyframes coverGlow{from{transform:scale(1)}to{transform:scale(1.08) rotate(3deg)}}
#welcome-logo{
  font-size:clamp(46px,13vw,84px);font-weight:900;line-height:.96;letter-spacing:1px;
  background:linear-gradient(135deg,#9de2ff,#60a5fa,#c9b8ff);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 4px 24px rgba(96,165,250,.42));margin-bottom:7px;
}
#welcome-title{font-size:clamp(22px,5.8vw,32px);font-weight:900;color:#eaf0ff;letter-spacing:5px;margin-bottom:9px}
#welcome-sub{font-size:clamp(12px,3.2vw,15px);color:#9aa6d6;letter-spacing:1.4px;margin-bottom:24px}
#welcome-demo{
  width:118px;height:118px;margin:0 auto 28px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  transform:rotate(-6deg);
}
.cover-bubble{
  position:relative;border-radius:50%;
  background:radial-gradient(circle at 32% 24%,#fff 0 10%,#9de2ff 22%,#7aa2ff 58%,#4257a7 100%);
  border:1px solid rgba(234,240,255,.72);
  box-shadow:0 8px 20px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.55);
  animation:coverBubble 2.2s ease-in-out infinite alternate;
}
.cover-bubble:nth-child(2n){animation-delay:.22s}
.cover-bubble:nth-child(3n){animation-delay:.44s}
.cover-bubble::before{
  content:"";position:absolute;left:24%;top:18%;width:34%;height:16%;border-radius:999px;
  background:rgba(255,255,255,.58);transform:rotate(-28deg);
}
.cover-bubble::after{
  content:"";position:absolute;left:29%;top:48%;width:43%;height:11px;border-radius:999px;
  background:#f9fff8;border:2px solid #21465a;box-shadow:0 0 0 2px rgba(255,255,255,.65);
}
.cover-bubble.a1::after{transform:rotate(0deg)}
.cover-bubble.a2::after{transform:rotate(45deg)}
.cover-bubble.a3::after{transform:rotate(90deg)}
.cover-bubble.a4::after{transform:rotate(135deg)}
@keyframes coverBubble{from{transform:translateY(0)}to{transform:translateY(-7px)}}
#welcome-start{
  min-width:196px;height:54px;padding:0 48px;border-radius:999px;font-size:clamp(18px,4.7vw,22px);
  font-weight:900;color:#08142a;background:linear-gradient(135deg,#9de2ff,#3b82f6);
  box-shadow:0 8px 32px rgba(59,130,246,.5);animation:startPulse 1.8s ease-in-out infinite;
}
#welcome-start:active{transform:scale(.97)}
@keyframes startPulse{0%,100%{box-shadow:0 8px 32px rgba(59,130,246,.5)}50%{box-shadow:0 8px 44px rgba(59,130,246,.82)}}
@media(max-height:760px){
  #app{gap:7px;padding-top:8px}
  #level-card{padding:8px 12px 9px}
  #level-rail{margin-top:7px}

  #subtitle{display:none}
  button{height:36px}
  #msg{font-size:.82rem;min-height:22px}
  #welcome-demo{width:98px;height:98px;margin-bottom:22px}
  #welcome-sub{margin-bottom:18px}
  #welcome-start{height:48px}
}
@media(max-width:560px){
  #app{padding-left:10px;padding-right:10px}
  h1{font-size:1.9rem}
  button{height:37px;padding:0 10px;font-size:.78rem}
  #hud{font-size:.78rem;gap:7px}
  #boardWrap{padding:9px;min-width:260px}
}

<body>

    <div id="welcome-logo">G-Game</div>

    <div id="welcome-demo" aria-hidden="true">
      <div class="cover-bubble a1"></div>
      <div class="cover-bubble a2"></div>
      <div class="cover-bubble a3"></div>
      <div class="cover-bubble a4"></div>
      <div class="cover-bubble a2"></div>
      <div class="cover-bubble a1"></div>
      <div class="cover-bubble a3"></div>
      <div class="cover-bubble a4"></div>
      <div class="cover-bubble a2"></div>
    </div>

  </div>
</div>
<canvas id="mist"></canvas>
<main id="app">
  <div id="title-wrap">
    <h1>箭 阵 谜 域</h1>

  </div>

  <section id="level-card">
    <div id="level-top">
      <button id="prevBtn" title="上一关">上一关</button>
      <div id="level-meta">
        <span id="level-kicker">第 1 关</span>

      </div>
    </div>

      <button id="closeWinBtn">查看</button>

<script>
const DIRS=[
  {dx:0,dy:-1,name:"上"},
  {dx:1,dy:-1,name:"右上"},
  {dx:1,dy:0,name:"右"},
  {dx:1,dy:1,name:"右下"},
  {dx:0,dy:1,name:"下"},
  {dx:-1,dy:1,name:"左下"},
  {dx:-1,dy:0,name:"左"},
  {dx:-1,dy:-1,name:"左上"}
].map(d=>({...d,angle:Math.atan2(d.dy,d.dx)}));

const MODES=[
  {name:"浅阵",n:5,extra:.16,step:94},
  {name:"环阵",n:6,extra:.28,step:84},
  {name:"雾阵",n:7,extra:.42,step:74},
  {name:"重阵",n:8,extra:.58,step:64},
  {name:"终阵",n:9,extra:.72,step:56}
];

const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");
const wrap=document.getElementById("boardWrap");
const mist=document.getElementById("mist");
const mctx=mist.getContext("2d");
const ui={
  prev:document.getElementById("prevBtn"),
  next:document.getElementById("nextBtn"),
  reset:document.getElementById("resetBtn"),
  sound:document.getElementById("soundBtn"),
  welcome:document.getElementById("welcome-mask"),
  welcomeStart:document.getElementById("welcome-start"),
  levelKicker:document.getElementById("level-kicker"),
  levelSize:document.getElementById("level-size"),
  levelName:document.getElementById("level-name"),
  levelNote:document.getElementById("level-note"),
  levelRail:document.getElementById("level-rail"),
  tries:document.getElementById("tries"),
  left:document.getElementById("left"),
  chain:document.getElementById("chain"),
  timer:document.getElementById("timer"),
  msg:document.getElementById("msg"),
  win:document.getElementById("win"),
  winText:document.getElementById("winText"),
  winCells:document.getElementById("winCells"),
  winTries:document.getElementById("winTries"),
  winScore:document.getElementById("winScore"),
  again:document.getElementById("againBtn"),
  closeWin:document.getElementById("closeWinBtn"),
  winNext:document.getElementById("winNextBtn")
};

const SAVE_KEY="arrowMazeMaxUnlocked";
const DISPLAY_LEVELS=36;
const BGM_SHARE_URL="https://suno.com/s/X3gx97oPYsp6XQhT";
const BGM_URL="audio/game-music.mp3";
const BGM_VOLUME=.08;
let level=1,maxUnlocked=loadUnlockedLevel();
let puzzle=null,cache=new Map();
let dpr=1,boardSize=0,pad=0,cell=0;
let alive=[],state="ready",tries=0,chain=0,startedAt=0,elapsed=0;
let hover=-1,soundOn=true;
let anim=null,particles=[],backgroundDots=[];
let audioCtx=null,bgmAudio=null,bgmFailed=false,bgmTimer=null,bgmNodes=[],bgmStep=0,launched=false;

function idx(x,y,n=puzzle.n){return y*n+x}
function xy(i,n=puzzle.n){return {x:i%n,y:Math.floor(i/n)}}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
function sameSet(a,b){return a.length===b.length&&a.every((v,i)=>v===b[i])}

function loadUnlockedLevel(){
  try{
    return Math.max(1,Number(localStorage.getItem(SAVE_KEY))||1);
  }catch(err){
    return 1;
  }
}

function saveUnlockedLevel(){
  try{
    localStorage.setItem(SAVE_KEY,String(maxUnlocked));
  }catch(err){}
}

function modeForLevel(levelNo){
  if(levelNo<=4)return 0;
  if(levelNo<=8)return 1;
  if(levelNo<=13)return 2;
  if(levelNo<=19)return 3;
  return 4;
}

function dirBetween(a,b){
  const dx=Math.sign(b.x-a.x),dy=Math.sign(b.y-a.y);
  return DIRS.findIndex(d=>d.dx===dx&&d.dy===dy);
}

function outwardDir(cell,n){
  const choices=DIRS.map((d,i)=>({i,nx:cell.x+d.dx,ny:cell.y+d.dy}))
    .filter(v=>v.nx<0||v.nx>=n||v.ny<0||v.ny>=n)
    .map(v=>v.i);
  return choices.length?choices[Math.floor(Math.random()*choices.length)]:Math.floor(Math.random()*DIRS.length);
}

function randomStartCell(n){
  const inner=[],edge=[];
  for(let y=0;y<n;y++){
    for(let x=0;x<n;x++){
      const corner=(x===0||x===n-1)&&(y===0||y===n-1);
      if(corner)continue;
      const cell={x,y};
      if(x>0&&x<n-1&&y>0&&y<n-1)inner.push(cell);
      else edge.push(cell);
    }
  }
  const pool=Math.random()<.68&&inner.length?inner:inner.concat(edge);
  return pool[Math.floor(Math.random()*pool.length)];
}

function randomHamiltonianPath(n){
  const total=n*n;
  for(let attempt=0;attempt<70;attempt++){
    const start=randomStartCell(n);
    const visited=new Uint8Array(total);
    const path=[];
    let searchCount=0;
    const visit=(x,y)=>{
      const id=idx(x,y,n);
      visited[id]=1;
      path.push({x,y});
      if(path.length===total)return true;
      if(++searchCount>70000){
        visited[id]=0;
        path.pop();
        return false;
      }
      const moves=DIRS
        .map(d=>({x:x+d.dx,y:y+d.dy,noise:Math.random()}))
        .filter(p=>p.x>=0&&p.x<n&&p.y>=0&&p.y<n&&!visited[idx(p.x,p.y,n)]);
      moves.sort((a,b)=>openDegree(a.x,a.y,visited,n)-openDegree(b.x,b.y,visited,n)||a.noise-b.noise);
      for(const next of moves){
        if(visit(next.x,next.y))return true;
      }
      visited[id]=0;
      path.pop();
      return false;
    };
    if(visit(start.x,start.y))return path;
  }
  return spiralCenterPath(n);
}

function openDegree(x,y,visited,n){
  let count=0;
  for(const d of DIRS){
    const nx=x+d.dx,ny=y+d.dy;
    if(nx>=0&&nx<n&&ny>=0&&ny<n&&!visited[idx(nx,ny,n)])count++;
  }
  return count;
}

function spiralCenterPath(n){
  const path=[];
  let top=0,bottom=n-1,left=0,right=n-1;
  while(left<=right&&top<=bottom){
    for(let x=left;x<=right;x++)path.push({x,y:top});
    for(let y=top+1;y<=bottom;y++)path.push({x:right,y});
    if(top<bottom){
      for(let x=right-1;x>=left;x--)path.push({x,y:bottom});
    }
    if(left<right){
      for(let y=bottom-1;y>top;y--)path.push({x:left,y});
    }
    top++;bottom--;left++;right--;
  }
  return path.reverse();
}

function pathStartsInCorner(path,n){
  const p=path[0];
  return (p.x===0||p.x===n-1)&&(p.y===0||p.y===n-1);
}

function generatePuzzle(levelNo){
  const mode=modeForLevel(levelNo);
  const cfg=MODES[mode];
  const n=cfg.n,total=n*n;
  for(let attempt=0;attempt<80;attempt++){
    const path=randomHamiltonianPath(n);
    if(pathStartsInCorner(path,n))continue;
    const arrows=Array.from({length:total},()=>[]);
    for(let i=0;i<path.length-1;i++){
      arrows[idx(path[i].x,path[i].y,n)].push(dirBetween(path[i],path[i+1]));
    }
    const last=path[path.length-1];
    arrows[idx(last.x,last.y,n)].push(outwardDir(last,n));
    const solution=idx(path[0].x,path[0].y,n);
    if(!sameSet(winners(arrows,n),[solution]))continue;

    const targetExtras=Math.round(total*(cfg.extra+Math.min(levelNo,18)*.012));
    let added=0,guard=0;
    while(added<targetExtras&&guard<targetExtras*90+260){
      guard++;
      const c=Math.floor(Math.random()*total);
      if(arrows[c].length>=3)continue;
      const options=shuffle([0,1,2,3,4,5,6,7].filter(d=>!arrows[c].includes(d)));
      if(!options.length)continue;
      const d=options[0];
      arrows[c].push(d);
      arrows[c].sort((a,b)=>a-b);
      if(sameSet(winners(arrows,n),[solution]))added++;
      else arrows[c].splice(arrows[c].indexOf(d),1);
    }
    return {n,arrows,solution,path,pathOrder:orderMap(path,n),mode,levelNo};
  }
  return fallbackPuzzle(cfg.n,mode,levelNo);
}

function fallbackPuzzle(n,mode,levelNo){
  const path=spiralCenterPath(n),total=n*n;
  const arrows=Array.from({length:total},()=>[]);
  for(let i=0;i<path.length-1;i++)arrows[idx(path[i].x,path[i].y,n)].push(dirBetween(path[i],path[i+1]));
  const last=path[path.length-1];
  arrows[idx(last.x,last.y,n)].push(outwardDir(last,n));
  return {n,arrows,solution:idx(path[0].x,path[0].y,n),path,pathOrder:orderMap(path,n),mode,levelNo};
}

function orderMap(path,n){
  const map=Array(n*n).fill(0);
  path.forEach((p,i)=>map[idx(p.x,p.y,n)]=i);
  return map;
}

function winners(arrows,n){
  const out=[];
  for(let i=0;i<n*n;i++){
    if(simulate(i,arrows,n,false).count===n*n)out.push(i);
  }
  return out;
}

function simulate(start,arrows,n,withTimeline){
  const total=n*n;
  const live=new Uint8Array(total);
  live.fill(1);
  const queue=[start];
  live[start]=0;
  let count=1,head=0;
  const timeline=withTimeline?[{source:start,shots:[],hits:[start],initial:true}]:null;
  while(head<queue.length){
    const source=queue[head++];
    const shots=[],hits=[];
    for(const dir of arrows[source]){
      const target=nextAlive(source,dir,live,n);
      shots.push({from:source,to:target,dir});
      if(target>=0){
        live[target]=0;
        queue.push(target);
        hits.push(target);
        count++;
      }
    }
    if(withTimeline&&shots.length)timeline.push({source,shots,hits});
  }
  return {count,timeline};
}

function nextAlive(source,dir,live,n){
  const p=xy(source,n),d=DIRS[dir];
  let x=p.x+d.dx,y=p.y+d.dy;
  while(x>=0&&x<n&&y>=0&&y<n){
    const id=idx(x,y,n);
    if(live[id])return id;
    x+=d.dx;y+=d.dy;
  }
  return -1;
}

function puzzleForCurrentLevel(){
  const key=String(level);
  if(!cache.has(key))cache.set(key,generatePuzzle(level));
  return cache.get(key);
}

function updateNav(){
  const lockedNext=level>=maxUnlocked;
  ui.prev.disabled=level<=1||state==="animating"||state==="settling";
  ui.next.disabled=lockedNext||state==="animating"||state==="settling";
  ui.winNext.disabled=lockedNext;
}

function unlockNextLevel(){
  if(level+1>maxUnlocked){
    maxUnlocked=level+1;
    saveUnlockedLevel();
  }
}

function modeLabel(mode){
  const names=["浅阵探测","环阵扩散","雾阵回声","重阵连锁","终阵谜域"];
  return names[mode]||"箭阵谜域";
}

function updateLevelCard(){
  if(!puzzle)return;
  const shown=Math.min(level,DISPLAY_LEVELS);
  ui.levelKicker.textContent="第 "+level+" / "+DISPLAY_LEVELS+" 关";
  ui.levelSize.textContent=puzzle.n+"×"+puzzle.n;
  ui.levelName.textContent=modeLabel(puzzle.mode);
  ui.levelNote.textContent=level<maxUnlocked
    ?"已完成关卡，可回看或继续下一关。"
    :"选择一个泡泡触发箭阵，找出一次清空全盘的阵心。";
  ui.levelRail.innerHTML="";
  for(let i=1;i<=DISPLAY_LEVELS;i++){
    const dot=document.createElement("span");
    dot.className="rail-dot"+(i<shown?" done":"")+(i===shown?" current":"");
    ui.levelRail.appendChild(dot);
  }
}

function startLevel(){
  if(level>maxUnlocked)level=maxUnlocked;
  puzzle=puzzleForCurrentLevel();
  alive=Array(puzzle.n*puzzle.n).fill(true);
  state="ready";
  tries=0;chain=0;elapsed=0;startedAt=performance.now();
  anim=null;particles=[];
  updateLevelCard();
  ui.win.classList.remove("show");
  setMessage(puzzle.n+"×"+puzzle.n+" · 找到唯一阵心");
  updateHud();
  updateNav();
  resizeBoard();
}

function resetBoard(keepMessage=false,keepStats=false){
  if(!puzzle)return;
  alive=Array(puzzle.n*puzzle.n).fill(true);
  state="ready";anim=null;particles=[];chain=0;hover=-1;
  if(!keepStats){
    tries=0;
    elapsed=0;
    startedAt=performance.now();
  }
  if(!keepMessage)setMessage("阵盘复原。");
  updateHud();
  updateNav();
}

function updateHud(){
  const total=puzzle?puzzle.n*puzzle.n:0;
  const left=alive.filter(Boolean).length;
  ui.tries.textContent=tries;
  ui.left.textContent=left+"/"+total;
  ui.chain.textContent=chain;
  ui.timer.textContent=Math.floor(elapsed/1000);
}

function setMessage(text){ui.msg.textContent=text}

function trigger(index){
  if(state!=="ready"||!puzzle||index<0)return;
  ensureAudio();
  tries++;
  const result=simulate(index,puzzle.arrows,puzzle.n,true);
  const total=puzzle.n*puzzle.n;
  alive=Array(total).fill(true);
  chain=0;
  anim={
    timeline:result.timeline,
    count:result.count,
    startIndex:index,
    stepMs:MODES[puzzle.mode].step,
    start:performance.now(),
    applied:-1,
    done:false
  };
  state="animating";
  setMessage("连锁触发。");
  updateHud();
  updateNav();
}

function applyAnimation(now){
  if(!anim||anim.done)return;
  const step=Math.floor((now-anim.start)/anim.stepMs);
  while(anim.applied<step&&anim.applied+1<anim.timeline.length){
    anim.applied++;
    const item=anim.timeline[anim.applied];
    for(const h of item.hits){
      if(alive[h]){
        alive[h]=false;
        chain++;
        burstAt(h,anim.applied===0?18:10);
        if(chain<8||chain%5===0)popSound(chain);
      }
    }
  }
  updateHud();
  if(anim.applied>=anim.timeline.length-1&&now-anim.start>anim.timeline.length*anim.stepMs+240){
    finishAnimation();
  }
}

function finishAnimation(){
  if(!anim||anim.done)return;
  anim.done=true;
  const total=puzzle.n*puzzle.n;
  if(anim.count===total){
    state="won";
    setMessage("全盘清空。");
    unlockNextLevel();
    winSound();
    updateLevelCard();
    updateNav();
    setTimeout(showWin,260);
  }else{
    state="settling";
    const left=total-anim.count;
    missSound();
    setMessage("还剩 "+left+" 个泡泡，阵心不在这里。");
    setTimeout(()=>resetBoard(true,true),780);
  }
}

function showWin(){
  const total=puzzle.n*puzzle.n;
  const secs=Math.floor(elapsed/1000);
  const score=Math.max(100,Math.round(total*28+MODES[puzzle.mode].n*60-tries*35-secs*3));
  ui.winCells.textContent=total;
  ui.winTries.textContent=tries;
  ui.winScore.textContent=score;
  ui.winText.textContent=puzzle.n+"×"+puzzle.n+" · 用时 "+secs+" 秒";
  updateNav();
  ui.win.classList.add("show");
}

function resizeBoard(){
  const rect=wrap.getBoundingClientRect();
  dpr=Math.min(window.devicePixelRatio||1,2);
  boardSize=Math.max(260,rect.width-24);
  canvas.width=Math.round(boardSize*dpr);
  canvas.height=Math.round(boardSize*dpr);
  canvas.style.width=boardSize+"px";
  canvas.style.height=boardSize+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  pad=Math.max(14,boardSize*.045);
  cell=(boardSize-pad*2)/puzzle.n;
}

function resizeMist(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  mist.width=Math.round(innerWidth*dpr);
  mist.height=Math.round(innerHeight*dpr);
  mist.style.width=innerWidth+"px";
  mist.style.height=innerHeight+"px";
  mctx.setTransform(dpr,0,0,dpr,0,0);
  backgroundDots=Array.from({length:70},()=>({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    r:Math.random()*2.2+0.5,
    s:Math.random()*0.3+0.08,
    a:Math.random()*Math.PI*2,
    c:Math.random()<.5?"157,226,255":(Math.random()<.5?"122,162,255":"201,184,255")
  }));
}

function cellCenter(i){
  const p=xy(i);
  return {x:pad+p.x*cell+cell/2,y:pad+p.y*cell+cell/2};
}

function pointerCell(evt){
  const rect=canvas.getBoundingClientRect();
  const x=(evt.clientX-rect.left)*(boardSize/rect.width);
  const y=(evt.clientY-rect.top)*(boardSize/rect.height);
  const gx=Math.floor((x-pad)/cell),gy=Math.floor((y-pad)/cell);
  if(!puzzle||gx<0||gx>=puzzle.n||gy<0||gy>=puzzle.n)return -1;
  return idx(gx,gy);
}

function drawMist(now){
  mctx.clearRect(0,0,innerWidth,innerHeight);
  for(const p of backgroundDots){
    p.y-=p.s;
    p.x+=Math.sin(now*.0003+p.a)*0.08;
    if(p.y<-10){p.y=innerHeight+10;p.x=Math.random()*innerWidth}
    mctx.beginPath();
    mctx.fillStyle="rgba("+p.c+","+(0.12+Math.sin(now*.001+p.a)*0.05)+")";
    mctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    mctx.fill();
  }
}

function drawBoard(now){
  if(!puzzle)return;
  ctx.clearRect(0,0,boardSize,boardSize);
  drawPlate();
  for(let i=0;i<puzzle.n*puzzle.n;i++)drawCell(i,now);
  drawBeams(now);
  drawParticles(now);
}

function drawPlate(){
  ctx.save();
  roundRect(ctx,2,2,boardSize-4,boardSize-4,8);
  const g=ctx.createLinearGradient(0,0,boardSize,boardSize);
  g.addColorStop(0,"rgba(32,50,102,.96)");
  g.addColorStop(.58,"rgba(12,20,48,.96)");
  g.addColorStop(1,"rgba(28,36,82,.96)");
  ctx.fillStyle=g;
  ctx.fill();
  ctx.strokeStyle="rgba(157,226,255,.22)";
  ctx.lineWidth=1.5;
  ctx.stroke();
  const n=puzzle.n;
  ctx.strokeStyle="rgba(157,226,255,.1)";
  ctx.lineWidth=1;
  for(let i=0;i<=n;i++){
    const p=pad+i*cell;
    ctx.beginPath();ctx.moveTo(p,pad);ctx.lineTo(p,boardSize-pad);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad,p);ctx.lineTo(boardSize-pad,p);ctx.stroke();
  }
  ctx.restore();
}

function drawCell(i,now){
  const c=cellCenter(i);
  const r=cell*.38;
  const live=alive[i];
  const isHover=i===hover&&state==="ready";
  if(!live){
    ctx.save();
    ctx.globalAlpha=.7;
    ctx.fillStyle="rgba(255,255,255,.06)";
    ctx.beginPath();
    ctx.arc(c.x,c.y,r*.58,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.strokeStyle="rgba(255,255,255,.2)";
    ctx.lineWidth=Math.max(1.2,cell*.025);
    ctx.arc(c.x,c.y,r*.68,Math.PI*.12,Math.PI*1.72);
    ctx.stroke();
    ctx.fillStyle="rgba(255,209,102,.28)";
    ctx.beginPath();
    ctx.arc(c.x+r*.24,c.y-r*.24,Math.max(1.3,r*.1),0,Math.PI*2);
    ctx.fill();
    ctx.restore();
    return;
  }
  ctx.save();
  if(isHover){
    ctx.shadowColor="rgba(255,209,102,.62)";
    ctx.shadowBlur=24;
  }
  ctx.fillStyle="rgba(7,38,43,.26)";
  ctx.beginPath();
  ctx.ellipse(c.x,c.y+r*.72,r*.72,r*.22,0,0,Math.PI*2);
  ctx.fill();
  const palette=bubblePalette(i);
  const grad=ctx.createRadialGradient(c.x-r*.35,c.y-r*.42,r*.07,c.x+r*.1,c.y+r*.08,r*1.06);
  grad.addColorStop(0,"rgba(255,255,255,.98)");
  grad.addColorStop(.18,palette.glow);
  grad.addColorStop(.54,palette.core);
  grad.addColorStop(1,palette.edge);
  ctx.beginPath();
  ctx.fillStyle=grad;
  ctx.arc(c.x,c.y,r,0,Math.PI*2);
  ctx.fill();
  ctx.lineWidth=Math.max(2,cell*.032);
  ctx.strokeStyle=palette.rim;
  ctx.stroke();
  ctx.lineWidth=Math.max(1,cell*.016);
  ctx.strokeStyle="rgba(255,255,255,.62)";
  ctx.beginPath();
  ctx.arc(c.x,c.y,r*.86,Math.PI*.08,Math.PI*1.08);
  ctx.stroke();
  ctx.beginPath();
  ctx.fillStyle="rgba(255,255,255,.54)";
  ctx.ellipse(c.x-r*.25,c.y-r*.34,r*.26,r*.13,-.55,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle="rgba(255,255,255,.7)";
  ctx.beginPath();
  ctx.arc(c.x+r*.3,c.y-r*.36,Math.max(1.2,r*.08),0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle=palette.cheek;
  ctx.beginPath();
  ctx.arc(c.x-r*.34,c.y+r*.12,r*.1,0,Math.PI*2);
  ctx.arc(c.x+r*.34,c.y+r*.12,r*.1,0,Math.PI*2);
  ctx.fill();
  const rank=puzzle.pathOrder[i]/(puzzle.n*puzzle.n);
  const tint=rank<.34?"rgba(255,209,102,.16)":rank<.67?"rgba(131,234,208,.14)":"rgba(255,143,135,.14)";
  ctx.beginPath();
  ctx.fillStyle=tint;
  ctx.arc(c.x,c.y,r*.82,0,Math.PI*2);
  ctx.fill();
  drawCellArrows(i,c,r,now);
  ctx.restore();
}

function bubblePalette(i){
  const palettes=[
    {glow:"rgba(255,255,255,.82)",core:"rgba(136,236,212,.62)",edge:"rgba(45,150,145,.78)",rim:"rgba(213,255,244,.82)",cheek:"rgba(255,143,135,.28)"},
    {glow:"rgba(255,255,255,.82)",core:"rgba(255,209,102,.58)",edge:"rgba(226,136,76,.76)",rim:"rgba(255,238,172,.82)",cheek:"rgba(255,143,135,.32)"},
    {glow:"rgba(255,255,255,.82)",core:"rgba(182,199,242,.58)",edge:"rgba(104,129,204,.76)",rim:"rgba(230,235,255,.82)",cheek:"rgba(255,187,203,.32)"},
    {glow:"rgba(255,255,255,.82)",core:"rgba(255,170,186,.54)",edge:"rgba(206,94,126,.74)",rim:"rgba(255,224,232,.82)",cheek:"rgba(255,220,155,.3)"}
  ];
  return palettes[(i+puzzle.pathOrder[i])%palettes.length];
}

function drawCellArrows(i,c,r,now){
  const arrows=puzzle.arrows[i];
  const len=r*(arrows.length===1?1.26:arrows.length===2?1.0:.86);
  const offsets=arrowOffsets(arrows.length,r);
  arrows.forEach((dir,k)=>{
    const o=offsets[k];
    drawArrow(c.x+o.x,c.y+o.y,DIRS[dir].angle,len);
  });
}

function arrowOffsets(count,r){
  if(count===1)return [{x:0,y:0}];
  if(count===2)return [{x:-r*.17,y:-r*.12},{x:r*.17,y:r*.12}];
  return [{x:0,y:-r*.22},{x:-r*.22,y:r*.16},{x:r*.22,y:r*.16}];
}

function drawArrow(x,y,angle,len){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(angle);
  ctx.lineJoin="round";

  const outline="#22495a";
  const inner="#f9fff8";
  const glow="#c8f7ff";
  const shadow="#0b3140";

  ctx.shadowColor="rgba(11,49,64,.28)";
  ctx.shadowBlur=Math.max(3,len*.09);
  ctx.shadowOffsetY=Math.max(1,len*.04);
  stickerArrowPath(len,1);
  ctx.fillStyle="rgba(255,255,255,.9)";
  ctx.fill();

  ctx.shadowColor="transparent";
  stickerArrowPath(len,.9);
  ctx.fillStyle=outline;
  ctx.fill();

  stickerArrowPath(len,.68);
  ctx.fillStyle=inner;
  ctx.fill();

  ctx.lineCap="round";
  ctx.strokeStyle=glow;
  ctx.lineWidth=Math.max(2.2,len*.12);
  ctx.beginPath();
  ctx.moveTo(-len*.43,-len*.08);
  ctx.lineTo(len*.1,-len*.08);
  ctx.stroke();

  ctx.strokeStyle=shadow;
  ctx.globalAlpha=.18;
  ctx.lineWidth=Math.max(1.8,len*.08);
  ctx.beginPath();
  ctx.moveTo(-len*.38,len*.11);
  ctx.lineTo(len*.06,len*.11);
  ctx.stroke();
  ctx.globalAlpha=1;
  ctx.restore();
}

function stickerArrowPath(len,scale){
  const l=len*scale;
  const shaftH=l*.42;
  const headH=l*.76;
  const left=-l*.68;
  const neck=l*.1;
  const tip=l*.72;
  ctx.beginPath();
  ctx.moveTo(left,-shaftH*.5);
  ctx.lineTo(neck,-shaftH*.5);
  ctx.lineTo(neck,-headH*.5);
  ctx.lineTo(tip,0);
  ctx.lineTo(neck,headH*.5);
  ctx.lineTo(neck,shaftH*.5);
  ctx.lineTo(left,shaftH*.5);
  ctx.closePath();
}

function drawBeams(now){
  if(!anim)return;
  const raw=(now-anim.start)/anim.stepMs;
  const current=Math.floor(raw);
  ctx.save();
  ctx.globalCompositeOperation="lighter";
  for(let i=Math.max(1,current-2);i<=Math.min(anim.timeline.length-1,current+1);i++){
    const local=raw-i;
    if(local<0||local>1.15)continue;
    const alpha=local<=1?1-local*.25:Math.max(0,1-(local-1)*6);
    const progress=Math.max(.05,Math.min(1,local));
    for(const shot of anim.timeline[i].shots)drawBeam(shot,progress,alpha);
  }
  ctx.restore();
}

function drawBeam(shot,progress,alpha){
  const a=cellCenter(shot.from);
  const b=shot.to>=0?cellCenter(shot.to):edgePoint(shot.from,shot.dir);
  const x=a.x+(b.x-a.x)*progress;
  const y=a.y+(b.y-a.y)*progress;
  const grad=ctx.createLinearGradient(a.x,a.y,b.x,b.y);
  grad.addColorStop(0,"rgba(122,162,255,0)");
  grad.addColorStop(.4,"rgba(157,226,255,"+(.75*alpha)+")");
  grad.addColorStop(1,"rgba(255,224,138,"+(.95*alpha)+")");
  ctx.strokeStyle=grad;
  ctx.lineWidth=Math.max(2.5,cell*.07);
  ctx.shadowColor="rgba(157,226,255,.8)";
  ctx.shadowBlur=16;
  ctx.beginPath();
  ctx.moveTo(a.x,a.y);
  ctx.lineTo(x,y);
  ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle="rgba(255,224,138,"+alpha+")";
  ctx.beginPath();
  ctx.arc(x,y,Math.max(2.5,cell*.055),0,Math.PI*2);
  ctx.fill();
}

function edgePoint(from,dir){
  const a=cellCenter(from),d=DIRS[dir];
  const min=pad,max=boardSize-pad;
  let tx=Infinity,ty=Infinity;
  if(d.dx>0)tx=(max-a.x)/d.dx;
  else if(d.dx<0)tx=(min-a.x)/d.dx;
  if(d.dy>0)ty=(max-a.y)/d.dy;
  else if(d.dy<0)ty=(min-a.y)/d.dy;
  const t=Math.min(tx,ty);
  return {x:a.x+d.dx*t,y:a.y+d.dy*t};
}

function burstAt(i,amount){
  const c=cellCenter(i);
  for(let k=0;k<amount;k++){
    const a=Math.random()*Math.PI*2;
    const speed=1.1+Math.random()*3.3;
    particles.push({
      x:c.x,y:c.y,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,
      r:Math.max(1.4,cell*(.018+Math.random()*.025)),
      born:performance.now(),dur:420+Math.random()*420,
      color:Math.random()<.45?"255,224,138":(Math.random()<.65?"157,226,255":"122,162,255")
    });
  }
}

function drawParticles(now){
  particles=particles.filter(p=>now-p.born<p.dur);
  ctx.save();
  ctx.globalCompositeOperation="lighter";
  for(const p of particles){
    const t=(now-p.born)/p.dur;
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=.025;
    ctx.beginPath();
    ctx.fillStyle="rgba("+p.color+","+(1-t)+")";
    ctx.arc(p.x,p.y,p.r*(1-t*.45),0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function roundRect(context,x,y,w,h,r){
  context.beginPath();
  context.moveTo(x+r,y);
  context.arcTo(x+w,y,x+w,y+h,r);
  context.arcTo(x+w,y+h,x,y+h,r);
  context.arcTo(x,y+h,x,y,r);
  context.arcTo(x,y,x+w,y,r);
  context.closePath();
}

function ensureAudio(){
  if(!soundOn)return;
  if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended")audioCtx.resume();
}

function trackBgmNode(node){
  bgmNodes.push(node);
  node.onended=()=>{bgmNodes=bgmNodes.filter(n=>n!==node)};
}

function getBgm(){
  if(!bgmAudio){
    bgmAudio=new Audio(BGM_URL);
    bgmAudio.preload="auto";
    bgmAudio.loop=true;
    bgmAudio.playsInline=true;
    bgmAudio.crossOrigin="anonymous";
    bgmAudio.volume=BGM_VOLUME;
    bgmAudio.addEventListener("error",()=>{
      bgmFailed=true;
      startSoftBgm();
    });
  }
  return bgmAudio;
}

function startBgm(){
  if(!soundOn)return;
  ensureAudio();
  if(bgmFailed||!/^https?:\/\/[^?#]+\.(mp3|m4a|ogg|wav)(\?|#|$)/i.test(BGM_URL)){
    startSoftBgm();
    return;
  }
  const audio=getBgm();
  audio.muted=false;
  audio.volume=BGM_VOLUME;
  const play=audio.play();
  if(play&&play.catch)play.catch(()=>startSoftBgm());
}

function stopBgm(){
  if(bgmAudio)bgmAudio.pause();
  if(bgmTimer){clearInterval(bgmTimer);bgmTimer=null}
  for(const node of bgmNodes){
    try{node.stop()}catch(err){}
  }
  bgmNodes=[];
}

function startSoftBgm(){
  if(!soundOn||!audioCtx||bgmTimer)return;
  bgmStep=0;
  playSoftBgmStep();
  bgmTimer=setInterval(playSoftBgmStep,920);
}

function playSoftBgmStep(){
  if(!soundOn||!audioCtx)return;
  const now=audioCtx.currentTime;
  const root=[196,220,247,294][Math.floor(bgmStep/4)%4];
  const melody=[1,1.5,2,2.5,3,2.5,2,1.5][bgmStep%8];
  bgmPad(root,now);
  bgmChime(root*melody,now+.04);
  bgmStep++;
}

function bgmPad(freq,when){
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  const filter=audioCtx.createBiquadFilter();
  osc.type="sine";
  osc.frequency.setValueAtTime(freq,when);
  filter.type="lowpass";
  filter.frequency.setValueAtTime(760,when);
  gain.gain.setValueAtTime(0,when);
  gain.gain.linearRampToValueAtTime(.014,when+.08);
  gain.gain.exponentialRampToValueAtTime(.0001,when+1.15);
  osc.connect(filter).connect(gain).connect(audioCtx.destination);
  osc.start(when);
  osc.stop(when+1.2);
  trackBgmNode(osc);
}

function bgmChime(freq,when){
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.type="triangle";
  osc.frequency.setValueAtTime(freq,when);
  gain.gain.setValueAtTime(0,when);
  gain.gain.linearRampToValueAtTime(.018,when+.025);
  gain.gain.exponentialRampToValueAtTime(.0001,when+.42);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(when);
  osc.stop(when+.46);
  trackBgmNode(osc);
}

function tone(freq,dur,type="sine",gain=.05,delay=0){
  if(!soundOn||!audioCtx)return;
  const now=audioCtx.currentTime+delay;
  const osc=audioCtx.createOscillator();
  const amp=audioCtx.createGain();
  osc.type=type;
  osc.frequency.setValueAtTime(freq,now);
  amp.gain.setValueAtTime(0,now);
  amp.gain.linearRampToValueAtTime(gain,now+.01);
  amp.gain.exponentialRampToValueAtTime(.0001,now+dur);
  osc.connect(amp).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now+dur+.03);
}
function popSound(n){tone(260+n*7,.09,"triangle",.035);tone(620+n*4,.07,"sine",.018)}
function missSound(){tone(130,.18,"sawtooth",.03);tone(92,.22,"triangle",.025,.05)}
function tapSound(){tone(540,.08,"sine",.035);tone(760,.12,"triangle",.026,.07)}
function winSound(){[392,523,659,784].forEach((f,i)=>tone(f,.18,"triangle",.04,i*.08))}

function loop(now){
  elapsed=startedAt?now-startedAt:0;
  drawMist(now);
  applyAnimation(now);
  drawBoard(now);
  updateHud();
  requestAnimationFrame(loop);
}

canvas.addEventListener("pointerdown",evt=>{
  const c=pointerCell(evt);
  if(c>=0)trigger(c,false);
});
canvas.addEventListener("pointermove",evt=>{
  hover=pointerCell(evt);
});
canvas.addEventListener("pointerleave",()=>hover=-1);

ui.prev.addEventListener("click",()=>{if(level>1){level--;startLevel()}});
ui.next.addEventListener("click",()=>{
  if(level<maxUnlocked){level++;startLevel()}
  else setMessage("先破当前阵，下一关才会开启。");
});
ui.reset.addEventListener("click",()=>{ensureAudio();resetBoard()});
ui.sound.addEventListener("click",()=>{
  soundOn=!soundOn;
  ui.sound.textContent=soundOn?"声音":"静音";
  if(soundOn){ensureAudio();startBgm();tapSound()}
  else stopBgm();
});
ui.again.addEventListener("click",()=>{ui.win.classList.remove("show");startLevel()});
ui.closeWin.addEventListener("click",()=>ui.win.classList.remove("show"));
ui.winNext.addEventListener("click",()=>{
  if(level<maxUnlocked){level++;startLevel()}
});

function launchGame(evt){
  if(evt){evt.preventDefault();evt.stopPropagation()}
  if(launched)return;
  launched=true;
  startedAt=performance.now();
  elapsed=0;
  updateHud();
  if(ui.welcome){
    ui.welcome.classList.add("hide");
    setTimeout(()=>{ui.welcome.style.display="none"},520);
  }
  ensureAudio();
  startBgm();
  tapSound();
}

ui.welcomeStart.addEventListener("click",launchGame);
ui.welcomeStart.addEventListener("touchend",launchGame,{passive:false});

window.addEventListener("resize",()=>{resizeMist();resizeBoard()});
resizeMist();
startLevel();
requestAnimationFrame(loop);
</script>
<script id="touchGuardScript">
(function(){
  const allowText = 'input, textarea, [contenteditable="true"]';
  const isAllowed = target => {
    const el = target && target.nodeType === 1 ? target : target && target.parentElement;
    return !!(el && el.closest && el.closest(allowText));
  };
  ['selectstart','dragstart','contextmenu'].forEach(type => {
    document.addEventListener(type, event => {
      if(!isAllowed(event.target)) event.preventDefault();
    }, {passive:false});
  });
})();
</script>
<script id="hubReturnScript">
(function(){
  if(document.getElementById('hubReturnBtn')) return;
  function hubHref(){
    const url = new URL(location.href);
    const parts = url.pathname.split('/');
    const decoded = parts.map(part => {
      try{return decodeURIComponent(part);}catch(e){return part;}
    });
    const markers = ['G-Game-发布版','g-game-hub','写程序'];
    let pivot = -1;
    markers.forEach(marker => {
      const idx = decoded.lastIndexOf(marker);
      if(idx > pivot) pivot = idx;
    });
    if(pivot >= 0){
      url.pathname = parts.slice(0, pivot + 1).join('/') + '/G-Game/index.html';
      url.search = '?v=return-hub';
      url.hash = '';
      return url.href;
    }
    return new URL('../G-Game/index.html?v=return-hub', location.href).href;
  }
  function mount(){
    if(!document.body) return;
    const link = document.createElement('a');
    link.id = 'hubReturnBtn';
    link.href = hubHref();
    link.target = '_top';
    link.textContent = '返回大厅';
    link.setAttribute('aria-label', '返回大厅');
    document.body.appendChild(link);
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', mount, {once:true});
  else mount();
})();
</script>
