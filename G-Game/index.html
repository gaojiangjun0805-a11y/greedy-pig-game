<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>G-Game 六维脑力空间</title>
<style>
  :root{
    --bg:#060812;
    --panel:rgba(12,18,34,.74);
    --panel-strong:rgba(15,22,42,.92);
    --line:rgba(170,205,255,.18);
    --line-strong:rgba(170,205,255,.34);
    --text:#f3f7ff;
    --muted:#9aabc6;
    --space:#4aa8ff;
    --logic:#a778ff;
    --memory:#ffd166;
    --observe:#2ee6d6;
    --create:#ff7fca;
    --calc:#75e06f;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif}
  button{font:inherit;color:inherit}
  #stage{position:fixed;inset:0;background:#03060f}
  #three{position:absolute;inset:0;width:100%;height:100%;display:block}
  #safetyOverlay{
    position:fixed;left:50%;top:50%;z-index:2;transform:translate(-50%,-50%);pointer-events:none;
    width:min(46vw,420px);height:min(46vw,420px);border-radius:50%;
    background:radial-gradient(circle,rgba(159,216,255,.07),rgba(255,127,202,.04) 42%,transparent 70%);
    filter:blur(1px);
  }

  .topbar{
    position:fixed;left:18px;right:18px;top:14px;z-index:10;
    display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;
    pointer-events:none;
  }
  .brand,.quick,.radarPanel,.portalInfo,.diyPanel,.gameDock{
    border:1px solid var(--line);background:var(--panel);box-shadow:0 18px 60px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.08);
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  }
  .brand{padding:12px 16px;border-radius:14px;min-width:260px}
  .brand h1{font-size:24px;line-height:1;font-weight:900;letter-spacing:0;background:linear-gradient(110deg,#fff,#9fd8ff,#ffdb8a,#ff8bcf,#7df0a0);-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand p{font-size:13px;color:var(--muted);margin-top:7px;letter-spacing:0}
  .quick{justify-self:end;display:flex;gap:8px;padding:8px;border-radius:14px;pointer-events:auto}
  .quick button,.primaryBtn,.ghostBtn,.chipBtn{
    height:38px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.08);padding:0 13px;cursor:pointer;
    transition:transform .12s ease,border-color .16s ease,background .16s ease;
  }
  .quick button:active,.primaryBtn:active,.ghostBtn:active,.chipBtn:active{transform:scale(.96)}
  #radarToggle{display:none}
  #soundToggle.active{border-color:var(--observe);background:rgba(46,230,214,.16)}
  .primaryBtn{border:none;background:linear-gradient(135deg,#9fd8ff,#7df0a0);color:#06101c;font-weight:900}
  .ghostBtn{background:rgba(255,255,255,.08);color:var(--text)}
  .chipBtn.active{border-color:var(--observe);background:rgba(46,230,214,.15)}

  .radarPanel{
    position:fixed;left:auto;right:18px;top:88px;bottom:auto;z-index:11;width:150px;border-radius:14px;padding:8px;
    background:rgba(9,15,29,.56);cursor:pointer;
  }
  .panelTitle{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-bottom:2px}
  .panelTitle h2{font-size:12px;font-weight:900;letter-spacing:0}
  .levelBadge{font-size:10px;color:#07101d;background:linear-gradient(135deg,#ffdb8a,#7df0a0);font-weight:900;border-radius:999px;padding:3px 7px}
  .radarClose{display:none;width:26px;height:26px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.08);cursor:pointer}
  #radar{width:100%;height:100px;display:block}
  .progressStats{display:none;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px}
  .progressStat{border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:7px 8px;background:rgba(255,255,255,.045)}
  .progressStat span{display:block;color:var(--muted);font-size:10px;font-weight:800}
  .progressStat b{display:block;margin-top:2px;color:var(--text);font-size:13px;font-variant-numeric:tabular-nums}
  .abilityGrid{display:none;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
  .abilityItem{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:7px 9px;background:rgba(255,255,255,.04)}
  .abilityItem b{color:var(--text);font-variant-numeric:tabular-nums}
  .radarPanel.expanded{
    width:min(300px,calc(100vw - 20px));padding:12px;cursor:default;background:rgba(9,15,29,.86);
  }
  .radarPanel.expanded .panelTitle{margin-bottom:8px}
  .radarPanel.expanded .panelTitle h2{font-size:16px}
  .radarPanel.expanded .levelBadge{font-size:11px;padding:4px 8px}
  .radarPanel.expanded .radarClose{display:inline-flex;align-items:center;justify-content:center}
  .radarPanel.expanded #radar{height:178px}
  .radarPanel.expanded .progressStats{display:grid}
  .radarPanel.expanded .abilityGrid{display:grid}
  body.diyOpen .radarPanel{display:none}

  .portalInfo{
    position:fixed;left:18px;right:auto;bottom:18px;z-index:11;width:350px;border-radius:16px;padding:16px;display:none;
  }
  .portalInfo.show{display:block;animation:fadeUp .18s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .portalInfo h2{font-size:22px;font-weight:900;margin-bottom:6px}
  .portalInfo p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:12px}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 14px}
  .tag{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:5px 9px;background:rgba(255,255,255,.06)}
  .portalActions{display:flex;gap:10px}
  .portalActions button{flex:1}

  .diyPanel{
    position:fixed;right:18px;top:86px;z-index:12;width:330px;max-height:calc(100vh - 112px);overflow:auto;border-radius:16px;padding:16px;display:none;
  }
  .diyPanel.show{display:block;animation:fadeUp .18s ease both}
  .diyRow{margin-top:14px}
  .diyRow h3{font-size:13px;color:var(--muted);font-weight:800;margin-bottom:8px}
  .swatches,.choices{display:flex;flex-wrap:wrap;gap:8px}
  .swatch{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.28);cursor:pointer}
  .swatch.active{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.14)}
  .choices button.active{border-color:var(--memory);background:rgba(255,209,102,.14)}

  .gameDock{
    position:fixed;inset:14px;z-index:30;border-radius:18px;display:none;overflow:hidden;background:rgba(3,7,16,.96);
  }
  .gameDock.show{display:grid;grid-template-rows:54px 1fr}
  .gameTop{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--line);background:rgba(9,14,28,.96)}
  .gameTop h2{font-size:18px;font-weight:900;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:auto}
  #gameFrame{width:100%;height:100%;border:0;background:#000}

  .mobilePad{
    position:fixed;left:18px;right:auto;bottom:18px;z-index:12;width:112px;height:112px;border-radius:50%;
    border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);display:block;touch-action:none;
  }
  .stick{position:absolute;left:38px;top:38px;width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#9fd8ff,#7df0a0);box-shadow:0 8px 24px rgba(0,0,0,.34)}
  .enterHint{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:12;
    padding:10px 16px;border-radius:999px;background:rgba(10,16,30,.82);border:1px solid var(--line);color:var(--text);font-weight:900;display:none;
    -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  }
  .enterHint.show{display:block}
  .toast{
    position:fixed;left:50%;top:84px;z-index:40;transform:translateX(-50%);
    background:rgba(10,18,32,.9);border:1px solid var(--line-strong);padding:11px 16px;border-radius:999px;display:none;font-weight:900;
    max-width:calc(100vw - 28px);text-align:center;line-height:1.35;
  }
  .toast.show{display:block;animation:fadeUp .18s ease both}
  #bootCover{
    position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 30%,#14213f,#050812 72%);
    color:var(--text);padding:22px;text-align:center;
  }
  #bootCover.hide{opacity:0;pointer-events:none;transition:opacity .45s ease}
  .bootCard{width:min(92vw,780px);padding:34px 26px;border-radius:20px;border:1px solid var(--line-strong);background:rgba(10,16,30,.74);box-shadow:0 24px 90px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px)}
  .bootLogo{font-size:clamp(48px,11vw,94px);font-weight:900;letter-spacing:2px;background:linear-gradient(110deg,#fff,#9fd8ff,#ffdb8a,#ff8bcf,#7df0a0);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 4px 30px rgba(159,216,255,.34))}
  .bootTitle{font-size:clamp(20px,4.6vw,32px);font-weight:900;margin-top:8px}
  .bootSub{color:var(--muted);font-size:15px;line-height:1.7;margin:10px auto 20px;max-width:560px}
  .bootPulse{width:118px;height:3px;border-radius:999px;margin:18px auto 0;background:linear-gradient(90deg,transparent,#9fd8ff,#7df0a0,transparent);animation:pulseLine 1.2s ease-in-out infinite}
  @keyframes pulseLine{0%,100%{opacity:.28;transform:scaleX(.62)}50%{opacity:1;transform:scaleX(1)}}
  .bootLoading{display:none;place-items:center;gap:12px;margin:18px auto 4px;color:var(--muted)}
  .bootSpinner{width:54px;height:54px;border-radius:50%;border:3px solid rgba(255,255,255,.14);border-top-color:#7df0a0;border-right-color:#9fd8ff;animation:spin .85s linear infinite;box-shadow:0 0 26px rgba(127,240,160,.16)}
  .bootLoadingTitle{font-size:18px;font-weight:900;color:var(--text)}
  .bootLoadingText{max-width:520px;font-size:13px;line-height:1.65}
  .bootCard.loading .bootProfile,.bootCard.loading .bootActions{display:none}
  .bootCard.loading .bootLoading{display:grid}
  @keyframes spin{to{transform:rotate(360deg)}}
  .bootActions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .bootActions button,.bootActions a{height:44px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.08);padding:0 20px;color:var(--text);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-weight:900}
  .bootActions .start{border:none;background:linear-gradient(135deg,#9fd8ff,#7df0a0);color:#06101c}
  .bootProfile{display:grid;gap:12px;max-width:560px;margin:0 auto 18px;text-align:left}
  .fieldLabel{display:grid;gap:7px;color:var(--muted);font-size:13px;font-weight:800}
  .textInput{
    width:100%;height:42px;border-radius:12px;border:1px solid var(--line);outline:none;
    background:rgba(255,255,255,.08);color:var(--text);padding:0 12px;font:900 15px/1 "PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif;
  }
  .textInput:focus{border-color:rgba(46,230,214,.72);box-shadow:0 0 0 3px rgba(46,230,214,.1)}
  .presetGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .presetBtn{
    min-height:46px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.06);
    color:var(--text);font-weight:900;text-align:left;padding:8px 10px;cursor:pointer;
  }
  .presetBtn.active{border-color:rgba(46,230,214,.78);background:rgba(46,230,214,.14)}
  .presetBtn small{display:block;color:var(--muted);font-size:11px;margin-top:3px;font-weight:800}
  .fallbackList{display:none;margin-top:18px;grid-template-columns:repeat(auto-fit,minmax(138px,1fr));gap:8px}
  .fallbackList a{color:var(--text);text-decoration:none;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(255,255,255,.06);font-size:14px;text-align:left}
  body.fallback .fallbackList{display:grid}
  body.fallback #bootMsg{color:#ffdb8a}

  @media (max-width:820px){
    .topbar{left:10px;right:10px;top:10px;grid-template-columns:1fr auto}
    .topbar > div{display:none}
    .brand{min-width:0;padding:8px 10px;border-radius:12px;visibility:hidden}
    .brand h1{font-size:15px}
    .brand p{display:none}
    .presetGrid{grid-template-columns:1fr}
    .quick{gap:5px;padding:6px;border-radius:12px}
    .quick button{height:30px;padding:0 8px;font-size:12px;border-radius:8px}
    #radarToggle{display:none}
    .radarPanel{
      left:10px;right:auto;bottom:auto;top:10px;width:126px;display:block;
      padding:7px;border-radius:14px;background:rgba(9,15,29,.56);
      box-shadow:0 10px 30px rgba(0,0,0,.26),inset 0 1px 0 rgba(255,255,255,.08);
    }
    .radarPanel.showMobile{display:block}
    .radarPanel .panelTitle{margin-bottom:2px;gap:4px}
    .radarPanel .panelTitle h2{font-size:11px}
    .radarPanel .levelBadge{font-size:9px;padding:2px 6px}
    #radar{height:74px}
    .abilityGrid{display:none}
    .portalInfo{left:112px;right:8px;bottom:8px;width:auto;padding:10px;border-radius:14px;max-height:34vh;overflow:auto}
    .portalInfo h2{font-size:17px;margin-bottom:4px}
    .portalInfo p{font-size:12px;line-height:1.45;margin-bottom:7px}
    .tags{gap:5px;margin:7px 0 9px}
    .tag{font-size:11px;padding:4px 7px}
    .portalActions{gap:6px}
    .portalActions button{height:34px;font-size:13px;border-radius:9px;padding:0 8px}
    .diyPanel{left:10px;right:10px;top:64px;width:auto;max-height:calc(100vh - 82px);padding:12px}
    .mobilePad{display:block;left:12px;right:auto;bottom:12px;width:86px;height:86px}
    .stick{left:28px;top:28px;width:30px;height:30px}
    .enterHint.show{display:none}
    .gameDock{inset:8px;border-radius:14px}
    .gameTop h2{font-size:15px}
  }
</style>
<style id="touchGuardStyle">
  html, body, body *{
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
  }
  img, svg, canvas{
    -webkit-user-drag:none;
    user-drag:none;
  }
  input, textarea, [contenteditable="true"]{
    -webkit-user-select:text;
    user-select:text;
    -webkit-touch-callout:default;
  }
</style>
</head>
<body>
<div id="bootCover">
  <div class="bootCard">
    <div class="bootLogo">G-Game</div>
    <div class="bootTitle">六维脑力空间</div>
    <div class="bootSub">空间力 · 推理力 · 记忆力 · 观察力 · 创造力 · 计算力</div>
    <div class="bootProfile">
      <label class="fieldLabel" for="bootPlayerId">
        玩家ID
        <input class="textInput" id="bootPlayerId" maxlength="24" autocomplete="username" placeholder="输入固定ID" required>
      </label>
      <label class="fieldLabel" for="bootNickname">
        玩家昵称
        <input class="textInput" id="bootNickname" maxlength="12" autocomplete="nickname" placeholder="输入你的名字">
      </label>
      <div class="fieldLabel">
        角色选择
        <div class="presetGrid" id="bootPresetChoices"></div>
      </div>
    </div>
    <div class="bootActions">
      <button class="start" id="bootStart" type="button">进入大厅</button>
    </div>
    <div class="bootLoading" id="bootLoading">
      <div class="bootSpinner" aria-hidden="true"></div>
      <div class="bootLoadingTitle" id="bootLoadingTitle">正在加载大厅</div>
      <div class="bootLoadingText" id="bootLoadingText">正在读取真实角色模型和大厅资源，完成后直接进入。</div>
    </div>
    <div class="bootPulse"></div>
  </div>
</div>

<div id="stage"><div id="safetyOverlay"></div><canvas id="three"></canvas></div>

<header class="topbar">
  <section class="brand">
    <h1>G-Game 六维脑力空间</h1>
    <p>空间力 · 推理力 · 记忆力 · 观察力 · 创造力 · 计算力</p>
  </section>
  <div></div>
  <nav class="quick">
    <button id="radarToggle">六维</button>
    <button id="soundToggle">音</button>
    <button id="diyToggle">DIY</button>
    <button id="resetData">重置</button>
  </nav>
</header>

<aside class="radarPanel" id="radarPanel">
  <div class="panelTitle">
    <h2>能力雷达</h2>
    <span class="levelBadge" id="levelBadge">Lv.1</span>
    <button class="radarClose" id="radarClose" type="button" aria-label="关闭雷达详情">×</button>
  </div>
  <canvas id="radar" width="584" height="420"></canvas>
  <div class="progressStats" id="progressStats"></div>
  <div class="abilityGrid" id="abilityGrid"></div>
</aside>

<aside class="portalInfo" id="portalInfo">
  <h2 id="portalName">游戏名</h2>
  <p id="portalDesc">游戏简介</p>
  <div class="tags" id="portalTags"></div>
  <div class="portalActions">
    <button class="primaryBtn" id="playGame">进入挑战</button>
    <button class="ghostBtn" id="markDone">完成加分</button>
  </div>
</aside>

<aside class="diyPanel" id="diyPanel">
  <div class="panelTitle">
    <h2>角色 DIY</h2>
    <button class="ghostBtn" id="closeDiy">关闭</button>
  </div>
  <div class="diyRow">
    <h3>玩家昵称</h3>
    <input class="textInput" id="nicknameInput" maxlength="12" autocomplete="nickname" placeholder="输入你的名字">
  </div>
  <div class="diyRow">
    <h3>角色选择</h3>
    <div class="choices" id="presetChoices"></div>
  </div>
  <div class="diyRow">
    <h3>服装颜色</h3>
    <div class="swatches" id="colorSwatches"></div>
  </div>
  <div class="diyRow">
    <h3>肤色</h3>
    <div class="swatches" id="skinSwatches"></div>
  </div>
  <div class="diyRow">
    <h3>脸部</h3>
    <div class="choices" id="faceChoices"></div>
  </div>
  <div class="diyRow">
    <h3>神态</h3>
    <div class="choices" id="expressionChoices"></div>
  </div>
  <div class="diyRow">
    <h3>性别</h3>
    <div class="choices" id="genderChoices"></div>
  </div>
  <div class="diyRow">
    <h3>发型</h3>
    <div class="choices" id="hairChoices"></div>
  </div>
  <div class="diyRow">
    <h3>身高</h3>
    <div class="choices" id="heightChoices"></div>
  </div>
  <div class="diyRow">
    <h3>身材</h3>
    <div class="choices" id="buildChoices"></div>
  </div>
	  <div class="diyRow">
	    <h3>服装</h3>
	    <div class="choices" id="suitChoices"></div>
	  </div>
	  <div class="diyRow">
	    <h3>下装</h3>
	    <div class="choices" id="bottomChoices"></div>
	  </div>
	  <div class="diyRow">
	    <h3>鞋子</h3>
	    <div class="choices" id="shoeChoices"></div>
	  </div>
	  <div class="diyRow">
	    <h3>动作</h3>
	    <div class="choices" id="actionChoices"></div>
  </div>
</aside>

<section class="gameDock" id="gameDock">
  <div class="gameTop">
    <button class="ghostBtn" id="closeGame">返回大厅</button>
    <h2 id="gameTitle">游戏</h2>
    <button class="primaryBtn" id="completeGame">完成本局</button>
  </div>
  <iframe id="gameFrame" title="G-Game embedded game"></iframe>
</section>

<div class="mobilePad" id="mobilePad"><div class="stick" id="stick"></div></div>
<div class="enterHint" id="enterHint">进入挑战</div>
<div class="toast" id="toast"></div>
<audio id="hubBgm" preload="auto" autoplay muted playsinline src="audio/hub-bgm.mp3"></audio>

<script>
const fallbackButton = document.getElementById('showFallback');
if(fallbackButton){
  fallbackButton.addEventListener('click', function(){
    document.body.classList.add('fallback');
    var msg = document.getElementById('bootMsg');
    if(msg) msg.textContent = '基础列表模式：直接点击游戏进入。';
  });
}
window.addEventListener('error', function(e){
  document.body.classList.add('fallback');
  var msg = document.getElementById('bootMsg');
  if(msg) msg.textContent = '3D 大厅加载遇到问题，先用基础列表进入游戏。错误：' + (e.message || '未知错误');
});
window.addEventListener('unhandledrejection', function(e){
  document.body.classList.add('fallback');
  var msg = document.getElementById('bootMsg');
  if(msg) msg.textContent = '3D 大厅加载遇到问题，先用基础列表进入游戏。';
});
</script>

{
  "imports": {
    "three": "./assets/vendor/three.module.min.js",

  }
}

function loadState(){
  const defaults = createDefaultState();
  try{
    const raw = currentPlayerId ? localStorage.getItem(storageKeyForPlayer(currentPlayerId)) : localStorage.getItem(LEGACY_STORAGE_KEY);
    const saved = JSON.parse(raw || '{}') || {};
    return normalizeState(saved, defaults);
  }catch(e){ return defaults; }
}
function createDefaultState(){
  return {
    abilities:{space:20,logic:20,memory:20,observe:20,create:20,calc:20},
    completed:{},
    progress:{xp:0, games:{}, events:[], unlocks:{}},
    profile:{nickname:'玩家', preset:'astronaut'},
    avatar:{color:'#4aa8ff', skin:'#d9a982', face:'natural', expression:'neutral', gender:'neutral', hair:'short', height:'mid', build:'standard', suit:'sport', bottom:'pants', legwear:'bare', shoes:'boot'}
  };
}
function normalizeState(saved={}, defaults=createDefaultState()){
  const profile = {...defaults.profile, ...(saved.profile||{})};
  profile.nickname = sanitizeNickname(profile.nickname);
  if(!Object.prototype.hasOwnProperty.call(AVATAR_PRESETS, profile.preset)) profile.preset = 'astronaut';
  const avatar = {...defaults.avatar, ...(saved.avatar||{})};
  if(!/^#[0-9a-f]{6}$/i.test(avatar.skin || '')) avatar.skin = defaults.avatar.skin;
  if(!Object.prototype.hasOwnProperty.call(FACE_PRESETS, avatar.face)) avatar.face = 'natural';
  if(!Object.prototype.hasOwnProperty.call(EXPRESSION_PRESETS, avatar.expression)) avatar.expression = 'neutral';
  if(!['neutral','female','male'].includes(avatar.gender)) avatar.gender = 'neutral';
  if(!['short','bob','ponytail','curly'].includes(avatar.hair)) avatar.hair = 'short';
  if(!['short','mid','tall'].includes(avatar.height)) avatar.height = 'mid';
  if(!['slim','standard','strong'].includes(avatar.build)) avatar.build = 'standard';
  if(!['sport','jacket','coat'].includes(avatar.suit)) avatar.suit = avatar.suit === 'long' ? 'coat' : 'sport';
  if(!['pants','shorts'].includes(avatar.bottom)) avatar.bottom = 'pants';
  avatar.legwear = 'bare';
  if(!['sneaker','boot'].includes(avatar.shoes)) avatar.shoes = 'boot';
  const abilities = normalizeAbilities({...defaults.abilities, ...(saved.abilities||{})});
  const completed = {...(saved.completed||{})};
  const progress = normalizeProgress(saved.progress, completed, abilities);
  return {abilities, completed, progress, profile, avatar};
}
function stateSnapshot(){
  return JSON.parse(JSON.stringify({
    abilities:state.abilities,
    completed:state.completed,
    progress:state.progress,
    profile:state.profile,
    avatar:state.avatar
  }));
}
function storageKeyForPlayer(playerId=currentPlayerId){
  return playerId ? `${ACCOUNT_STORAGE_PREFIX}${playerId}` : LEGACY_STORAGE_KEY;
}
function saveState(){
  const json = JSON.stringify(stateSnapshot());
  localStorage.setItem(storageKeyForPlayer(currentPlayerId), json);
  localStorage.setItem(LEGACY_STORAGE_KEY, json);
  scheduleBackendSave();
}
function backendEnabled(){
  return !!(BACKEND_CONFIG.supabaseUrl && BACKEND_CONFIG.supabaseAnonKey && currentPlayerId);
}
function backendEndpoint(query=''){
  return `${String(BACKEND_CONFIG.supabaseUrl).replace(/\/$/,'')}/rest/v1/${BACKEND_CONFIG.table}${query}`;
}
function backendHeaders(extra={}){
  return {
    apikey:BACKEND_CONFIG.supabaseAnonKey,
    Authorization:`Bearer ${BACKEND_CONFIG.supabaseAnonKey}`,
    'Content-Type':'application/json',
    ...extra
  };
}
async function fetchBackendState(playerId){
  if(!BACKEND_CONFIG.supabaseUrl || !BACKEND_CONFIG.supabaseAnonKey || !playerId) return null;
  const query = `?player_id=eq.${encodeURIComponent(playerId)}&select=state&limit=1`;
  const res = await fetch(backendEndpoint(query), {headers:backendHeaders()});
  if(!res.ok) throw new Error(`load ${res.status}`);
  const rows = await res.json();
  return rows?.[0]?.state || null;
}
async function saveBackendStateNow(){
  if(!backendEnabled() || backendBusy) return;
  backendBusy = true;
  try{
    const body = {
      player_id:currentPlayerId,
      nickname:state.profile?.nickname || '玩家',
      state:stateSnapshot(),
      updated_at:new Date().toISOString()
    };
    const res = await fetch(backendEndpoint('?on_conflict=player_id'), {
      method:'POST',
      headers:backendHeaders({Prefer:'resolution=merge-duplicates,return=minimal'}),
      body:JSON.stringify(body)
    });
    if(!res.ok) throw new Error(`save ${res.status}`);
  }catch(e){
    console.warn('G-Game backend save skipped:', e);
  }finally{
    backendBusy = false;
  }
}
function scheduleBackendSave(){
  if(!backendEnabled()) return;
  clearTimeout(backendSaveTimer);
  backendSaveTimer = setTimeout(saveBackendStateNow, 900);
}
function applyLoadedState(nextState){
  const previousModel = getAvatarModelUrl();
  const normalized = normalizeState(nextState || {});
  Object.keys(state).forEach(key => delete state[key]);
  Object.assign(state, normalized);
  applyAvatarStyle();
  if(previousModel !== getAvatarModelUrl()){
    avatarModelStatus = 'idle';
    avatarModelUrlReady = '';
    avatarModelUrlLoading = '';
    if(hubEntered) loadRealAvatarModel();
  }
  updateAvatarNameLabel();
  updateProfileUi();
  updateAbilityGrid();
  drawRadar();
  if(focusedPortal) focusPortal(focusedPortal);
}
async function switchPlayerAccount(playerId){
  const safeId = sanitizePlayerId(playerId);
  if(!safeId) throw new Error('missing player id');
  const hasLocalState = !!localStorage.getItem(storageKeyForPlayer(safeId));
  currentPlayerId = safeId;
  localStorage.setItem(PLAYER_ID_STORAGE_KEY, safeId);
  let remoteState = null;
  try{
    remoteState = await fetchBackendState(safeId);
  }catch(e){
    console.warn('G-Game backend load skipped:', e);
  }
  const localState = loadState();
  applyLoadedState(remoteState || localState);
  saveState();
  return !!(remoteState || hasLocalState);
}

function clampNumber(value, min, max, fallback=min){
  const n = Number(value);
  return Number.isFinite(n) ? Math.max(min, Math.min(max, n)) : fallback;
}
function normalizeAbilities(raw){
  const out = {};
  ABILITIES.forEach(a => {
    out[a.key] = clampNumber(raw?.[a.key], 0, REWARD_RULES.abilityCap, 20);
  });
  return out;
}
function createProgress(){
  return {xp:0, games:{}, events:[], unlocks:{}};
}
function normalizeProgress(saved={}, completed={}, abilities){
  const progress = createProgress();
  progress.xp = Math.max(0, Math.round(Number(saved.xp) || 0));
  progress.games = {...(saved.games || {})};
  Object.entries(completed || {}).forEach(([gameId, record]) => {
    if(!progress.games[gameId]){
      progress.games[gameId] = {
        completed:true,
        completions:1,
        firstAt:record?.at || Date.now(),
        lastAt:record?.at || Date.now(),
        lastDailyAt:null,
        bestScore:0,
        bestRank:''
      };
    }
  });
  Object.entries(progress.games).forEach(([gameId, record]) => {
    progress.games[gameId] = {
      completed:!!record?.completed,
      completions:Math.max(0, Math.round(Number(record?.completions) || 0)),
      levelCompletions:Math.max(0, Math.round(Number(record?.levelCompletions) || 0)),
      firstAt:record?.firstAt || record?.at || null,
      lastAt:record?.lastAt || record?.at || null,
      lastDailyAt:record?.lastDailyAt || null,
      bestScore:Number(record?.bestScore) || 0,
      bestRank:String(record?.bestRank || ''),
      levels:normalizeLevelRecords(record?.levels)
    };
  });
  progress.events = Array.isArray(saved.events) ? saved.events.slice(0, 80) : [];
  progress.unlocks = {...(saved.unlocks || {})};
  applyUnlocksToProgress(progress, abilities, Date.now(), false);
  return progress;
}
function normalizeLevelRecords(saved={}){
  const levels = {};
  Object.entries(saved || {}).forEach(([levelKey, record]) => {
    const index = Math.max(1, Math.round(Number(record?.index || levelKey) || 1));
    levels[index] = {
      index,
      completed:!!record?.completed,
      completions:Math.max(0, Math.round(Number(record?.completions) || 0)),
      firstAt:record?.firstAt || record?.at || null,
      lastAt:record?.lastAt || record?.at || null,
      lastDailyAt:record?.lastDailyAt || null,
      bestScore:Number(record?.bestScore) || 0,
      bestRank:String(record?.bestRank || '')
    };
  });
  return levels;
}
function dayKey(time=Date.now()){
  const d = new Date(time);
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${d.getFullYear()}-${m}-${day}`;
}
function getPlayerLevel(xp=state.progress.xp){
  return Math.max(1, Math.floor(Math.sqrt(Math.max(0, xp) / 180)) + 1);
}
function getCompletedCount(){
  return Object.values(state.progress.games || {}).filter(record => record?.completed).length;
}
function getUnlockCount(){
  return Object.keys(state.progress.unlocks || {}).length;
}
function applyUnlocksToProgress(progress, abilities, now=Date.now(), collect=true){
  const newly = [];
  UNLOCK_RULES.forEach(rule => {
    if(progress.unlocks[rule.id]) return;
    const passed = rule.ability ? (abilities[rule.ability] || 0) >= rule.threshold : progress.xp >= rule.xp;
    if(!passed) return;
    progress.unlocks[rule.id] = {at:now, name:rule.name, type:rule.type};
    if(collect) newly.push(rule);
  });
  return newly;
}

function makeMat(color, rough=.48, metal=.08, emissive=0){
  const mat = new THREE.MeshStandardMaterial({color, roughness:rough, metalness:metal});
  if(emissive){ mat.emissive = new THREE.Color(color); mat.emissiveIntensity = emissive; }
  return mat;
}
function makeGlowMat(color, opacity=.38){
  const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity, depthWrite:false});
  if(THREE.AdditiveBlending !== undefined) mat.blending = THREE.AdditiveBlending;
  return mat;
}
function setTextureColorSpace(texture){
  if(THREE.SRGBColorSpace) texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}
function makeAviationFloorMaterial(repeat=8){
  const c = document.createElement('canvas');
  c.width = 512;
  c.height = 512;
  const ctx = c.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,512,512);
  grad.addColorStop(0,'#202833');
  grad.addColorStop(.48,'#151c25');
  grad.addColorStop(1,'#2a323d');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,512,512);

  const noise = ctx.createImageData(512,512);
  for(let i=0;i<noise.data.length;i+=4){
    const v = 92 + Math.random() * 18;
    noise.data[i] = v;
    noise.data[i+1] = v + 8;
    noise.data[i+2] = v + 18;
    noise.data[i+3] = 18;
  }
  ctx.putImageData(noise,0,0);

  const sheen = ctx.createLinearGradient(0,0,512,0);
  sheen.addColorStop(0,'rgba(255,255,255,.025)');
  sheen.addColorStop(.5,'rgba(255,255,255,.095)');
  sheen.addColorStop(1,'rgba(255,255,255,.02)');
  ctx.fillStyle = sheen;
  ctx.fillRect(0,0,512,512);

  const texture = setTextureColorSpace(new THREE.CanvasTexture(c));
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.RepeatWrapping;
  texture.repeat.set(repeat, repeat);
  texture.anisotropy = 4;
  return new THREE.MeshStandardMaterial({
    color:0x87929b,
    map:texture,
    roughness:.46,
    metalness:.34,
    emissive:0x09111c,
    emissiveIntensity:.045
  });
}
function roundedRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
function makeTextSprite(text, options={}){
  const width = options.width || 640;
  const height = options.height || 190;
  const canvasLabel = document.createElement('canvas');
  canvasLabel.width = width;
  canvasLabel.height = height;
  const ctx = canvasLabel.getContext('2d');
  const bg = options.bg || 'rgba(7,12,24,.72)';
  const accent = options.accent || '#9fd8ff';
  ctx.clearRect(0,0,width,height);
  roundedRect(ctx, 14, 18, width-28, height-36, 34);
  ctx.fillStyle = bg;
  ctx.fill();
  const shine = ctx.createLinearGradient(0,18,width,height-18);
  shine.addColorStop(0,'rgba(255,255,255,.12)');
  shine.addColorStop(.45,'rgba(255,255,255,.02)');
  shine.addColorStop(1,'rgba(255,255,255,.08)');
  ctx.fillStyle = shine;
  ctx.fill();
  ctx.lineWidth = 5;
  ctx.strokeStyle = accent;
  ctx.stroke();
  ctx.shadowColor = 'rgba(0,0,0,.8)';
  ctx.shadowBlur = 12;
  ctx.shadowOffsetY = 5;
  ctx.fillStyle = options.color || '#ffffff';
  ctx.font = `900 ${options.fontSize || 72}px PingFang SC, Microsoft YaHei, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, width/2, height/2 + 3);
  const texture = setTextureColorSpace(new THREE.CanvasTexture(canvasLabel));
  const material = new THREE.SpriteMaterial({map:texture, transparent:true, depthWrite:false});
  const sprite = new THREE.Sprite(material);
  const scale = options.scale || .72;
  sprite.scale.set(width / height * scale, scale, 1);
  return sprite;
}

function addTube(group, from, to, radius, mat){
  const start = new THREE.Vector3(from[0], from[1], from[2]);
  const end = new THREE.Vector3(to[0], to[1], to[2]);
  const dir = new THREE.Vector3().subVectors(end, start);
  const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, dir.length(), 12), mat);
  mesh.position.copy(start).add(end).multiplyScalar(.5);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
  mesh.castShadow = true;
  group.add(mesh);
  return mesh;
}
function portalLocalPosition(index, total){
  if(total <= 1) return {x:0, z:-5.45, rot:0, lift:0};
  const spread = total >= 3 ? .62 : .52;
  const angle = (index - (total - 1) / 2) * spread;
  const radius = 5.85 + Math.max(0,total-2) * .7;
  const stagger = index % 2 === 0 ? .35 : -.18;
  return {x:Math.sin(angle)*radius, z:-Math.cos(angle)*radius + stagger, rot:angle, lift:(index - (total - 1) / 2) * .28};
}

function addWallPanel(room, x, z, rot, accent, wide=false){
  const frameMat = makeMat(0x253553,.48,.18,.03);
  const insetMat = makeMat(0x0a1224,.62,.08);
  const panel = new THREE.Group();
  panel.position.set(x,4.2,z);
  panel.rotation.y = rot;

  const frame = new THREE.Mesh(new THREE.BoxGeometry(wide ? 5.8 : 3.4,3.2,.16), frameMat);
  frame.castShadow = true;
  panel.add(frame);

  const inset = new THREE.Mesh(new THREE.BoxGeometry(wide ? 5.1 : 2.8,2.42,.2), insetMat);
  inset.position.z = .035;
  panel.add(inset);

  const stripe = new THREE.Mesh(new THREE.BoxGeometry(wide ? 4.2 : 2.1,.055,.24), makeGlowMat(accent,.44));
  stripe.position.set(0,1.02,.16);
  panel.add(stripe);

  const lowerStripe = stripe.clone();
  lowerStripe.position.y = -1.02;
  panel.add(lowerStripe);

  room.add(panel);
  return panel;
}

function createSolemnFallbackTree(parent){
  const fallback = new THREE.Group();
  fallback.userData.kind = 'fallbackTree';
  parent.add(fallback);

  const barkMat = makeMat(0x5b432f,.74,.08,.04);
  const darkBarkMat = makeMat(0x2f241d,.82,.06,.02);
  const leafMats = [
    makeMat(0x233f32,.64,.02,.04),
    makeMat(0x3d6545,.58,.02,.06),
    makeMat(0x617647,.6,.02,.05)
  ];
  const glowMat = makeGlowMat(0xb8ffd9,.22);

  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(.42,.82,5.8,18), barkMat);
  trunk.position.y = 3.02;
  trunk.rotation.z = -.045;
  trunk.castShadow = true;
  trunk.receiveShadow = true;
  fallback.add(trunk);

  for(let i=0;i<8;i++){
    const angle = i / 8 * Math.PI * 2;
    addTube(fallback, [Math.cos(angle)*.34,.62,Math.sin(angle)*.34], [Math.cos(angle)*2.35,.35,Math.sin(angle)*2.35], .05, darkBarkMat);
  }

  const branchData = [
    [[0,3.72,0],[-1.9,5.2,-.72],.17],
    [[0,3.94,0],[2.05,5.35,-.64],.16],
    [[0,4.18,0],[-.82,5.9,1.55],.13],
    [[0,4.32,0],[1.08,6.08,1.2],.13],
    [[0,4.06,0],[.42,5.18,-2.05],.14],
    [[0,4.58,0],[-1.68,6.2,.62],.11],
    [[0,4.68,0],[1.72,6.35,.52],.1]
  ];
  branchData.forEach(([from,to,r], i)=>{
    addTube(fallback, from, to, r, barkMat);
    if(i < 5) addTube(fallback, from, to, r*.18, glowMat);
  });

  const leafGeo = new THREE.SphereGeometry(.085,12,8);
  const canopyAnchors = [
    {p:[0,6.38,0],s:[2.24,1.05,1.72],count:38},
    {p:[-1.38,6.08,-.26],s:[1.34,.76,1.08],count:22},
    {p:[1.46,6.16,-.36],s:[1.4,.78,1.12],count:24},
    {p:[-.62,6.88,.72],s:[1.05,.58,.92],count:18},
    {p:[.82,6.98,.46],s:[.96,.52,.82],count:18},
    {p:[.12,7.28,-.12],s:[.76,.42,.66],count:14}
  ];
  canopyAnchors.forEach((anchor,i)=>{
    for(let j=0;j<anchor.count;j++){
      const seed = i * 97 + j * 29 + 11;
      const theta = seed * 2.399963229728653;
      const radius = Math.sqrt(((seed * 37) % 100) / 100);
      const heightJitter = (((seed * 53) % 100) / 100 - .5);
      const leaf = new THREE.Mesh(leafGeo, leafMats[(seed + i) % leafMats.length]);
      leaf.position.set(
        anchor.p[0] + Math.cos(theta) * anchor.s[0] * radius,
        anchor.p[1] + heightJitter * anchor.s[1],
        anchor.p[2] + Math.sin(theta) * anchor.s[2] * radius
      );
      const scale = .72 + (((seed * 17) % 100) / 100) * .9;
      leaf.scale.set(scale * 1.35, scale * .62, scale);
      leaf.rotation.set(seed*.013, seed*.021, seed*.017);
      leaf.castShadow = true;
      leaf.receiveShadow = true;
      leaf.userData.kind = 'fallbackLeaf';
      leaf.userData.floatBaseY = leaf.position.y;
      leaf.userData.floatAmp = .014 + (j % 5) * .004;
      wisdomTreeParts.push(leaf);
      fallback.add(leaf);
    }
  });

  ABILITIES.forEach((ability,i)=>{
    const angle = i / ABILITIES.length * Math.PI * 2 - Math.PI/2;
    const fruit = new THREE.Mesh(new THREE.IcosahedronGeometry(.12,1), makeGlowMat(ability.color,.34));
    fruit.position.set(Math.cos(angle)*1.8, 6.68 + (i%2)*.36, Math.sin(angle)*1.36);
    fruit.userData.kind = 'spark';
    fruit.userData.floatBaseY = fruit.position.y;
    fruit.userData.floatAmp = .05;
    wisdomTreeParts.push(fruit);
    fallback.add(fruit);
  });

  return fallback;
}

function buildWisdomTree(){
  const tree = new THREE.Group();
  tree.position.set(0,.28,0);
  root.add(tree);

  const rootGlow = makeGlowMat(0x8ef7d4,.36);
  const gold = makeMat(0xc9a45a,.34,.24,.08);

  const soil = new THREE.Mesh(new THREE.CylinderGeometry(3.55,3.9,.28,72), makeMat(0x171c24,.72,.12));
  soil.position.y = .1;
  soil.receiveShadow = true;
  soil.castShadow = true;
  tree.add(soil);

  const baseRing = new THREE.Mesh(new THREE.TorusGeometry(3.95,.07,12,128), gold);
  baseRing.rotation.x = Math.PI/2;
  baseRing.position.y = .29;
  tree.add(baseRing);

  const rootRing = new THREE.Mesh(new THREE.TorusGeometry(4.7,.036,10,128), rootGlow);
  rootRing.rotation.x = Math.PI/2;
  rootRing.position.y = .34;
  rootRing.userData.floatBaseY = rootRing.position.y;
  rootRing.userData.kind = 'ring';
  wisdomTreeParts.push(rootRing);
  tree.add(rootRing);

  const pillarMat = makeMat(0x242b34,.52,.28,.03);
  ABILITIES.forEach((ability,i)=>{
    const angle = i / ABILITIES.length * Math.PI * 2 - Math.PI/2;
    const pillar = new THREE.Mesh(new THREE.CylinderGeometry(.12,.18,1.18,6), pillarMat);
    pillar.position.set(Math.cos(angle)*4.18,.85,Math.sin(angle)*4.18);
    pillar.rotation.y = angle;
    pillar.castShadow = true;
    pillar.receiveShadow = true;
    tree.add(pillar);

    const flame = new THREE.Mesh(new THREE.IcosahedronGeometry(.14,1), makeGlowMat(ability.color,.42));
    flame.position.set(Math.cos(angle)*4.18,1.55,Math.sin(angle)*4.18);
    flame.userData.kind = 'spark';
    flame.userData.floatBaseY = flame.position.y;
    flame.userData.floatAmp = .045;
    wisdomTreeParts.push(flame);
    tree.add(flame);
  });

  for(let i=0;i<10;i++){
    const angle = i / 12 * Math.PI * 2;
    const len = i % 3 === 0 ? 4.25 : 3.35;
    addTube(tree, [.42*Math.cos(angle+.18), .3, .42*Math.sin(angle+.18)], [len*Math.cos(angle), .32, len*Math.sin(angle)], .018, rootGlow);
  }

  const halo = new THREE.Mesh(new THREE.TorusGeometry(3.05,.026,8,128), makeGlowMat(0x9fd8ff,.3));
  halo.rotation.x = Math.PI/2;
  halo.position.y = 6.85;
  halo.userData.kind = 'halo';
  wisdomTreeParts.push(halo);
  tree.add(halo);

  const fallbackTree = createSolemnFallbackTree(tree);
  let realTreeLoaded = false;
  const showFallbackTimer = setTimeout(() => {
    if(!realTreeLoaded) fallbackTree.visible = true;
  }, 8000);

  const treeModelUrl = LOW_POWER_DEVICE ? WISDOM_TREE_MOBILE_MODEL : WISDOM_TREE_MODEL;
  const loader = new GLTFLoader();
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/libs/draco/');
  loader.setDRACOLoader(dracoLoader);
  loader.load(treeModelUrl, gltf => {
    realTreeLoaded = true;
    clearTimeout(showFallbackTimer);
    const source = gltf.scene;
    const chosen = source.getObjectByName('island_tree_02_LOD0')
      || source.children.find(child => child.isObject3D)
      || source;
    const realTree = chosen.clone(true);
    realTree.traverse(obj => {
      if(obj.isMesh){
        obj.castShadow = true;
        obj.receiveShadow = true;
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        mats.filter(Boolean).forEach(mat => {
          mat.side = THREE.DoubleSide;
          mat.alphaTest = Math.max(mat.alphaTest || 0, .32);
          mat.transparent = false;
          if(mat.map && THREE.SRGBColorSpace) mat.map.colorSpace = THREE.SRGBColorSpace;
        });
      }
    });
    const box = new THREE.Box3().setFromObject(realTree);
    if(!Number.isFinite(box.min.x)) return;
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const scale = Math.min(11 / Math.max(size.y,.001), 8.2 / Math.max(size.x,size.z,.001));
    realTree.position.x -= center.x;
    realTree.position.z -= center.z;
    realTree.position.y -= box.min.y;
    realTree.scale.set(scale * 1.12, scale * 1.36, scale * 1.12);
    realTree.rotation.y = -.3;
    realTree.userData.kind = 'realTree';
    tree.add(realTree);
    fallbackTree.visible = false;

    ABILITIES.forEach((ability,i)=>{
      const angle = i / ABILITIES.length * Math.PI * 2 - Math.PI/2;
      const spark = new THREE.Mesh(new THREE.IcosahedronGeometry(.08,1), makeGlowMat(ability.color,.36));
      spark.position.set(Math.cos(angle)*3.18, 7.35 + (i%2)*.56, Math.sin(angle)*2.48);
      spark.userData.kind = 'spark';
      spark.userData.floatBaseY = spark.position.y;
      spark.userData.floatAmp = .06;
      wisdomTreeParts.push(spark);
      tree.add(spark);
    });
  }, undefined, err => {
    console.warn('Wisdom tree model failed to load', err);
    clearTimeout(showFallbackTimer);
    fallbackTree.visible = true;
  });

  const treeLight = new THREE.PointLight(0xa9ffd6,18,22,1.55);
  treeLight.position.set(0,7.25,0);
  tree.add(treeLight);
  const warmLight = new THREE.PointLight(0xffd166,7,16,1.9);
  warmLight.position.set(-1.2,2.2,1.4);
  tree.add(warmLight);
}

    innerPad.position.y = .28;
    innerPad.receiveShadow = true;
    group.add(innerPad);

    const ring = new THREE.Mesh(new THREE.TorusGeometry(4.65,.08,12,96), makeMat(0xb9c5d0,.34,.26,.05));
    ring.rotation.x = Math.PI / 2;
    ring.position.y = .44;

    group.add(monument.group);

    const label = makeTextSprite(ability.name, {accent:ability.color, scale:1.28, fontSize:102, width:760, height:220, bg:'rgba(3,6,12,.9)'});
    label.position.set(0,4.95,2.55);

    group.add(adSlot);
  });

  GAMES.forEach((game, idx)=>{
    const ability = abilityByKey(game.zone);
    const zone = zoneGroups[game.zone];
    const zoneGames = GAMES.filter(g=>g.zone===game.zone);
    const localIndex = zoneGames.findIndex(g=>g.id===game.id);
    const slot = portalLocalPosition(localIndex, zoneGames.length);
    const portal = createPortal(game, ability.color);
    portal.group.position.set(slot.x, .18, slot.z);
    portal.group.rotation.y = slot.rot;
    portal.group.userData.labelLift = slot.lift;
    if(portal.label) portal.label.position.y += slot.lift;
    if(portal.marker) portal.marker.position.y += slot.lift * .55;
    if(portal.marker) portal.marker.userData.baseY = portal.marker.position.y;
    zone.add(portal.group);
    portals.push(portal);
    if(portal.motif) portalMotifs.push(portal.motif);

  const starMat = new THREE.PointsMaterial({color:0x9fd8ff, size:.08, transparent:true, opacity:.72});
  const starGeo = new THREE.BufferGeometry();
  const pts = [];
  for(let i=0;i<480;i++){
    const r = 45 + Math.random()*70;
    const a = Math.random()*Math.PI*2;
    pts.push(Math.cos(a)*r, 8+Math.random()*45, Math.sin(a)*r);
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(pts,3));
  scene.add(new THREE.Points(starGeo, starMat));
}

  base.receiveShadow = true;
  group.add(base);

  const baseTrim = new THREE.Mesh(new THREE.TorusGeometry(1.46,.04,10,64), makeMat(0xb6a06d,.34,.26,.04));
  baseTrim.rotation.x = Math.PI/2;
  baseTrim.position.y = .3;
  group.add(baseTrim);

  const top = new THREE.Mesh(new THREE.CylinderGeometry(1.16,1.28,.16,48), makeMat(0x10151d,.58,.16));
  top.position.y = .36;
  top.receiveShadow = true;
  group.add(top);

  const disc = new THREE.Mesh(new THREE.CircleGeometry(1.3,56), new THREE.MeshBasicMaterial({color:col, transparent:true, opacity:.22, side:THREE.DoubleSide, depthWrite:false}));
  disc.rotation.x = -Math.PI / 2;
  disc.position.y = .48;
  group.add(disc);

  const motif = createGameMotif(game, col);
  motif.position.set(0,.7,.1);
  group.add(motif);

  const label = makeTextSprite(game.name, {accent:color, scale:.86, fontSize:92, width:760, height:200, bg:'rgba(3,5,10,.92)'});
  label.position.set(0,3.02,-.24);
  group.add(label);

  const marker = new THREE.Mesh(new THREE.OctahedronGeometry(.28,1), makeMat(col,.22,.44,.9));
  marker.position.y = 3.72;
  marker.castShadow = true;
  group.add(marker);

  group.userData.game = game;
  return {game, group, disc, marker, motif, label};
}

function createGameMotif(game, col){
  const group = new THREE.Group();
  const accent = col.getStyle();
  const accentMat = makeMat(col,.26,.3,.5);
  const glowMat = makeGlowMat(col,.42);
  const darkMat = makeMat(0x081020,.54,.18);
  const paleMat = makeMat(0xdbeaff,.34,.08);
  const goldMat = makeMat(0xffd166,.28,.22,.14);
  const whiteMat = makeMat(0xf5f7ff,.42,.04);
  const blackMat = makeMat(0x10131c,.48,.08);
  const smallLabel = (text, pos, scale=.24) => {
    const sprite = makeTextSprite(text, {accent, scale, fontSize:84, width:280, height:180, bg:'rgba(5,8,16,.66)'});
    sprite.position.set(pos[0], pos[1], pos[2]);
    group.add(sprite);
    return sprite;
  };

  if(game.id === 'gcd'){
    const pts = [[-.72,.42,.05],[.58,.82,.15],[.15,.32,-.66]];
    pts.forEach((p, i)=>{
      const n = new THREE.Mesh(new THREE.SphereGeometry(.22,28,18), i === 2 ? goldMat : accentMat);
      n.position.set(p[0],p[1],p[2]);
      n.castShadow = true;
      group.add(n);
    });
    addTube(group, pts[0], pts[1], .035, glowMat);
    addTube(group, pts[1], pts[2], .035, glowMat);
    addTube(group, pts[2], pts[0], .035, glowMat);
    smallLabel('12',[-.72,.82,.05]);
    smallLabel('18',[.58,1.22,.15]);
    smallLabel('6',[.15,.72,-.66]);
  }else if(game.id === 'black-white'){
    for(let r=0;r<3;r++){
      for(let c=0;c<3;c++){
        const tile = new THREE.Mesh(new THREE.BoxGeometry(.34,.08,.34), (r+c)%2 ? whiteMat : blackMat);
        tile.position.set((c-1)*.38,.38,(r-1)*.38);
        tile.castShadow = true;
        group.add(tile);
      }
    }
    const crossA = new THREE.Mesh(new THREE.BoxGeometry(1.2,.035,.18), glowMat);
    crossA.position.y = .48;
    group.add(crossA);
    const crossB = crossA.clone();
    crossB.rotation.y = Math.PI/2;
    group.add(crossB);
  }else if(game.id === 'fold-color'){
    const colors = [0x4aa8ff,0xff7fca,0xffd166,0x75e06f];
    colors.forEach((c,i)=>{
      const plane = new THREE.Mesh(new THREE.PlaneGeometry(.82,.82), new THREE.MeshBasicMaterial({color:c, transparent:true, opacity:.58, side:THREE.DoubleSide, depthWrite:false}));
      plane.position.set((i-1.5)*.27,.62+i*.08,(i%2?-.12:.16));
      plane.rotation.set(-.9+i*.2,.45-i*.22,.55-i*.34);
      group.add(plane);
    });
    addTube(group,[-.72,.28,.48],[.74,.82,-.36],.025,glowMat);
  }else if(game.id === 'number-puzzle'){
    let n = 1;
    for(let r=0;r<4;r++){
      for(let c=0;c<4;c++){
        if(r===3 && c===3) continue;
        const tile = new THREE.Mesh(new THREE.BoxGeometry(.28,.12,.28), makeMat((r+c)%2 ? 0x25375e : 0x1b2948,.42,.12));
        tile.position.set((c-1.5)*.32,.38,(r-1.5)*.32);
        tile.castShadow = true;
        group.add(tile);
        if(n <= 8 && n % 2 === 1) smallLabel(String(n),[(c-1.5)*.32,.67,(r-1.5)*.32],.16);
        n++;
      }
    }
  }else if(game.id === 'nebula'){
    const star = new THREE.Mesh(new THREE.SphereGeometry(.28,32,20), goldMat);
    star.position.y = .58;
    star.castShadow = true;
    group.add(star);
    [0.55,0.86,1.12].forEach((r,i)=>{
      const ring = new THREE.Mesh(new THREE.TorusGeometry(r,.015,8,72), makeGlowMat(i===1?0xff7fca:col,.34));
      ring.rotation.x = Math.PI/2;
      ring.position.y = .58;
      group.add(ring);
      const planet = new THREE.Mesh(new THREE.SphereGeometry(.09+i*.025,18,12), makeMat(i===1?0xff7fca:0x9fd8ff,.34,.08,.18));
      planet.position.set(Math.cos(i*2.1)*r,.58,Math.sin(i*2.1)*r);
      planet.castShadow = true;
      group.add(planet);
    });
  }else if(game.id === 'brush-world'){
    for(let i=0;i<7;i++){
      const cell = new THREE.Mesh(new THREE.CylinderGeometry(.2,.2,.06,6), makeMat(i%2?0xff7fca:0x2ee6d6,.42,.08,.2));
      cell.position.set((i-3)*.22,.35,Math.sin(i*.9)*.24);
      cell.castShadow = true;
      group.add(cell);
    }
    addTube(group,[-.72,.52,.1],[-.2,.72,-.18],.035,glowMat);
    addTube(group,[-.2,.72,-.18],[.52,.6,.22],.035,glowMat);
    const pen = new THREE.Mesh(new THREE.CylinderGeometry(.055,.08,.92,18), goldMat);
    pen.position.set(.48,.88,-.28);
    pen.rotation.set(.85,0,.68);
    pen.castShadow = true;
    group.add(pen);
  }else if(game.id === 'sand-blocks'){
    const sandMat = makeMat(0xd8b26a,.78,.02);
    for(let i=0;i<22;i++){
      const cube = new THREE.Mesh(new THREE.BoxGeometry(.13,.08,.13), sandMat);
      cube.position.set((Math.random()-.5)*1.15,.32+Math.random()*.22,(Math.random()-.5)*.88);
      cube.rotation.set(Math.random(),Math.random(),Math.random());
      cube.castShadow = true;
      group.add(cube);
    }
    const block = new THREE.Mesh(new THREE.BoxGeometry(.52,.3,.52), makeMat(0xb07736,.68,.06));
    block.position.set(-.46,.62,-.22);
    block.rotation.y = .35;
    block.castShadow = true;
    group.add(block);
  }else if(game.id === 'tangshi'){
    const paperMat = makeMat(0xf3d9a7,.6,.02);
    const paper = new THREE.Mesh(new THREE.BoxGeometry(1.1,.04,.72), paperMat);
    paper.position.set(0,.48,0);
    paper.rotation.x = -.18;
    paper.castShadow = true;
    group.add(paper);
    const leftRoll = new THREE.Mesh(new THREE.CylinderGeometry(.06,.06,.9,18), goldMat);
    leftRoll.position.set(-.62,.5,0);
    leftRoll.rotation.z = Math.PI/2;
    leftRoll.castShadow = true;
    group.add(leftRoll);
    const rightRoll = leftRoll.clone();
    rightRoll.position.x = .62;
    group.add(rightRoll);
    smallLabel('诗',[0,.85,0],.26);
  }else if(game.id === 'hex-speed'){
    const track = new THREE.Mesh(new THREE.TorusGeometry(.72,.045,6,6), makeMat(0x2ee6d6,.3,.14,.5));
    track.rotation.x = Math.PI/2;
    track.position.y = .42;
    group.add(track);
    const arrow = new THREE.Mesh(new THREE.ConeGeometry(.18,.55,3), makeMat(0x9fd8ff,.28,.12,.45));
    arrow.position.set(.36,.62,-.18);
    arrow.rotation.set(Math.PI/2,0,-.55);
    arrow.castShadow = true;
    group.add(arrow);
  }else if(game.id === 'rotate-array'){
    const ring = new THREE.Mesh(new THREE.TorusGeometry(.58,.045,10,72), makeGlowMat(0x75e06f,.45));
    ring.rotation.x = Math.PI/2;
    ring.position.y = .5;
    group.add(ring);
    for(let i=0;i<8;i++){
      const a = i/8*Math.PI*2;
      const box = new THREE.Mesh(new THREE.BoxGeometry(.18,.18,.18), makeMat(i%2?0x75e06f:0xffd166,.32,.14,.22));
      box.position.set(Math.cos(a)*.58,.5,Math.sin(a)*.58);
      box.rotation.y = a;
      box.castShadow = true;
      group.add(box);
    }
    smallLabel('↻',[0,.94,0],.22);
  }else if(game.id === 'calendar'){
    for(let r=0;r<3;r++){
      for(let c=0;c<4;c++){
        const tile = new THREE.Mesh(new THREE.BoxGeometry(.24,.08,.2), makeMat((r+c)%2?0xf6f0df:0xd7e6ff,.48,.04));
        tile.position.set((c-1.5)*.28,.38,(r-1)*.25);
        tile.castShadow = true;
        group.add(tile);
      }
    }
    smallLabel('15',[0,.78,0],.24);
  }else if(game.id === 'arrow-field'){
    for(let r=0;r<3;r++){
      for(let c=0;c<3;c++){
        const cone = new THREE.Mesh(new THREE.ConeGeometry(.11,.36,3), makeMat((r+c)%2?0x4aa8ff:0xa778ff,.3,.12,.32));
        cone.position.set((c-1)*.32,.46,(r-1)*.28);
        cone.rotation.set(Math.PI/2,0,(r*2+c)*.7);
        cone.castShadow = true;
        group.add(cone);
      }
    }
  }else{
    const gem = new THREE.Mesh(new THREE.IcosahedronGeometry(.42,1), accentMat);
    gem.position.y = .62;
    gem.castShadow = true;
    group.add(gem);
  }
  group.userData.kind = game.id;
  return group;
}

  group.add(nameLabel);

  group.position.set(0,0,5);
  return {

    leftShoulder, rightShoulder, leftArm, rightArm, leftHand, rightHand, leftLeg, rightLeg, leftShoe, rightShoe,
    shirtParts:[torso,leftShoulder,rightShoulder,leftArm,rightArm,chestPanel],
    pantsParts:[hips,leftLeg,rightLeg],
    jacketParts:[jacketLeft,jacketRight],
    coatParts:[coatLeft,coatRight],

    realClothParts:realClothesRoot.userData.parts,
    realModel:null,
    realMaterials:{skin:[], outfit:[], hair:[], all:[]},
    morphMeshes:[],
    mixer:null,
    animActions:{},
    activeClip:null,
    nativeStyle:false,
    astronautMode:false,
    externalCharacterMode:false,
    walk:{phase:0, amount:0, bones:{}, baseRot:new Map()}
  };
}

function createAvatarStyleKits(){
  const root = new THREE.Group();
  const kits = {};
  root.userData.kits = kits;
  const roleColor = {base:0xe7edf2, accent:0x4aa8ff, trim:0xffffff, dark:0x162033, glow:0x83e8ff};
  const kitMat = role => {
    if(role === 'glow') return makeGlowMat(roleColor.glow,.45);
    const emissive = role === 'accent' ? .12 : role === 'trim' ? .06 : .02;
    const metal = role === 'dark' ? .18 : .1;
    return makeMat(roleColor[role] || roleColor.accent, .4, metal, emissive);
  };
  const makeKit = key => {
    const group = new THREE.Group();
    group.visible = false;
    group.userData.parts = [];
    kits[key] = group;
    root.add(group);
    return group;
  };
  const add = (group, mesh, role='accent') => {
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData.role = role;
    mesh.material = mesh.material || kitMat(role);
    group.userData.parts.push(mesh);
    group.add(mesh);
    return mesh;
  };
  const box = (group, role, size, pos, rot=[0,0,0]) => {
    const mesh = add(group, new THREE.Mesh(new THREE.BoxGeometry(size[0], size[1], size[2]), kitMat(role)), role);
    mesh.position.set(pos[0], pos[1], pos[2]);
    mesh.rotation.set(rot[0], rot[1], rot[2]);
    return mesh;
  };
  const capsule = (group, role, radius, length, pos, rot=[0,0,0], scale=[1,1,1]) => {
    const mesh = add(group, new THREE.Mesh(new THREE.CapsuleGeometry(radius, length, 8, 18), kitMat(role)), role);
    mesh.position.set(pos[0], pos[1], pos[2]);
    mesh.rotation.set(rot[0], rot[1], rot[2]);
    mesh.scale.set(scale[0], scale[1], scale[2]);
    return mesh;
  };
  const ring = (group, role, radius, tubeRadius, pos, scale=[1,1,1]) => {
    const mesh = add(group, new THREE.Mesh(new THREE.TorusGeometry(radius, tubeRadius, 8, 52), kitMat(role)), role);
    mesh.position.set(pos[0], pos[1], pos[2]);
    mesh.rotation.x = Math.PI/2;
    mesh.scale.set(scale[0], scale[1], scale[2]);
    return mesh;
  };
  const paired = (group, makePart) => [-1,1].forEach(side => makePart(side));
  const baseSuit = group => {
    capsule(group, 'base', .29, .56, [0,1.34,.045], [0,0,0], [1.08,.94,.44]);
    capsule(group, 'dark', .18, .18, [0,.88,.035], [Math.PI/2,0,0], [1.45,.5,.54]);
    ring(group, 'trim', .23, .014, [0,1.71,.055], [1.18,.42,.82]);
    ring(group, 'dark', .31, .018, [0,.98,.045], [1.14,.2,.62]);
    paired(group, side => {
      capsule(group, 'base', .055, .32, [side*.38,1.42,.035], [0,0,side*.16], [.9,1,.76]);
      capsule(group, 'dark', .06, .32, [side*.17,.58,.035], [0,0,side*.03], [.86,1,.74]);
      box(group, 'dark', [.2,.085,.18], [side*.15,.14,.085], [.02,0,0]);
    });
  };

  const explorer = makeKit('explorer');
  baseSuit(explorer);
  box(explorer, 'accent', [.12,.62,.034], [0,1.34,.315], [-.08,0,0]);
  box(explorer, 'trim', [.44,.1,.036], [0,1.54,.318], [-.08,0,0]);
  box(explorer, 'dark', [.22,.12,.04], [0,1.24,.322], [-.08,0,0]);
  paired(explorer, side => {
    box(explorer, 'accent', [.045,.46,.035], [side*.43,1.42,.235], [0,0,side*.08]);
    box(explorer, 'accent', [.045,.5,.035], [side*.18,.58,.205], [0,0,side*.03]);
    ring(explorer, 'trim', .09, .01, [side*.18,.82,.055], [.9,.18,.7]);
  });

  const scholar = makeKit('scholar');
  baseSuit(scholar);
  box(scholar, 'trim', [.5,.14,.038], [0,1.57,.315], [-.08,0,0]);
  box(scholar, 'accent', [.07,.75,.04], [-.12,1.22,.32], [-.08,0,.28]);

function bindAvatarBones(){
  const bones = {leftFingers:[], rightFingers:[], leftThumbs:[], rightThumbs:[]};
  avatar.walk.baseRot.clear();
  avatar.realModelRoot.traverse(obj => {
    if(!obj.isBone) return;
    const name = obj.name.toLowerCase();
    avatar.walk.baseRot.set(obj, obj.rotation.clone());
    if(!bones.leftUpperLeg && /left.*(upleg|upperleg|thigh)|thigh_l|upleg_l|leg\.l|leftleg/.test(name)) bones.leftUpperLeg = obj;
    if(!bones.rightUpperLeg && /right.*(upleg|upperleg|thigh)|thigh_r|upleg_r|leg\.r|rightleg/.test(name)) bones.rightUpperLeg = obj;
    if(!bones.leftLowerLeg && /left.*(leg|calf|shin)|calf_l|shin_l/.test(name) && !/up|upper|thigh/.test(name)) bones.leftLowerLeg = obj;
    if(!bones.rightLowerLeg && /right.*(leg|calf|shin)|calf_r|shin_r/.test(name) && !/up|upper|thigh/.test(name)) bones.rightLowerLeg = obj;
    if(!bones.leftUpperArm && /left.*(upperarm|arm)|upperarm_l|arm\.l|leftarm/.test(name) && !/shoulder|fore|hand/.test(name)) bones.leftUpperArm = obj;
    if(!bones.rightUpperArm && /right.*(upperarm|arm)|upperarm_r|arm\.r|rightarm/.test(name) && !/shoulder|fore|hand/.test(name)) bones.rightUpperArm = obj;
    if(!bones.leftLowerArm && /left.*(forearm|lowerarm)|lowerarm_l|forearm_l/.test(name)) bones.leftLowerArm = obj;
    if(!bones.rightLowerArm && /right.*(forearm|lowerarm)|lowerarm_r|forearm_r/.test(name)) bones.rightLowerArm = obj;
    if(!bones.leftClavicle && /left.*(clavicle|shoulder)|clavicle_l/.test(name)) bones.leftClavicle = obj;
    if(!bones.rightClavicle && /right.*(clavicle|shoulder)|clavicle_r/.test(name)) bones.rightClavicle = obj;
    if(!bones.leftFoot && /left.*foot|foot_l/.test(name)) bones.leftFoot = obj;
    if(!bones.rightFoot && /right.*foot|foot_r/.test(name)) bones.rightFoot = obj;
    if(!bones.leftHand && /left.*hand$|hand_l$/.test(name)) bones.leftHand = obj;
    if(!bones.rightHand && /right.*hand$|hand_r$/.test(name)) bones.rightHand = obj;
    if(/left.*hand.*thumb|thumb.*_l/.test(name)) bones.leftThumbs.push(obj);
    if(/right.*hand.*thumb|thumb.*_r/.test(name)) bones.rightThumbs.push(obj);
    if(/left.*hand.*(index|middle|ring|pinky)|(?:index|middle|ring|pinky).+_l/.test(name)) bones.leftFingers.push(obj);
    if(/right.*hand.*(index|middle|ring|pinky)|(?:index|middle|ring|pinky).+_r/.test(name)) bones.rightFingers.push(obj);
    if(!bones.spine && /spine|chest|torso/.test(name)) bones.spine = obj;
    if(!bones.head && /head/.test(name)) bones.head = obj;
  });
  avatar.walk.bones = bones;
}

function applyNaturalPose(b, blend=1, relaxed=false){
  const shoulderDrop = relaxed ? .08 : .04;
  const armDrop = relaxed ? .08 : .48;
  const armDropSide = relaxed ? 1.78 : 0;
  const elbowBend = relaxed ? .04 : .16;
  const wristIn = relaxed ? .015 : 0;
  const fingerCurl = relaxed ? .24 : 0;
  if(b.leftClavicle) b.leftClavicle.rotation.z -= shoulderDrop * blend;
  if(b.rightClavicle) b.rightClavicle.rotation.z += shoulderDrop * blend;
  if(b.leftUpperArm){
    b.leftUpperArm.rotation.y += armDropSide * blend;
    b.leftUpperArm.rotation.z -= armDrop * blend;
  }
  if(b.rightUpperArm){
    b.rightUpperArm.rotation.y -= armDropSide * blend;
    b.rightUpperArm.rotation.z += armDrop * blend;
  }
  if(b.leftLowerArm){
    b.leftLowerArm.rotation.x += elbowBend * blend;
    b.leftLowerArm.rotation.z -= wristIn * blend;
  }
  if(b.rightLowerArm){
    b.rightLowerArm.rotation.x += elbowBend * blend;
    b.rightLowerArm.rotation.z += wristIn * blend;
  }
  if(relaxed){
    if(b.leftHand) b.leftHand.rotation.z += .035 * blend;
    if(b.rightHand) b.rightHand.rotation.z -= .035 * blend;
    b.leftFingers?.forEach((bone, index) => { bone.rotation.x += fingerCurl * (index % 3 === 0 ? .72 : 1) * blend; });
    b.rightFingers?.forEach((bone, index) => { bone.rotation.x += fingerCurl * (index % 3 === 0 ? .72 : 1) * blend; });
    b.leftThumbs?.forEach(bone => { bone.rotation.x += .14 * blend; bone.rotation.z -= .08 * blend; });
    b.rightThumbs?.forEach(bone => { bone.rotation.x += .14 * blend; bone.rotation.z += .08 * blend; });
  }
}

function classifyRealAvatarMaterial(mesh, material){
  const name = `${mesh.name || ''} ${material?.name || ''}`.toLowerCase();
  if(/hair|eyebrow|eyelash|ponytail/.test(name)) return 'hair';
  if(/vanguard|armor|cloth|suit|outfit|top|bottom|footwear|shoe|jacket|pants|skirt|casual/.test(name)) return 'outfit';
  if(/skin|human\.body|wolf3d_head|wolf3d_body/.test(name)) return 'skin';
  return 'all';
}

function collectRealAvatarParts(model){
  avatar.realMaterials = {skin:[], outfit:[], hair:[], all:[]};
  avatar.morphMeshes = [];
  model.traverse(obj => {
    if(!obj.isMesh) return;
    if(obj.morphTargetDictionary && obj.morphTargetInfluences) avatar.morphMeshes.push(obj);
    const materials = Array.isArray(obj.material) ? obj.material : [obj.material].filter(Boolean);
    materials.forEach(material => {
      material.needsUpdate = true;
      const bucket = classifyRealAvatarMaterial(obj, material);
      avatar.realMaterials[bucket]?.push(material);
      avatar.realMaterials.all.push(material);
    });
  });
}

function applyMeshyAstronautFinish(model){
  model.traverse(obj => {
    if(!obj.isMesh) return;
    obj.frustumCulled = false;
    obj.geometry?.computeBoundingBox?.();
    const bbox = obj.geometry?.boundingBox;
    const min = bbox ? bbox.min.clone() : new THREE.Vector3(-1, 0, -1);
    const size = bbox ? bbox.getSize(new THREE.Vector3()) : new THREE.Vector3(2, 2, 2);
    const material = new THREE.MeshStandardMaterial({
      name:'GGame_Meshy_Astronaut_Suit',
      color:0xc7d5df,
      roughness:.38,
      metalness:.18,
      emissive:0x032336,
      emissiveIntensity:.06
    });
    material.onBeforeCompile = shader => {
      shader.uniforms.uGGameMin = {value:min};
      shader.uniforms.uGGameSize = {value:size};
      shader.vertexShader = `varying vec3 vGGameLocalPos;\n${shader.vertexShader}`.replace(
        '#include <begin_vertex>',
        '#include <begin_vertex>\nvGGameLocalPos = position;'
      );
      shader.fragmentShader = `varying vec3 vGGameLocalPos;\nuniform vec3 uGGameMin;\nuniform vec3 uGGameSize;\n${shader.fragmentShader}`.replace(
        '#include <color_fragment>',
        `#include <color_fragment>
        vec3 gPos = clamp((vGGameLocalPos - uGGameMin) / max(uGGameSize, vec3(0.001)), vec3(0.0), vec3(1.0));
        float xSide = abs(gPos.x - 0.5);
        vec3 suitWhite = vec3(0.66, 0.76, 0.84);
        vec3 armorBlue = vec3(0.025, 0.075, 0.13);
        vec3 bootNavy = vec3(0.025, 0.035, 0.055);
        vec3 visorDark = vec3(0.00, 0.025, 0.055);
        vec3 cyanTrim = vec3(0.00, 0.86, 0.96);
        vec3 goldLock = vec3(0.88, 0.66, 0.28);
        float boots = 1.0 - smoothstep(0.12, 0.28, gPos.y);
        float backpack = (1.0 - smoothstep(0.08, 0.24, xSide)) * smoothstep(0.38, 0.50, gPos.y) * (1.0 - smoothstep(0.72, 0.86, gPos.y));
        float sideArmor = smoothstep(0.18, 0.34, xSide) * smoothstep(0.16, 0.30, gPos.y) * (1.0 - smoothstep(0.78, 0.91, gPos.y));
        float shoulderArmor = smoothstep(0.20, 0.34, xSide) * smoothstep(0.54, 0.64, gPos.y) * (1.0 - smoothstep(0.76, 0.88, gPos.y));
        float helmet = smoothstep(0.70, 0.88, gPos.y);
        float chestPanel = (1.0 - smoothstep(0.03, 0.13, xSide)) * smoothstep(0.42, 0.52, gPos.y) * (1.0 - smoothstep(0.62, 0.74, gPos.y));
        float belt = smoothstep(0.43, 0.47, gPos.y) * (1.0 - smoothstep(0.52, 0.56, gPos.y));
        float cuffs = smoothstep(0.30, 0.42, xSide) * smoothstep(0.34, 0.44, gPos.y) * (1.0 - smoothstep(0.53, 0.64, gPos.y));
        float kneePads = smoothstep(0.18, 0.34, xSide) * smoothstep(0.24, 0.33, gPos.y) * (1.0 - smoothstep(0.42, 0.50, gPos.y));
        vec3 astronautColor = suitWhite;
        astronautColor = mix(astronautColor, armorBlue, clamp(backpack * 0.95 + sideArmor * 0.86 + shoulderArmor * 0.82 + belt * 0.70 + cuffs * 0.72 + kneePads * 0.75, 0.0, 1.0));
        astronautColor = mix(astronautColor, bootNavy, boots * 0.92);
        astronautColor = mix(astronautColor, visorDark, helmet * 0.38);
        astronautColor = mix(astronautColor, cyanTrim, chestPanel * 0.82);
        astronautColor = mix(astronautColor, goldLock, belt * 0.22);
        diffuseColor.rgb = mix(diffuseColor.rgb, astronautColor, 0.98);`
      );
    };
    obj.material = material;
    obj.material.needsUpdate = true;
  });
}

function findAvatarAction(kind){
  if(!avatar.animActions) return null;
  const keys = Object.keys(avatar.animActions);
  const wanted = {
    idle:['idle','stand','breath'],
    walk:['walk'],
    run:['run','jog']
  }[kind] || [kind];
  const key = keys.find(name => wanted.some(token => name.includes(token)));
  return key ? avatar.animActions[key] : null;
}

function setAvatarClip(kind, fade=.16){
  const fallbackKind = kind === 'run' ? 'walk' : kind === 'walk' ? 'run' : null;
  const next = findAvatarAction(kind) || (fallbackKind ? findAvatarAction(fallbackKind) : null);
  if(!next){
    if(kind === 'idle' && avatar.activeClip){
      avatar.activeClip.fadeOut(fade);
      avatar.activeClip = null;
    }
    return;
  }
  if(avatar.activeClip === next) return;
  next.enabled = true;
  next.reset();
  next.setEffectiveWeight(1);
  next.play();
  if(avatar.activeClip){
    avatar.activeClip.crossFadeTo(next, fade, false);
  }
  avatar.activeClip = next;
}

function setupAvatarAnimations(model, animations=[]){
  if(avatar.mixer){
    avatar.mixer.stopAllAction();
    avatar.mixer = null;
  }
  avatar.animActions = {};
  avatar.activeClip = null;
  if(!animations.length) return;
  avatar.mixer = new THREE.AnimationMixer(model);
  animations.forEach(clip => {
    avatar.animActions[clip.name.toLowerCase()] = avatar.mixer.clipAction(clip);
  });
  setAvatarClip('idle', 0);
}

function updateAvatarMorphs(t){
  if(!avatar.morphMeshes.length) return;
  CONTROLLED_MORPHS.forEach(name => setAvatarMorph(name, 0));
  const face = FACE_PRESETS[state.avatar.face] || FACE_PRESETS.natural;
  const expression = EXPRESSION_PRESETS[state.avatar.expression] || EXPRESSION_PRESETS.neutral;
  Object.entries(face).forEach(([name, value]) => setAvatarMorph(name, value));
  Object.entries(expression).forEach(([name, value]) => setAvatarMorph(name, value));
  const blinkPhase = (t + .37) % 4.2;
  const blink = blinkPhase < .13 ? Math.sin((blinkPhase / .13) * Math.PI) : 0;
  setAvatarMorph('eyeBlinkLeft', blink);
  setAvatarMorph('eyeBlinkRight', blink);
  if(avatarAction.name === 'jump'){
    setAvatarMorph('jawOpen', Math.sin(Math.min(1, avatarAction.time / Math.max(.001, avatarAction.duration)) * Math.PI) * .12);
  }
}

function wait(ms){

function waitForAvatarModelReady(timeoutMs=MAX_HUB_LOADING_MS){
