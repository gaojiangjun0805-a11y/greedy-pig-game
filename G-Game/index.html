<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>G-Game 六维脑力空间</title>
<style>
  :root{
    --bg:#060812;
    --panel:rgba(12,18,34,.74);
    --panel-strong:rgba(15,22,42,.92);
    --line:rgba(170,205,255,.18);
    --line-strong:rgba(170,205,255,.34);
    --text:#f3f7ff;
    --muted:#9aabc6;
    --space:#4aa8ff;
    --logic:#a778ff;
    --memory:#ffd166;
    --observe:#2ee6d6;
    --create:#ff7fca;
    --calc:#75e06f;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif}
  button{font:inherit;color:inherit}
  #stage{position:fixed;inset:0;background:#03060f}
  #three{position:absolute;inset:0;width:100%;height:100%;display:block}
  #safetyOverlay{
    position:fixed;left:50%;top:50%;z-index:2;transform:translate(-50%,-50%);pointer-events:none;
    width:min(46vw,420px);height:min(46vw,420px);border-radius:50%;
    background:radial-gradient(circle,rgba(159,216,255,.07),rgba(255,127,202,.04) 42%,transparent 70%);
    filter:blur(1px);
  }

  .topbar{
    position:fixed;left:18px;right:18px;top:14px;z-index:10;
    display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;
    pointer-events:none;
  }
  .brand,.quick,.radarPanel,.portalInfo,.diyPanel,.gameDock{
    border:1px solid var(--line);background:var(--panel);box-shadow:0 18px 60px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.08);
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  }
  .brand{padding:12px 16px;border-radius:14px;min-width:260px}
  .brand h1{font-size:24px;line-height:1;font-weight:900;letter-spacing:0;background:linear-gradient(110deg,#fff,#9fd8ff,#ffdb8a,#ff8bcf,#7df0a0);-webkit-background-clip:text;background-clip:text;color:transparent}
  .brand p{font-size:13px;color:var(--muted);margin-top:7px;letter-spacing:0}
  .quick{justify-self:end;display:flex;gap:8px;padding:8px;border-radius:14px;pointer-events:auto}
  .quick button,.primaryBtn,.ghostBtn,.chipBtn{
    height:38px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.08);padding:0 13px;cursor:pointer;
    transition:transform .12s ease,border-color .16s ease,background .16s ease;
  }
  .quick button:active,.primaryBtn:active,.ghostBtn:active,.chipBtn:active{transform:scale(.96)}
  #radarToggle{display:none}
  #soundToggle.active{border-color:var(--observe);background:rgba(46,230,214,.16)}
  .primaryBtn{border:none;background:linear-gradient(135deg,#9fd8ff,#7df0a0);color:#06101c;font-weight:900}
  .ghostBtn{background:rgba(255,255,255,.08);color:var(--text)}
  .chipBtn.active{border-color:var(--observe);background:rgba(46,230,214,.15)}

  .radarPanel{
    position:fixed;left:auto;right:18px;top:88px;bottom:auto;z-index:11;width:150px;border-radius:14px;padding:8px;
    background:rgba(9,15,29,.56);cursor:pointer;
  }
  .panelTitle{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-bottom:2px}
  .panelTitle h2{font-size:12px;font-weight:900;letter-spacing:0}
  .levelBadge{font-size:10px;color:#07101d;background:linear-gradient(135deg,#ffdb8a,#7df0a0);font-weight:900;border-radius:999px;padding:3px 7px}
  .radarClose{display:none;width:26px;height:26px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.08);cursor:pointer}
  #radar{width:100%;height:100px;display:block}
  .abilityGrid{display:none;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
  .abilityItem{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:7px 9px;background:rgba(255,255,255,.04)}
  .abilityItem b{color:var(--text);font-variant-numeric:tabular-nums}
  .radarPanel.expanded{
    width:min(300px,calc(100vw - 20px));padding:12px;cursor:default;background:rgba(9,15,29,.86);
  }
  .radarPanel.expanded .panelTitle{margin-bottom:8px}
  .radarPanel.expanded .panelTitle h2{font-size:16px}
  .radarPanel.expanded .levelBadge{font-size:11px;padding:4px 8px}
  .radarPanel.expanded .radarClose{display:inline-flex;align-items:center;justify-content:center}
  .radarPanel.expanded #radar{height:178px}
  .radarPanel.expanded .abilityGrid{display:grid}
  body.diyOpen .radarPanel{display:none}

  .portalInfo{
    position:fixed;left:18px;right:auto;bottom:18px;z-index:11;width:350px;border-radius:16px;padding:16px;display:none;
  }
  .portalInfo.show{display:block;animation:fadeUp .18s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .portalInfo h2{font-size:22px;font-weight:900;margin-bottom:6px}
  .portalInfo p{color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:12px}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 14px}
  .tag{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:5px 9px;background:rgba(255,255,255,.06)}
  .portalActions{display:flex;gap:10px}
  .portalActions button{flex:1}

  .diyPanel{
    position:fixed;right:18px;top:86px;z-index:12;width:330px;max-height:calc(100vh - 112px);overflow:auto;border-radius:16px;padding:16px;display:none;
  }
  .diyPanel.show{display:block;animation:fadeUp .18s ease both}
  .diyRow{margin-top:14px}
  .diyRow h3{font-size:13px;color:var(--muted);font-weight:800;margin-bottom:8px}
  .swatches,.choices{display:flex;flex-wrap:wrap;gap:8px}
  .swatch{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.28);cursor:pointer}
  .swatch.active{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.14)}
  .choices button.active{border-color:var(--memory);background:rgba(255,209,102,.14)}

  .gameDock{
    position:fixed;inset:14px;z-index:30;border-radius:18px;display:none;overflow:hidden;background:rgba(3,7,16,.96);
  }
  .gameDock.show{display:grid;grid-template-rows:54px 1fr}
  .gameTop{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--line);background:rgba(9,14,28,.96)}
  .gameTop h2{font-size:18px;font-weight:900;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:auto}
  #gameFrame{width:100%;height:100%;border:0;background:#000}

  .mobilePad{
    position:fixed;left:18px;right:auto;bottom:18px;z-index:12;width:112px;height:112px;border-radius:50%;
    border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);display:block;touch-action:none;
  }
  .stick{position:absolute;left:38px;top:38px;width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#9fd8ff,#7df0a0);box-shadow:0 8px 24px rgba(0,0,0,.34)}
  .enterHint{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:12;
    padding:10px 16px;border-radius:999px;background:rgba(10,16,30,.82);border:1px solid var(--line);color:var(--text);font-weight:900;display:none;
    -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  }
  .enterHint.show{display:block}
  .toast{
    position:fixed;left:50%;top:84px;z-index:40;transform:translateX(-50%);
    background:rgba(10,18,32,.9);border:1px solid var(--line-strong);padding:11px 16px;border-radius:999px;display:none;font-weight:900;
  }
  .toast.show{display:block;animation:fadeUp .18s ease both}
  #bootCover{
    position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 30%,#14213f,#050812 72%);
    color:var(--text);padding:22px;text-align:center;
  }
  #bootCover.hide{opacity:0;pointer-events:none;transition:opacity .45s ease}
  .bootCard{width:min(92vw,780px);padding:34px 26px;border-radius:20px;border:1px solid var(--line-strong);background:rgba(10,16,30,.74);box-shadow:0 24px 90px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px)}
  .bootLogo{font-size:clamp(48px,11vw,94px);font-weight:900;letter-spacing:2px;background:linear-gradient(110deg,#fff,#9fd8ff,#ffdb8a,#ff8bcf,#7df0a0);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 4px 30px rgba(159,216,255,.34))}
  .bootTitle{font-size:clamp(20px,4.6vw,32px);font-weight:900;margin-top:8px}
  .bootSub{color:var(--muted);font-size:15px;line-height:1.7;margin:10px auto 20px;max-width:560px}
  .bootPulse{width:118px;height:3px;border-radius:999px;margin:18px auto 0;background:linear-gradient(90deg,transparent,#9fd8ff,#7df0a0,transparent);animation:pulseLine 1.2s ease-in-out infinite}
  @keyframes pulseLine{0%,100%{opacity:.28;transform:scaleX(.62)}50%{opacity:1;transform:scaleX(1)}}
  .bootActions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .bootActions button,.bootActions a{height:44px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.08);padding:0 20px;color:var(--text);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;font-weight:900}
  .bootActions .start{border:none;background:linear-gradient(135deg,#9fd8ff,#7df0a0);color:#06101c}
  .fallbackList{display:none;margin-top:18px;grid-template-columns:repeat(auto-fit,minmax(138px,1fr));gap:8px}
  .fallbackList a{color:var(--text);text-decoration:none;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(255,255,255,.06);font-size:14px;text-align:left}
  body.fallback .fallbackList{display:grid}
  body.fallback #bootMsg{color:#ffdb8a}

  @media (max-width:820px){
    .topbar{left:10px;right:10px;top:10px;grid-template-columns:1fr auto}
    .topbar > div{display:none}
    .brand{min-width:0;padding:8px 10px;border-radius:12px;visibility:hidden}
    .brand h1{font-size:15px}
    .brand p{display:none}
    .quick{gap:5px;padding:6px;border-radius:12px}
    .quick button{height:30px;padding:0 8px;font-size:12px;border-radius:8px}
    #radarToggle{display:none}
    .radarPanel{
      left:10px;right:auto;bottom:auto;top:10px;width:126px;display:block;
      padding:7px;border-radius:14px;background:rgba(9,15,29,.56);
      box-shadow:0 10px 30px rgba(0,0,0,.26),inset 0 1px 0 rgba(255,255,255,.08);
    }
    .radarPanel.showMobile{display:block}
    .radarPanel .panelTitle{margin-bottom:2px;gap:4px}
    .radarPanel .panelTitle h2{font-size:11px}
    .radarPanel .levelBadge{font-size:9px;padding:2px 6px}
    #radar{height:74px}
    .abilityGrid{display:none}
    .portalInfo{left:112px;right:8px;bottom:8px;width:auto;padding:10px;border-radius:14px;max-height:34vh;overflow:auto}
    .portalInfo h2{font-size:17px;margin-bottom:4px}
    .portalInfo p{font-size:12px;line-height:1.45;margin-bottom:7px}
    .tags{gap:5px;margin:7px 0 9px}
    .tag{font-size:11px;padding:4px 7px}
    .portalActions{gap:6px}
    .portalActions button{height:34px;font-size:13px;border-radius:9px;padding:0 8px}
    .diyPanel{left:10px;right:10px;top:64px;width:auto;max-height:calc(100vh - 82px);padding:12px}
    .mobilePad{display:block;left:12px;right:auto;bottom:12px;width:86px;height:86px}
    .stick{left:28px;top:28px;width:30px;height:30px}
    .enterHint.show{display:none}
    .gameDock{inset:8px;border-radius:14px}
    .gameTop h2{font-size:15px}
  }
</style>
<style id="touchGuardStyle">
  html, body, body *{
    -webkit-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
  }
  img, svg, canvas{
    -webkit-user-drag:none;
    user-drag:none;
  }
  input, textarea, [contenteditable="true"]{
    -webkit-user-select:text;
    user-select:text;
    -webkit-touch-callout:default;
  }
</style>
</head>
<body>
<div id="bootCover">
  <div class="bootCard">
    <div class="bootLogo">G-Game</div>
    <div class="bootTitle">六维脑力空间</div>
    <div class="bootSub">空间力 · 推理力 · 记忆力 · 观察力 · 创造力 · 计算力</div>
    <div class="bootActions">
      <button class="start" id="bootStart" type="button">进入大厅</button>
    </div>
    <div class="bootPulse"></div>
  </div>
</div>

<div id="stage"><div id="safetyOverlay"></div><canvas id="three"></canvas></div>

<header class="topbar">
  <section class="brand">
    <h1>G-Game 六维脑力空间</h1>
    <p>空间力 · 推理力 · 记忆力 · 观察力 · 创造力 · 计算力</p>
  </section>
  <div></div>
  <nav class="quick">
    <button id="radarToggle">六维</button>
    <button id="soundToggle">音</button>
    <button id="diyToggle">DIY</button>
    <button id="resetData">重置</button>
  </nav>
</header>

<aside class="radarPanel" id="radarPanel">
  <div class="panelTitle">
    <h2>能力雷达</h2>
    <span class="levelBadge" id="levelBadge">Lv.1</span>
    <button class="radarClose" id="radarClose" type="button" aria-label="关闭雷达详情">×</button>
  </div>
  <canvas id="radar" width="584" height="420"></canvas>
  <div class="abilityGrid" id="abilityGrid"></div>
</aside>

<aside class="portalInfo" id="portalInfo">
  <h2 id="portalName">游戏名</h2>
  <p id="portalDesc">游戏简介</p>
  <div class="tags" id="portalTags"></div>
  <div class="portalActions">
    <button class="primaryBtn" id="playGame">进入挑战</button>
    <button class="ghostBtn" id="markDone">完成加分</button>
  </div>
</aside>

<aside class="diyPanel" id="diyPanel">
  <div class="panelTitle">
    <h2>角色 DIY</h2>
    <button class="ghostBtn" id="closeDiy">关闭</button>
  </div>
  <div class="diyRow">
    <h3>服装颜色</h3>
    <div class="swatches" id="colorSwatches"></div>
  </div>
  <div class="diyRow">
    <h3>肤色</h3>
    <div class="swatches" id="skinSwatches"></div>
  </div>
  <div class="diyRow">
    <h3>脸部</h3>
    <div class="choices" id="faceChoices"></div>
  </div>
  <div class="diyRow">
    <h3>神态</h3>
    <div class="choices" id="expressionChoices"></div>
  </div>
  <div class="diyRow">
    <h3>性别</h3>
    <div class="choices" id="genderChoices"></div>
  </div>
  <div class="diyRow">
    <h3>发型</h3>
    <div class="choices" id="hairChoices"></div>
  </div>
  <div class="diyRow">
    <h3>身高</h3>
    <div class="choices" id="heightChoices"></div>
  </div>
  <div class="diyRow">
    <h3>身材</h3>
    <div class="choices" id="buildChoices"></div>
  </div>
	  <div class="diyRow">
	    <h3>服装</h3>
	    <div class="choices" id="suitChoices"></div>
	  </div>
	  <div class="diyRow">
	    <h3>下装</h3>
	    <div class="choices" id="bottomChoices"></div>
	  </div>
	  <div class="diyRow">
	    <h3>鞋子</h3>
	    <div class="choices" id="shoeChoices"></div>
	  </div>
	  <div class="diyRow">
	    <h3>动作</h3>
	    <div class="choices" id="actionChoices"></div>
  </div>
</aside>

<section class="gameDock" id="gameDock">
  <div class="gameTop">
    <button class="ghostBtn" id="closeGame">返回大厅</button>
    <h2 id="gameTitle">游戏</h2>
    <button class="primaryBtn" id="completeGame">完成本局</button>
  </div>
  <iframe id="gameFrame" title="G-Game embedded game"></iframe>
</section>

<div class="mobilePad" id="mobilePad"><div class="stick" id="stick"></div></div>
<div class="enterHint" id="enterHint">进入挑战</div>
<div class="toast" id="toast"></div>
<audio id="hubBgm" preload="auto" autoplay muted playsinline crossorigin="anonymous" src="https://cdn1.suno.ai/c34a3068-7705-4fdc-871f-293541ca6b19.mp3"></audio>

<script>
const fallbackButton = document.getElementById('showFallback');
if(fallbackButton){
  fallbackButton.addEventListener('click', function(){
    document.body.classList.add('fallback');
    var msg = document.getElementById('bootMsg');
    if(msg) msg.textContent = '基础列表模式：直接点击游戏进入。';
  });
}
window.addEventListener('error', function(e){
  document.body.classList.add('fallback');
  var msg = document.getElementById('bootMsg');
  if(msg) msg.textContent = '3D 大厅加载遇到问题，先用基础列表进入游戏。错误：' + (e.message || '未知错误');
});
window.addEventListener('unhandledrejection', function(e){
  document.body.classList.add('fallback');
  var msg = document.getElementById('bootMsg');
  if(msg) msg.textContent = '3D 大厅加载遇到问题，先用基础列表进入游戏。';
});
</script>

}
</script>

function loadState(){
  const defaults = {
    abilities:{space:20,logic:20,memory:20,observe:20,create:20,calc:20},
    completed:{},
    avatar:{color:'#4aa8ff', skin:'#d9a982', face:'natural', expression:'neutral', gender:'neutral', hair:'short', height:'mid', build:'standard', suit:'sport', bottom:'pants', legwear:'bare', shoes:'boot'}
  };
  try{
    const saved = JSON.parse(localStorage.getItem('ggame-hub-v1')) || {};
    const avatar = {...defaults.avatar, ...(saved.avatar||{})};
    if(!/^#[0-9a-f]{6}$/i.test(avatar.skin || '')) avatar.skin = defaults.avatar.skin;
    if(!Object.prototype.hasOwnProperty.call(FACE_PRESETS, avatar.face)) avatar.face = 'natural';
    if(!Object.prototype.hasOwnProperty.call(EXPRESSION_PRESETS, avatar.expression)) avatar.expression = 'neutral';
    if(!['neutral','female','male'].includes(avatar.gender)) avatar.gender = 'neutral';
    if(!['short','bob','ponytail','curly'].includes(avatar.hair)) avatar.hair = 'short';
    if(!['short','mid','tall'].includes(avatar.height)) avatar.height = 'mid';
    if(!['slim','standard','strong'].includes(avatar.build)) avatar.build = 'standard';
    if(!['sport','jacket','coat'].includes(avatar.suit)) avatar.suit = avatar.suit === 'long' ? 'coat' : 'sport';
    if(!['pants','shorts'].includes(avatar.bottom)) avatar.bottom = 'pants';
    avatar.legwear = 'bare';
    if(!['sneaker','boot'].includes(avatar.shoes)) avatar.shoes = 'boot';
    return {
      abilities:{...defaults.abilities, ...(saved.abilities||{})},
      completed:{...(saved.completed||{})},
      avatar
    };
  }catch(e){ return defaults; }
}

function makeMat(color, rough=.48, metal=.08, emissive=0){
  const mat = new THREE.MeshStandardMaterial({color, roughness:rough, metalness:metal});
  if(emissive){ mat.emissive = new THREE.Color(color); mat.emissiveIntensity = emissive; }
  return mat;
}
function makeGlowMat(color, opacity=.38){
  const mat = new THREE.MeshBasicMaterial({color, transparent:true, opacity, depthWrite:false});
  if(THREE.AdditiveBlending !== undefined) mat.blending = THREE.AdditiveBlending;
  return mat;
}
function setTextureColorSpace(texture){
  if(THREE.SRGBColorSpace) texture.colorSpace = THREE.SRGBColorSpace;
  return texture;
}
function makeAviationFloorMaterial(repeat=8){
  const c = document.createElement('canvas');
  c.width = 512;
  c.height = 512;
  const ctx = c.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,512,512);
  grad.addColorStop(0,'#2a3443');
  grad.addColorStop(.48,'#182130');
  grad.addColorStop(1,'#354052');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,512,512);

  const noise = ctx.createImageData(512,512);
  for(let i=0;i<noise.data.length;i+=4){
    const v = 118 + Math.random() * 22;
    noise.data[i] = v;
    noise.data[i+1] = v + 8;
    noise.data[i+2] = v + 18;
    noise.data[i+3] = 18;
  }
  ctx.putImageData(noise,0,0);

  const sheen = ctx.createLinearGradient(0,0,512,0);
  sheen.addColorStop(0,'rgba(255,255,255,.05)');
  sheen.addColorStop(.5,'rgba(255,255,255,.16)');
  sheen.addColorStop(1,'rgba(255,255,255,.04)');
  ctx.fillStyle = sheen;
  ctx.fillRect(0,0,512,512);

  const texture = setTextureColorSpace(new THREE.CanvasTexture(c));
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.RepeatWrapping;
  texture.repeat.set(repeat, repeat);
  texture.anisotropy = 4;
  return new THREE.MeshStandardMaterial({
    color:0xb4c0ca,
    map:texture,
    roughness:.36,
    metalness:.46,
    emissive:0x09111c,
    emissiveIntensity:.08
  });
}
function roundedRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}
function makeTextSprite(text, options={}){
  const width = options.width || 640;
  const height = options.height || 190;
  const canvasLabel = document.createElement('canvas');
  canvasLabel.width = width;
  canvasLabel.height = height;
  const ctx = canvasLabel.getContext('2d');
  const bg = options.bg || 'rgba(7,12,24,.72)';
  const accent = options.accent || '#9fd8ff';
  ctx.clearRect(0,0,width,height);
  roundedRect(ctx, 14, 18, width-28, height-36, 34);
  ctx.fillStyle = bg;
  ctx.fill();
  const shine = ctx.createLinearGradient(0,18,width,height-18);
  shine.addColorStop(0,'rgba(255,255,255,.12)');
  shine.addColorStop(.45,'rgba(255,255,255,.02)');
  shine.addColorStop(1,'rgba(255,255,255,.08)');
  ctx.fillStyle = shine;
  ctx.fill();
  ctx.lineWidth = 5;
  ctx.strokeStyle = accent;
  ctx.stroke();
  ctx.shadowColor = 'rgba(0,0,0,.8)';
  ctx.shadowBlur = 12;
  ctx.shadowOffsetY = 5;
  ctx.fillStyle = options.color || '#ffffff';
  ctx.font = `900 ${options.fontSize || 72}px PingFang SC, Microsoft YaHei, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, width/2, height/2 + 3);
  const texture = setTextureColorSpace(new THREE.CanvasTexture(canvasLabel));
  const material = new THREE.SpriteMaterial({map:texture, transparent:true, depthWrite:false});
  const sprite = new THREE.Sprite(material);
  const scale = options.scale || .72;
  sprite.scale.set(width / height * scale, scale, 1);
  return sprite;
}
function addTube(group, from, to, radius, mat){
  const start = new THREE.Vector3(from[0], from[1], from[2]);
  const end = new THREE.Vector3(to[0], to[1], to[2]);
  const dir = new THREE.Vector3().subVectors(end, start);
  const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, dir.length(), 12), mat);
  mesh.position.copy(start).add(end).multiplyScalar(.5);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
  mesh.castShadow = true;
  group.add(mesh);
  return mesh;
}
function portalLocalPosition(index, total){
  if(total <= 1) return {x:0, z:-5.45, rot:0, lift:0};
  const spread = total >= 3 ? .62 : .52;
  const angle = (index - (total - 1) / 2) * spread;
  const radius = 5.85 + Math.max(0,total-2) * .7;
  const stagger = index % 2 === 0 ? .35 : -.18;
  return {x:Math.sin(angle)*radius, z:-Math.cos(angle)*radius + stagger, rot:angle, lift:(index - (total - 1) / 2) * .28};
}

function addWallPanel(room, x, z, rot, accent, wide=false){
  const frameMat = makeMat(0x253553,.48,.18,.03);
  const insetMat = makeMat(0x0a1224,.62,.08);
  const panel = new THREE.Group();
  panel.position.set(x,4.2,z);
  panel.rotation.y = rot;

  const frame = new THREE.Mesh(new THREE.BoxGeometry(wide ? 5.8 : 3.4,3.2,.16), frameMat);
  frame.castShadow = true;
  panel.add(frame);

  const inset = new THREE.Mesh(new THREE.BoxGeometry(wide ? 5.1 : 2.8,2.42,.2), insetMat);
  inset.position.z = .035;
  panel.add(inset);

  const stripe = new THREE.Mesh(new THREE.BoxGeometry(wide ? 4.2 : 2.1,.055,.24), makeGlowMat(accent,.44));
  stripe.position.set(0,1.02,.16);
  panel.add(stripe);

  const lowerStripe = stripe.clone();
  lowerStripe.position.y = -1.02;
  panel.add(lowerStripe);

  room.add(panel);
  return panel;
}

function createSolemnFallbackTree(parent){
  const fallback = new THREE.Group();
  fallback.userData.kind = 'fallbackTree';
  parent.add(fallback);

  const barkMat = makeMat(0x5b432f,.74,.08,.04);
  const darkBarkMat = makeMat(0x2f241d,.82,.06,.02);
  const leafMats = [
    makeMat(0x233f32,.64,.02,.04),
    makeMat(0x3d6545,.58,.02,.06),
    makeMat(0x617647,.6,.02,.05)
  ];
  const glowMat = makeGlowMat(0xb8ffd9,.22);

  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(.42,.82,5.8,18), barkMat);
  trunk.position.y = 3.02;
  trunk.rotation.z = -.045;
  trunk.castShadow = true;
  trunk.receiveShadow = true;
  fallback.add(trunk);

  for(let i=0;i<8;i++){
    const angle = i / 8 * Math.PI * 2;
    addTube(fallback, [Math.cos(angle)*.34,.62,Math.sin(angle)*.34], [Math.cos(angle)*2.35,.35,Math.sin(angle)*2.35], .05, darkBarkMat);
  }

  const branchData = [
    [[0,3.72,0],[-1.9,5.2,-.72],.17],
    [[0,3.94,0],[2.05,5.35,-.64],.16],
    [[0,4.18,0],[-.82,5.9,1.55],.13],
    [[0,4.32,0],[1.08,6.08,1.2],.13],
    [[0,4.06,0],[.42,5.18,-2.05],.14],
    [[0,4.58,0],[-1.68,6.2,.62],.11],
    [[0,4.68,0],[1.72,6.35,.52],.1]
  ];
  branchData.forEach(([from,to,r], i)=>{
    addTube(fallback, from, to, r, barkMat);
    if(i < 5) addTube(fallback, from, to, r*.18, glowMat);
  });

  const leafGeo = new THREE.SphereGeometry(.085,12,8);
  const canopyAnchors = [
    {p:[0,6.38,0],s:[2.24,1.05,1.72],count:38},
    {p:[-1.38,6.08,-.26],s:[1.34,.76,1.08],count:22},
    {p:[1.46,6.16,-.36],s:[1.4,.78,1.12],count:24},
    {p:[-.62,6.88,.72],s:[1.05,.58,.92],count:18},
    {p:[.82,6.98,.46],s:[.96,.52,.82],count:18},
    {p:[.12,7.28,-.12],s:[.76,.42,.66],count:14}
  ];
  canopyAnchors.forEach((anchor,i)=>{
    for(let j=0;j<anchor.count;j++){
      const seed = i * 97 + j * 29 + 11;
      const theta = seed * 2.399963229728653;
      const radius = Math.sqrt(((seed * 37) % 100) / 100);
      const heightJitter = (((seed * 53) % 100) / 100 - .5);
      const leaf = new THREE.Mesh(leafGeo, leafMats[(seed + i) % leafMats.length]);
      leaf.position.set(
        anchor.p[0] + Math.cos(theta) * anchor.s[0] * radius,
        anchor.p[1] + heightJitter * anchor.s[1],
        anchor.p[2] + Math.sin(theta) * anchor.s[2] * radius
      );
      const scale = .72 + (((seed * 17) % 100) / 100) * .9;
      leaf.scale.set(scale * 1.35, scale * .62, scale);
      leaf.rotation.set(seed*.013, seed*.021, seed*.017);
      leaf.castShadow = true;
      leaf.receiveShadow = true;
      leaf.userData.kind = 'fallbackLeaf';
      leaf.userData.floatBaseY = leaf.position.y;
      leaf.userData.floatAmp = .014 + (j % 5) * .004;
      wisdomTreeParts.push(leaf);
      fallback.add(leaf);
    }
  });

  ABILITIES.forEach((ability,i)=>{
    const angle = i / ABILITIES.length * Math.PI * 2 - Math.PI/2;
    const fruit = new THREE.Mesh(new THREE.IcosahedronGeometry(.12,1), makeGlowMat(ability.color,.34));
    fruit.position.set(Math.cos(angle)*1.8, 6.68 + (i%2)*.36, Math.sin(angle)*1.36);
    fruit.userData.kind = 'spark';
    fruit.userData.floatBaseY = fruit.position.y;
    fruit.userData.floatAmp = .05;
    wisdomTreeParts.push(fruit);
    fallback.add(fruit);
  });

  return fallback;
}

function buildWisdomTree(){
  const tree = new THREE.Group();
  tree.position.set(0,.28,0);
  root.add(tree);

  const rootGlow = makeGlowMat(0x8ef7d4,.36);
  const gold = makeMat(0xc9a45a,.34,.24,.08);

  const soil = new THREE.Mesh(new THREE.CylinderGeometry(3.55,3.9,.28,72), makeMat(0x171c24,.72,.12));
  soil.position.y = .1;
  soil.receiveShadow = true;
  soil.castShadow = true;
  tree.add(soil);

  const baseRing = new THREE.Mesh(new THREE.TorusGeometry(3.95,.07,12,128), gold);
  baseRing.rotation.x = Math.PI/2;
  baseRing.position.y = .29;
  tree.add(baseRing);

  const rootRing = new THREE.Mesh(new THREE.TorusGeometry(4.7,.036,10,128), rootGlow);
  rootRing.rotation.x = Math.PI/2;
  rootRing.position.y = .34;
  rootRing.userData.floatBaseY = rootRing.position.y;
  rootRing.userData.kind = 'ring';
  wisdomTreeParts.push(rootRing);
  tree.add(rootRing);

  const pillarMat = makeMat(0x242b34,.52,.28,.03);
  ABILITIES.forEach((ability,i)=>{
    const angle = i / ABILITIES.length * Math.PI * 2 - Math.PI/2;
    const pillar = new THREE.Mesh(new THREE.CylinderGeometry(.12,.18,1.18,6), pillarMat);
    pillar.position.set(Math.cos(angle)*4.18,.85,Math.sin(angle)*4.18);
    pillar.rotation.y = angle;
    pillar.castShadow = true;
    pillar.receiveShadow = true;
    tree.add(pillar);

    const flame = new THREE.Mesh(new THREE.IcosahedronGeometry(.14,1), makeGlowMat(ability.color,.42));
    flame.position.set(Math.cos(angle)*4.18,1.55,Math.sin(angle)*4.18);
    flame.userData.kind = 'spark';
    flame.userData.floatBaseY = flame.position.y;
    flame.userData.floatAmp = .045;
    wisdomTreeParts.push(flame);
    tree.add(flame);
  });

  for(let i=0;i<10;i++){
    const angle = i / 12 * Math.PI * 2;
    const len = i % 3 === 0 ? 4.25 : 3.35;
    addTube(tree, [.42*Math.cos(angle+.18), .3, .42*Math.sin(angle+.18)], [len*Math.cos(angle), .32, len*Math.sin(angle)], .018, rootGlow);
  }

  const halo = new THREE.Mesh(new THREE.TorusGeometry(3.05,.026,8,128), makeGlowMat(0x9fd8ff,.3));
  halo.rotation.x = Math.PI/2;
  halo.position.y = 6.85;
  halo.userData.kind = 'halo';
  wisdomTreeParts.push(halo);
  tree.add(halo);

  const fallbackTree = createSolemnFallbackTree(tree);
  let realTreeLoaded = false;
  const showFallbackTimer = setTimeout(() => {
    if(!realTreeLoaded) fallbackTree.visible = true;
  }, 8000);

  const treeModelUrl = LOW_POWER_DEVICE ? WISDOM_TREE_MOBILE_MODEL : WISDOM_TREE_MODEL;
  const loader = new GLTFLoader();
  loader.load(treeModelUrl, gltf => {
    realTreeLoaded = true;
    clearTimeout(showFallbackTimer);
    const source = gltf.scene;
    const chosen = source.getObjectByName('island_tree_02_LOD0')
      || source.children.find(child => child.isObject3D)
      || source;
    const realTree = chosen.clone(true);
    realTree.traverse(obj => {
      if(obj.isMesh){
        obj.castShadow = true;
        obj.receiveShadow = true;
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        mats.filter(Boolean).forEach(mat => {
          mat.side = THREE.DoubleSide;
          mat.alphaTest = Math.max(mat.alphaTest || 0, .32);
          mat.transparent = false;
          if(mat.map && THREE.SRGBColorSpace) mat.map.colorSpace = THREE.SRGBColorSpace;
        });
      }
    });
    const box = new THREE.Box3().setFromObject(realTree);
    if(!Number.isFinite(box.min.x)) return;
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const scale = Math.min(11 / Math.max(size.y,.001), 8.2 / Math.max(size.x,size.z,.001));
    realTree.position.x -= center.x;
    realTree.position.z -= center.z;
    realTree.position.y -= box.min.y;
    realTree.scale.set(scale * 1.12, scale * 1.36, scale * 1.12);
    realTree.rotation.y = -.3;
    realTree.userData.kind = 'realTree';
    tree.add(realTree);
    fallbackTree.visible = false;

    ABILITIES.forEach((ability,i)=>{
      const angle = i / ABILITIES.length * Math.PI * 2 - Math.PI/2;
      const spark = new THREE.Mesh(new THREE.IcosahedronGeometry(.08,1), makeGlowMat(ability.color,.36));
      spark.position.set(Math.cos(angle)*3.18, 7.35 + (i%2)*.56, Math.sin(angle)*2.48);
      spark.userData.kind = 'spark';
      spark.userData.floatBaseY = spark.position.y;
      spark.userData.floatAmp = .06;
      wisdomTreeParts.push(spark);
      tree.add(spark);
    });
  }, undefined, err => {
    console.warn('Wisdom tree model failed to load', err);
    clearTimeout(showFallbackTimer);
    fallbackTree.visible = true;
  });

  const treeLight = new THREE.PointLight(0xa9ffd6,18,22,1.55);
  treeLight.position.set(0,7.25,0);
  tree.add(treeLight);
  const warmLight = new THREE.PointLight(0xffd166,7,16,1.9);
  warmLight.position.set(-1.2,2.2,1.4);
  tree.add(warmLight);
}

    innerPad.position.y = .28;
    innerPad.receiveShadow = true;
    group.add(innerPad);

    const ring = new THREE.Mesh(new THREE.TorusGeometry(4.65,.08,12,96), makeMat(0xb9c5d0,.34,.26,.05));
    ring.rotation.x = Math.PI / 2;
    ring.position.y = .44;

    const outerRing = new THREE.Mesh(new THREE.TorusGeometry(6.1,.06,12,96), makeGlowMat(color,.36));
    outerRing.rotation.x = Math.PI / 2;

    label.position.set(0,4.95,2.55);

  GAMES.forEach((game, idx)=>{

    const zone = zoneGroups[game.zone];
    const zoneGames = GAMES.filter(g=>g.zone===game.zone);
    const localIndex = zoneGames.findIndex(g=>g.id===game.id);
    const slot = portalLocalPosition(localIndex, zoneGames.length);
    const portal = createPortal(game, ability.color);
    portal.group.position.set(slot.x, .18, slot.z);
    portal.group.rotation.y = slot.rot;
    portal.group.userData.labelLift = slot.lift;
    if(portal.label) portal.label.position.y += slot.lift;
    if(portal.marker) portal.marker.position.y += slot.lift * .55;

    portals.push(portal);
    if(portal.motif) portalMotifs.push(portal.motif);

  const starMat = new THREE.PointsMaterial({color:0x9fd8ff, size:.08, transparent:true, opacity:.72});
  const starGeo = new THREE.BufferGeometry();

  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(pts,3));
  scene.add(new THREE.Points(starGeo, starMat));
}

function createGameMotif(game, col){
  const group = new THREE.Group();
  const accent = col.getStyle();
  const accentMat = makeMat(col,.26,.3,.5);
  const glowMat = makeGlowMat(col,.42);
  const darkMat = makeMat(0x081020,.54,.18);
  const paleMat = makeMat(0xdbeaff,.34,.08);
  const goldMat = makeMat(0xffd166,.28,.22,.14);
  const whiteMat = makeMat(0xf5f7ff,.42,.04);
  const blackMat = makeMat(0x10131c,.48,.08);
  const smallLabel = (text, pos, scale=.24) => {
    const sprite = makeTextSprite(text, {accent, scale, fontSize:84, width:280, height:180, bg:'rgba(5,8,16,.66)'});
    sprite.position.set(pos[0], pos[1], pos[2]);
    group.add(sprite);
    return sprite;
  };

  if(game.id === 'gcd'){
    const pts = [[-.72,.42,.05],[.58,.82,.15],[.15,.32,-.66]];
    pts.forEach((p, i)=>{
      const n = new THREE.Mesh(new THREE.SphereGeometry(.22,28,18), i === 2 ? goldMat : accentMat);
      n.position.set(p[0],p[1],p[2]);
      n.castShadow = true;
      group.add(n);
    });
    addTube(group, pts[0], pts[1], .035, glowMat);
    addTube(group, pts[1], pts[2], .035, glowMat);
    addTube(group, pts[2], pts[0], .035, glowMat);
    smallLabel('12',[-.72,.82,.05]);
    smallLabel('18',[.58,1.22,.15]);
    smallLabel('6',[.15,.72,-.66]);
  }else if(game.id === 'black-white'){
    for(let r=0;r<3;r++){
      for(let c=0;c<3;c++){
        const tile = new THREE.Mesh(new THREE.BoxGeometry(.34,.08,.34), (r+c)%2 ? whiteMat : blackMat);
        tile.position.set((c-1)*.38,.38,(r-1)*.38);
        tile.castShadow = true;
        group.add(tile);
      }
    }
    const crossA = new THREE.Mesh(new THREE.BoxGeometry(1.2,.035,.18), glowMat);
    crossA.position.y = .48;
    group.add(crossA);
    const crossB = crossA.clone();
    crossB.rotation.y = Math.PI/2;
    group.add(crossB);
  }else if(game.id === 'fold-color'){
    const colors = [0x4aa8ff,0xff7fca,0xffd166,0x75e06f];
    colors.forEach((c,i)=>{
      const plane = new THREE.Mesh(new THREE.PlaneGeometry(.82,.82), new THREE.MeshBasicMaterial({color:c, transparent:true, opacity:.58, side:THREE.DoubleSide, depthWrite:false}));
      plane.position.set((i-1.5)*.27,.62+i*.08,(i%2?-.12:.16));
      plane.rotation.set(-.9+i*.2,.45-i*.22,.55-i*.34);
      group.add(plane);
    });
    addTube(group,[-.72,.28,.48],[.74,.82,-.36],.025,glowMat);
  }else if(game.id === 'number-puzzle'){
    let n = 1;
    for(let r=0;r<4;r++){
      for(let c=0;c<4;c++){

function bindAvatarBones(){
  const bones = {leftFingers:[], rightFingers:[], leftThumbs:[], rightThumbs:[]};
  avatar.walk.baseRot.clear();
  avatar.realModelRoot.traverse(obj => {
    if(!obj.isBone) return;
    const name = obj.name.toLowerCase();
    avatar.walk.baseRot.set(obj, obj.rotation.clone());
    if(!bones.leftUpperLeg && /left.*(upleg|upperleg|thigh)|thigh_l|upleg_l|leg\.l|leftleg/.test(name)) bones.leftUpperLeg = obj;
    if(!bones.rightUpperLeg && /right.*(upleg|upperleg|thigh)|thigh_r|upleg_r|leg\.r|rightleg/.test(name)) bones.rightUpperLeg = obj;
    if(!bones.leftLowerLeg && /left.*(leg|calf|shin)|calf_l|shin_l/.test(name) && !/up|upper|thigh/.test(name)) bones.leftLowerLeg = obj;
    if(!bones.rightLowerLeg && /right.*(leg|calf|shin)|calf_r|shin_r/.test(name) && !/up|upper|thigh/.test(name)) bones.rightLowerLeg = obj;
    if(!bones.leftUpperArm && /left.*(upperarm|arm)|upperarm_l|arm\.l|leftarm/.test(name) && !/shoulder|fore|hand/.test(name)) bones.leftUpperArm = obj;
    if(!bones.rightUpperArm && /right.*(upperarm|arm)|upperarm_r|arm\.r|rightarm/.test(name) && !/shoulder|fore|hand/.test(name)) bones.rightUpperArm = obj;
    if(!bones.leftLowerArm && /left.*(forearm|lowerarm)|lowerarm_l|forearm_l/.test(name)) bones.leftLowerArm = obj;
    if(!bones.rightLowerArm && /right.*(forearm|lowerarm)|lowerarm_r|forearm_r/.test(name)) bones.rightLowerArm = obj;
    if(!bones.leftClavicle && /left.*(clavicle|shoulder)|clavicle_l/.test(name)) bones.leftClavicle = obj;
    if(!bones.rightClavicle && /right.*(clavicle|shoulder)|clavicle_r/.test(name)) bones.rightClavicle = obj;
    if(!bones.leftFoot && /left.*foot|foot_l/.test(name)) bones.leftFoot = obj;
    if(!bones.rightFoot && /right.*foot|foot_r/.test(name)) bones.rightFoot = obj;
    if(!bones.leftHand && /left.*hand$|hand_l$/.test(name)) bones.leftHand = obj;
    if(!bones.rightHand && /right.*hand$|hand_r$/.test(name)) bones.rightHand = obj;
    if(/left.*hand.*thumb|thumb.*_l/.test(name)) bones.leftThumbs.push(obj);
    if(/right.*hand.*thumb|thumb.*_r/.test(name)) bones.rightThumbs.push(obj);
    if(/left.*hand.*(index|middle|ring|pinky)|(?:index|middle|ring|pinky).+_l/.test(name)) bones.leftFingers.push(obj);
    if(/right.*hand.*(index|middle|ring|pinky)|(?:index|middle|ring|pinky).+_r/.test(name)) bones.rightFingers.push(obj);
    if(!bones.spine && /spine|chest|torso/.test(name)) bones.spine = obj;
    if(!bones.head && /head/.test(name)) bones.head = obj;
  });
  avatar.walk.bones = bones;
}

function applyNaturalPose(b, blend=1, relaxed=false){
  const shoulderDrop = relaxed ? .08 : .04;
  const armDrop = relaxed ? .08 : .48;
  const armDropSide = relaxed ? 1.78 : 0;
  const elbowBend = relaxed ? .04 : .16;
  const wristIn = relaxed ? .015 : 0;
  const fingerCurl = relaxed ? .24 : 0;
  if(b.leftClavicle) b.leftClavicle.rotation.z -= shoulderDrop * blend;
  if(b.rightClavicle) b.rightClavicle.rotation.z += shoulderDrop * blend;
  if(b.leftUpperArm){
    b.leftUpperArm.rotation.y += armDropSide * blend;
    b.leftUpperArm.rotation.z -= armDrop * blend;
  }
  if(b.rightUpperArm){
    b.rightUpperArm.rotation.y -= armDropSide * blend;
    b.rightUpperArm.rotation.z += armDrop * blend;
  }
  if(b.leftLowerArm){
    b.leftLowerArm.rotation.x += elbowBend * blend;
    b.leftLowerArm.rotation.z -= wristIn * blend;
  }
  if(b.rightLowerArm){
    b.rightLowerArm.rotation.x += elbowBend * blend;
    b.rightLowerArm.rotation.z += wristIn * blend;
  }
  if(relaxed){
    if(b.leftHand) b.leftHand.rotation.z += .035 * blend;
    if(b.rightHand) b.rightHand.rotation.z -= .035 * blend;
    b.leftFingers?.forEach((bone, index) => { bone.rotation.x += fingerCurl * (index % 3 === 0 ? .72 : 1) * blend; });
    b.rightFingers?.forEach((bone, index) => { bone.rotation.x += fingerCurl * (index % 3 === 0 ? .72 : 1) * blend; });
    b.leftThumbs?.forEach(bone => { bone.rotation.x += .14 * blend; bone.rotation.z -= .08 * blend; });
    b.rightThumbs?.forEach(bone => { bone.rotation.x += .14 * blend; bone.rotation.z += .08 * blend; });
  }
}

function classifyRealAvatarMaterial(mesh, material){
  const name = `${mesh.name || ''} ${material?.name || ''}`.toLowerCase();
  if(/hair|eyebrow|eyelash|ponytail/.test(name)) return 'hair';
  if(/vanguard|armor|cloth|suit|outfit|top|bottom|footwear|shoe|jacket|pants|skirt|casual/.test(name)) return 'outfit';
  if(/skin|human\.body|wolf3d_head|wolf3d_body/.test(name)) return 'skin';
  return 'all';
}

function collectRealAvatarParts(model){
  avatar.realMaterials = {skin:[], outfit:[], hair:[], all:[]};
  avatar.morphMeshes = [];
  model.traverse(obj => {
    if(!obj.isMesh) return;
    if(obj.morphTargetDictionary && obj.morphTargetInfluences) avatar.morphMeshes.push(obj);
    const materials = Array.isArray(obj.material) ? obj.material : [obj.material].filter(Boolean);
    materials.forEach(material => {
      material.needsUpdate = true;
      const bucket = classifyRealAvatarMaterial(obj, material);
      avatar.realMaterials[bucket]?.push(material);
      avatar.realMaterials.all.push(material);
    });
  });
}

function findAvatarAction(kind){
  if(!avatar.animActions) return null;
  const keys = Object.keys(avatar.animActions);
  const wanted = {
    idle:['idle','stand','breath'],
    walk:['walk'],
    run:['run','jog']
  }[kind] || [kind];
  const key = keys.find(name => wanted.some(token => name.includes(token)));
  return key ? avatar.animActions[key] : null;
}

function setAvatarClip(kind, fade=.16){
  const next = findAvatarAction(kind) || findAvatarAction(kind === 'run' ? 'walk' : 'idle');
  if(!next || avatar.activeClip === next) return;
  next.enabled = true;
  next.reset();
  next.setEffectiveWeight(1);
  next.play();
  if(avatar.activeClip){
    avatar.activeClip.crossFadeTo(next, fade, false);
  }
  avatar.activeClip = next;
}

function setupAvatarAnimations(model, animations=[]){
  if(avatar.mixer){
    avatar.mixer.stopAllAction();
    avatar.mixer = null;
  }
  avatar.animActions = {};
  avatar.activeClip = null;
  if(!animations.length) return;
  avatar.mixer = new THREE.AnimationMixer(model);
  animations.forEach(clip => {
    avatar.animActions[clip.name.toLowerCase()] = avatar.mixer.clipAction(clip);
  });
  setAvatarClip('idle', 0);
}

function setAvatarMorph(name, value){
  avatar.morphMeshes.forEach(mesh => {
    const index = mesh.morphTargetDictionary?.[name];
    if(index !== undefined) mesh.morphTargetInfluences[index] = value;
  });
}

function updateAvatarMorphs(t){
  if(!avatar.morphMeshes.length) return;
  CONTROLLED_MORPHS.forEach(name => setAvatarMorph(name, 0));
  const face = FACE_PRESETS[state.avatar.face] || FACE_PRESETS.natural;
  const expression = EXPRESSION_PRESETS[state.avatar.expression] || EXPRESSION_PRESETS.neutral;
  Object.entries(face).forEach(([name, value]) => setAvatarMorph(name, value));
  Object.entries(expression).forEach(([name, value]) => setAvatarMorph(name, value));
  const blinkPhase = (t + .37) % 4.2;
  const blink = blinkPhase < .13 ? Math.sin((blinkPhase / .13) * Math.PI) : 0;
  setAvatarMorph('eyeBlinkLeft', blink);
  setAvatarMorph('eyeBlinkRight', blink);
  if(avatarAction.name === 'jump'){
    setAvatarMorph('jawOpen', Math.sin(Math.min(1, avatarAction.time / Math.max(.001, avatarAction.duration)) * Math.PI) * .12);
  }
}

function loadRealAvatarModel(){
  const loader = new GLTFLoader();
  loader.setCrossOrigin?.('anonymous');
  loader.load(REAL_AVATAR_MODEL, gltf => {
    const model = gltf.scene;
    avatar.nativeStyle = true;
    avatar.astronautMode = REAL_AVATAR_MODEL.includes('avatar-animated');
    model.traverse(obj => {
      if(obj.isMesh){
        obj.castShadow = true;
        obj.receiveShadow = true;
        if(obj.material){
          const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
          materials.forEach(material => {
            material.roughness = Math.min(1, (material.roughness ?? .55) + .08);
            material.metalness = material.metalness ?? 0;
          });
        }
      }
    });
    const box = new THREE.Box3().setFromObject(model);
    const size = box.getSize(new THREE.Vector3());
    const scale = 2.32 / Math.max(.001, size.y);
    model.scale.setScalar(scale);
    const fitted = new THREE.Box3().setFromObject(model);
    const center = fitted.getCenter(new THREE.Vector3());
    model.position.x -= center.x;
    model.position.z -= center.z;
    model.position.y -= fitted.min.y;
    model.rotation.y = Math.PI;
    avatar.realModelRoot.clear();
    avatar.realModelRoot.add(model);
    avatar.realModelRoot.add(avatar.astronautKitRoot);
    avatar.astronautKitRoot.visible = true;
    avatar.realClothesRoot.visible = false;
    avatar.realModelRoot.visible = true;
    avatar.bodyRoot.visible = false;
    avatar.realModel = model;
    collectRealAvatarParts(model);
    setupAvatarAnimations(model, gltf.animations || []);
    bindAvatarBones();
    applyAvatarStyle();
  }, undefined, err => {
    console.warn('Real avatar model failed to load', err);
    avatar.realModelRoot.visible = false;
    avatar.realClothesRoot.visible = false;
    avatar.astronautKitRoot.visible = false;
    avatar.bodyRoot.visible = true;
    avatar.nativeStyle = false;
    avatar.astronautMode = false;
    toast('人物模型加载失败，已临时显示备用角色');
  });
}

function applyAvatarStyle(){
  const color = new THREE.Color(state.avatar.color);
  const fallbackVisible = !avatar.realModelRoot?.visible;
  const fallbackSuitColor = new THREE.Color(0xdfe6eb);
  const fallbackTrimColor = new THREE.Color(0x9fb0c6);
  const fallbackJacketColor = new THREE.Color(state.avatar.suit === 'coat' ? 0x2f3b48 : 0x4d5966);
  const jacketColor = fallbackVisible ? fallbackJacketColor : color.clone().offsetHSL(.03,-.08,-.18);
  avatar.shirtParts.forEach(part=>{
    const shirtColor = fallbackVisible
      ? (part === avatar.chestPanel ? fallbackTrimColor : fallbackSuitColor)
      : color;
    part.material.color.copy(shirtColor);
    if(part.material.emissive) part.material.emissive.copy(shirtColor).multiplyScalar(fallbackVisible ? .06 : .16);
  });
  avatar.jacketParts.concat(avatar.coatParts).forEach(part=>{
    part.material.color.copy(jacketColor);
    if(part.material.emissive) part.material.emissive.copy(jacketColor).multiplyScalar(.08);
  });
  const heightMap = {short:.92, mid:1, tall:1.1};
  const buildMap = {slim:.88, standard:1, strong:1.14};
  const gender = state.avatar.gender;
  const buildScale = buildMap[state.avatar.build] || 1;
  avatar.bodyRoot.scale.set(buildScale, heightMap[state.avatar.height] || 1, buildScale*.96);
  const shoulder = gender === 'male' ? .48 : gender === 'female' ? .41 : .44;
  const hipScale = gender === 'female' ? 1.18 : gender === 'male' ? .98 : 1.08;
  avatar.leftShoulder.position.x = -shoulder;
  avatar.rightShoulder.position.x = shoulder;
  avatar.leftArm.position.x = -shoulder - .1;
  avatar.rightArm.position.x = shoulder + .1;
  avatar.leftHand.position.x = -shoulder - .16;
  avatar.rightHand.position.x = shoulder + .16;
  avatar.torso.scale.set(gender === 'female' ? .88 : gender === 'male' ? 1.06 : .98, .96, .72);
  avatar.hips.scale.set(hipScale,.62,.76);
  avatar.head.scale.set(gender === 'male' ? .94 : .92, gender === 'female' ? 1.08 : 1.06, .88);
  const style = avatar.hairStyles[state.avatar.hair] ? state.avatar.hair : 'short';
  Object.entries(avatar.hairStyles).forEach(([key,grp])=>{ grp.visible = key === style; });
  const jacketOn = state.avatar.suit === 'jacket' || state.avatar.suit === 'coat';
  avatar.jacketParts.forEach(part=>{ part.visible = jacketOn; });
  avatar.coatParts.forEach(part=>{ part.visible = state.avatar.suit === 'coat'; });
  avatar.chestPanel.visible = state.avatar.suit === 'sport';
  if(avatar.realClothParts){
    const cloth = avatar.realClothParts;
    cloth.top.forEach(part=>{ part.material.color.copy(color); if(part.material.emissive) part.material.emissive.copy(color).multiplyScalar(.12); });
    cloth.jacket.forEach(part=>{ part.material.color.copy(jacketColor); if(part.material.emissive) part.material.emissive.copy(jacketColor).multiplyScalar(.08); });
    cloth.hoodie.forEach(part=>{ part.material.color.copy(color.clone().offsetHSL(.02,-.1,-.12)); if(part.material.emissive) part.material.emissive.copy(color).multiplyScalar(.08); });
    cloth.coat.forEach(part=>{ part.material.color.copy(jacketColor.clone().offsetHSL(.02,-.06,-.12)); if(part.material.emissive) part.material.emissive.copy(jacketColor).multiplyScalar(.06); });
    cloth.tang.forEach((part,i)=>{
      const tangColor = i ? new THREE.Color(0xffd166) : color.clone().offsetHSL(.08,-.02,-.04);
      part.material.color.copy(tangColor);
      if(part.material.emissive) part.material.emissive.copy(tangColor).multiplyScalar(i ? .18 : .08);
    });
    cloth.jacket.forEach(part=>{ part.visible = state.avatar.suit === 'jacket'; });
    cloth.hoodie.forEach(part=>{ part.visible = state.avatar.suit === 'hoodie'; });
    cloth.coat.forEach(part=>{ part.visible = state.avatar.suit === 'coat'; });
    cloth.tang.forEach(part=>{ part.visible = state.avatar.suit === 'tang'; });
    cloth.trim.forEach(part=>{ part.visible = state.avatar.suit !== 'coat'; });
    const bottom = state.avatar.bottom;
    cloth.pants.forEach(part=>{ part.visible = bottom === 'pants' && state.avatar.suit !== 'tang'; });
    cloth.shorts.forEach(part=>{ part.visible = bottom === 'shorts' && state.avatar.suit !== 'tang'; });
    cloth.skirt.forEach(part=>{ part.visible = bottom === 'skirt' && state.avatar.suit !== 'tang'; });
    cloth.longskirt.forEach(part=>{ part.visible = bottom === 'longskirt' || state.avatar.suit === 'tang'; });
    cloth.legwear.forEach(part=>{
      part.visible = state.avatar.legwear !== 'bare' && bottom !== 'longskirt';
      part.material.opacity = state.avatar.legwear === 'socks' ? .42 : .68;
      part.scale.y = state.avatar.legwear === 'socks' ? .52 : 1;
      part.position.y = state.avatar.legwear === 'socks' ? .28 : .42;
    });
    cloth.sneaker.forEach(part=>{ part.visible = state.avatar.shoes === 'sneaker'; });
    cloth.heel.forEach(part=>{ part.visible = state.avatar.shoes === 'heel'; });
    cloth.boot.forEach(part=>{ part.visible = state.avatar.shoes === 'boot'; });
  }
  if(avatar.realModelRoot?.visible){
    if(avatar.nativeStyle){
      if(avatar.astronautMode){
        const suitColor = state.avatar.suit === 'jacket'
          ? new THREE.Color(0x9fb0c6)
          : state.avatar.suit === 'coat'
            ? new THREE.Color(0xf4f6f8)
            : new THREE.Color(0xe7edf2);
        const visorColor = new THREE.Color(0x07111f);
        avatar.realMaterials.all.forEach(material => {
          const name = (material.name || '').toLowerCase();
          if(/visor/.test(name)){
            material.color.copy(visorColor);
            material.metalness = .62;
            material.roughness = .18;
            if(material.emissive) material.emissive.set(0x12395e);
          }else{
            material.color.copy(suitColor);
            material.metalness = .12;
            material.roughness = .48;
            if(material.emissive) material.emissive.set(0x07121f);
          }
          material.needsUpdate = true;
        });
        avatar.astronautKitRoot.visible = true;
        const accent = new THREE.Color(state.avatar.color).lerp(new THREE.Color(0x9fd8ff), .65);
        avatar.astronautKitRoot.traverse(obj => {
          if(!obj.isMesh || !obj.material) return;
          const name = obj.geometry?.type || '';
          if(name.includes('Torus') || obj.geometry?.parameters?.height === .035){
            obj.material.color.copy(accent);
            if(obj.material.emissive) obj.material.emissive.copy(accent).multiplyScalar(.22);
          }
        });
      }else{
        const skinColor = new THREE.Color(state.avatar.skin || '#d9a982');
        const outfitColor = color.clone().offsetHSL(.02,-.04,-.03);
        const hairColorMap = {
          short:new THREE.Color(0x1b1412),
          bob:new THREE.Color(0x2a1a13),
          ponytail:new THREE.Color(0x121018),
          curly:new THREE.Color(0x4a2a1a)
        };
        avatar.realMaterials.skin.forEach(material => {
          material.color.copy(skinColor);
          if(material.emissive) material.emissive.copy(skinColor).multiplyScalar(.025);
        });
        avatar.realMaterials.outfit.forEach(material => {
          material.color.copy(outfitColor);
          if(material.emissive) material.emissive.copy(outfitColor).multiplyScalar(.045);
        });
        avatar.realMaterials.hair.forEach(material => {
          const hairColor = hairColorMap[state.avatar.hair] || hairColorMap.short;
          material.color.copy(hairColor);
          if(material.emissive) material.emissive.copy(hairColor).multiplyScalar(.025);
        });
        updateAvatarMorphs(performance.now() / 1000);
      }
    }
    const heightMap = {short:.92, mid:1, tall:1.1};
    const buildMap = {slim:.94, standard:1, strong:1.06};
    avatar.realModelRoot.scale.set(
      buildMap[state.avatar.build] || 1,
      heightMap[state.avatar.height] || 1,
      buildMap[state.avatar.build] || 1
    );
  }
}

function triggerAvatarAction(name){
  const spec = AVATAR_ACTIONS[name] || AVATAR_ACTIONS.idle;
  avatarAction = {name:Object.prototype.hasOwnProperty.call(AVATAR_ACTIONS, name) ? name : 'idle', time:0, duration:spec.duration};
  if(avatarAction.name === 'idle') avatarAction.time = 999;
  updateDiyActive();
}

function smoothPulse(progress){
  return Math.sin(Math.min(1, Math.max(0, progress)) * Math.PI);
}

function updateAvatarAnimation(moving, dt, t){
  const target = moving ? 1 : 0;
  avatar.walk.amount += (target - avatar.walk.amount) * Math.min(1, dt * 8.5);
  avatar.walk.phase += dt * (moving ? 10.6 : 2.2);
  avatarAction.time += dt;
  if(avatarAction.duration && avatarAction.time > avatarAction.duration){
    avatarAction = {name:'idle', time:999, duration:0};
    updateDiyActive();
  }

  const amount = avatar.walk.amount;
  const phase = avatar.walk.phase;
  const stride = Math.sin(phase);
  const stride2 = Math.sin(phase + Math.PI);
  const footLift = Math.abs(Math.cos(phase));
  const idle = 1 - amount;
  const actionProgress = avatarAction.duration ? avatarAction.time / avatarAction.duration : 0;
  const actionEase = smoothPulse(actionProgress);
  const idleCycle = 4.8;
  const idleProgress = (t % idleCycle) / idleCycle;
  const idleEase = smoothPulse(idleProgress) * idle;
  const idleMode = Math.floor(t / idleCycle) % 3;

  if(avatar.realModelRoot.visible){
    updateAvatarMorphs(t);
    const root = avatar.realModelRoot;
    if(avatar.mixer){
      setAvatarClip(moving ? 'walk' : 'idle');
      if(avatar.activeClip) avatar.activeClip.timeScale = moving ? 1.18 : 1;
      avatar.mixer.update(dt);
      root.position.set(Math.sin(phase * .5) * .018 * amount, Math.abs(stride) * .035 * amount + Math.sin(t * 1.7) * .01 * idle, -.025 * amount);
      root.rotation.set(-.055 * amount, 0, Math.sin(phase) * .014 * amount);
      if(avatarAction.name === 'jump'){
        root.position.y += Math.sin(Math.min(1, actionProgress) * Math.PI) * .42;
      }
      return;
    }

    avatar.walk.baseRot.forEach((rot, bone) => bone.rotation.copy(rot));
    root.position.set(Math.sin(phase * .5) * .025 * amount, Math.abs(stride) * .075 * amount + Math.sin(t * 1.7) * .012 * idle, -.035 * amount);
    root.rotation.set(-.08 * amount, 0, Math.sin(phase) * .026 * amount);

    const b = avatar.walk.bones;
    applyNaturalPose(b, 1, avatar.nativeStyle);
    if(b.leftUpperLeg) b.leftUpperLeg.rotation.x += stride * .7 * amount;
    if(b.rightUpperLeg) b.rightUpperLeg.rotation.x += stride2 * .7 * amount;
    if(b.leftLowerLeg) b.leftLowerLeg.rotation.x += Math.max(0, -stride) * .92 * amount;
    if(b.rightLowerLeg) b.rightLowerLeg.rotation.x += Math.max(0, stride) * .92 * amount;
    if(b.leftFoot) b.leftFoot.rotation.x += Math.max(0, stride) * .18 * amount;
    if(b.rightFoot) b.rightFoot.rotation.x += Math.max(0, stride2) * .18 * amount;
    if(b.leftUpperArm) b.leftUpperArm.rotation.x += stride2 * .62 * amount;
    if(b.rightUpperArm) b.rightUpperArm.rotation.x += stride * .62 * amount;
    if(b.leftLowerArm) b.leftLowerArm.rotation.x += (.42 + Math.max(0, stride) * .22) * amount;
    if(b.rightLowerArm) b.rightLowerArm.rotation.x += (.42 + Math.max(0, stride2) * .22) * amount;
    if(b.spine) b.spine.rotation.z += Math.sin(phase) * .026 * amount;
    if(b.head) b.head.rotation.x += Math.sin(t * 1.4) * .012 * idle;

    if(!moving && avatarAction.name === 'idle' && idle > .35){
	      if(idleMode === 0){
	        if(b.spine) b.spine.rotation.x += Math.sin(t * 1.6) * .025 * idle;
	        if(b.head) b.head.rotation.x += Math.sin(t * 1.2) * .018 * idleEase;
	      }else if(idleMode === 1){
	        if(b.head) b.head.rotation.y += Math.sin(t * 1.15) * .18 * idleEase;
	        if(b.spine) b.spine.rotation.y += Math.sin(t * .92) * .07 * idleEase;
	      }else{
	        if(b.spine) b.spine.rotation.z += Math.sin(t * 1.35) * .045 * idleEase;
	        if(b.head) b.head.rotation.y += Math.sin(t * 1.8) * .08 * idleEase;
	      }
	    }

    if(avatarAction.name === 'wave'){
      if(b.rightUpperArm){
        b.rightUpperArm.rotation.x -= .45 * actionEase;
        b.rightUpperArm.rotation.z -= .98 * actionEase;
      }
      if(b.rightLowerArm){
        b.rightLowerArm.rotation.x += (.55 + Math.sin(avatarAction.time * 16) * .22) * actionEase;
        b.rightLowerArm.rotation.z -= .42 * actionEase;
      }
      if(b.spine) b.spine.rotation.z += .08 * actionEase;
    }else if(avatarAction.name === 'jump'){
      root.position.y += Math.sin(Math.min(1, actionProgress) * Math.PI) * .48;
      root.rotation.x -= .08 * actionEase;
      if(b.leftUpperArm) b.leftUpperArm.rotation.x -= .45 * actionEase;
      if(b.rightUpperArm) b.rightUpperArm.rotation.x -= .45 * actionEase;
      if(b.leftUpperLeg) b.leftUpperLeg.rotation.x -= .34 * actionEase;
      if(b.rightUpperLeg) b.rightUpperLeg.rotation.x -= .34 * actionEase;
    }else if(avatarAction.name === 'pose'){
      if(b.leftUpperArm){ b.leftUpperArm.rotation.x -= .72 * actionEase; b.leftUpperArm.rotation.z += .55 * actionEase; }
      if(b.rightUpperArm){ b.rightUpperArm.rotation.x -= .72 * actionEase; b.rightUpperArm.rotation.z -= .55 * actionEase; }
      if(b.spine) b.spine.rotation.y += Math.sin(avatarAction.time * 2.4) * .09 * actionEase;
      if(b.head) b.head.rotation.y += Math.sin(avatarAction.time * 2.4) * .14 * actionEase;
    }
    return;
  }

  avatar.bodyRoot.position.set(0, Math.abs(stride) * .055 * amount + Math.sin(t * 1.7) * .014 * idle, 0);
  avatar.torso.rotation.set(-.06 * amount, 0, Math.sin(phase) * .03 * amount);
  avatar.hips.rotation.set(0, 0, -Math.sin(phase) * .025 * amount);
  avatar.head.rotation.x = Math.sin(t * 1.4) * .018 * idle;
  avatar.head.rotation.y = 0;
  avatar.leftArm.rotation.x = stride2 * .55 * amount;
  avatar.rightArm.rotation.x = stride * .55 * amount;
  avatar.leftArm.rotation.z = .16 + Math.max(0, -stride) * .08 * amount;
  avatar.rightArm.rotation.z = -.16 - Math.max(0, stride) * .08 * amount;
  avatar.leftLeg.rotation.x = stride * .5 * amount;
  avatar.rightLeg.rotation.x = stride2 * .5 * amount;
  avatar.leftShoe.position.z = .07 + Math.max(0, stride) * .08 * amount;
  avatar.rightShoe.position.z = .07 + Math.max(0, stride2) * .08 * amount;
  avatar.leftShoe.position.y = .06 + Math.max(0, stride) * .05 * footLift * amount;
  avatar.rightShoe.position.y = .06 + Math.max(0, stride2) * .05 * footLift * amount;
  if(!moving && avatarAction.name === 'idle' && idle > .35){
    if(idleMode === 0){
      avatar.torso.rotation.x += Math.sin(t * 1.6) * .025 * idle;
      avatar.leftArm.rotation.z += .06 * idleEase;
      avatar.rightArm.rotation.z -= .06 * idleEase;
    }else if(idleMode === 1){
      avatar.head.rotation.y = Math.sin(t * 1.15) * .18 * idleEase;
      avatar.torso.rotation.y = Math.sin(t * .92) * .08 * idleEase;
    }else{
      avatar.rightArm.rotation.x -= .18 * idleEase;
      avatar.rightArm.rotation.z -= .24 * idleEase;
      avatar.leftArm.rotation.z += .1 * idleEase;
    }
  }
  if(avatarAction.name === 'wave'){
    avatar.rightArm.rotation.x = -.7 * actionEase;
    avatar.rightArm.rotation.z = -1.1 * actionEase - .16 + Math.sin(avatarAction.time * 16) * .18 * actionEase;
  }else if(avatarAction.name === 'jump'){
    avatar.bodyRoot.position.y += Math.sin(Math.min(1, actionProgress) * Math.PI) * .42;
    avatar.leftArm.rotation.x -= .45 * actionEase;
    avatar.rightArm.rotation.x -= .45 * actionEase;
  }else if(avatarAction.name === 'pose'){
    avatar.leftArm.rotation.x = -.58 * actionEase;
    avatar.rightArm.rotation.x = -.58 * actionEase;
    avatar.leftArm.rotation.z = .75 * actionEase;
    avatar.rightArm.rotation.z = -.75 * actionEase;
    avatar.torso.rotation.y = Math.sin(avatarAction.time * 2.4) * .12 * actionEase;
  }
}

function ensureAudioContext(){
  const AudioClass = window.AudioContext || window.webkitAudioContext;
  if(!AudioClass) return null;
  if(!audioCtx) audioCtx = new AudioClass();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

    }

}

async function startHubAudio(silent=false){
  if(!soundEnabled) return;
  if(!hubEntered) return;
  seekBgmStart();
  try{
    bgm.muted = false;
    if(bgm.paused) await bgm.play();
    fadeHubBgm(.34, 900);
    soundEnabled = true;
    updateSoundButton();
  }catch(e){
    primeHubAudio();
    updateSoundButton();
    if(!silent) toast('点一下画面或“音”开启音乐');
  }
}

function releasePrimedHubAudio(){
  if(!hubEntered || !soundEnabled || activeGame || bgm.paused) return;
  bgm.muted = false;
  fadeHubBgm(.34, 900);
  updateSoundButton();
}

function fadeHubBgm(targetVolume, duration=900){
  if(bgmFadeFrame) cancelAnimationFrame(bgmFadeFrame);
  const start = bgm.volume;
  const startTime = performance.now();
  const tick = now => {
    const t = Math.min(1, (now - startTime) / duration);
    const eased = t < .5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
    bgm.volume = start + (targetVolume - start) * eased;
    if(t < 1){
      bgmFadeFrame = requestAnimationFrame(tick);
    }else{
      bgm.volume = targetVolume;
      bgmFadeFrame = null;
      if(targetVolume <= .01) bgm.pause();
    }
  };
  bgmFadeFrame = requestAnimationFrame(tick);
}

function startGameMusic(game){
  if(!soundEnabled || !game) return;
  stopGameMusic(true);
  if(game.internalAudio) return;
  if(game.music){
    startRecordedGameMusic(game);
    return;
  }
  const ctx = ensureAudioContext();
  if(!ctx) return;
  const master = ctx.createGain();
  master.gain.setValueAtTime(.0001, ctx.currentTime);
  master.gain.exponentialRampToValueAtTime(.13, ctx.currentTime + .7);
  master.connect(ctx.destination);
  const scaleMap = {
    space:[220,277,330,440],
    logic:[196,247,294,370],
    memory:[174,220,261,349],
    observe:[233,294,349,466],
    create:[207,261,329,415],
    calc:[185,233,277,370]
  };
  const notes = scaleMap[game.zone] || scaleMap.logic;
  let step = 0;
  const playNote = () => {
    if(!gameMusic || !gameMusic.running) return;
    const t = ctx.currentTime;
    const freq = notes[step % notes.length] * (step % 8 === 7 ? 1.5 : 1);
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    osc.type = step % 2 ? 'triangle' : 'sine';
    osc.frequency.setValueAtTime(freq, t);
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(900 + (step % 4) * 120, t);
    gain.gain.setValueAtTime(.0001, t);
    gain.gain.exponentialRampToValueAtTime(.12, t + .025);
    gain.gain.exponentialRampToValueAtTime(.0001, t + .42);
    osc.connect(filter).connect(gain).connect(master);
    osc.start(t);
    osc.stop(t + .46);

    if(step % 4 === 0){
      const bass = ctx.createOscillator();
      const bassGain = ctx.createGain();
      bass.type = 'sine';
      bass.frequency.setValueAtTime(freq / 2, t);
      bassGain.gain.setValueAtTime(.0001, t);
      bassGain.gain.exponentialRampToValueAtTime(.08, t + .03);
      bassGain.gain.exponentialRampToValueAtTime(.0001, t + .55);
      bass.connect(bassGain).connect(master);
      bass.start(t);
      bass.stop(t + .58);
    }
    step++;
  };
  gameMusic = {master, running:true, timer:null};
  playNote();
  gameMusic.timer = setInterval(playNote, 360);
}

function startRecordedGameMusic(game){
  const audio = document.createElement('audio');
  audio.crossOrigin = 'anonymous';
  audio.preload = 'auto';
  audio.loop = true;
  audio.playsInline = true;
  audio.src = game.music;
  audio.volume = 0;
  gameMusic = {type:'audio', audio, running:true, fadeFrame:null};
  const startAt = game.musicStart || 0;
  audio.addEventListener('loadedmetadata', () => {
    try{ audio.currentTime = startAt; }catch(e){}
  }, {once:true});
  audio.play()
    .then(()=>fadeGameAudio(audio, .42, 900))
    .catch(()=>toast('点一下画面开启游戏音乐'));
}

function fadeGameAudio(audio, targetVolume, duration=600, onDone){
  if(!audio) return;
  const start = audio.volume;
  const startTime = performance.now();
  let frame = null;
  const tick = now => {
    const t = Math.min(1, (now - startTime) / duration);
    const eased = t < .5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
    audio.volume = start + (targetVolume - start) * eased;
    if(t < 1){
      frame = requestAnimationFrame(tick);
      if(gameMusic && gameMusic.audio === audio) gameMusic.fadeFrame = frame;
    }else{
      audio.volume = targetVolume;
      if(gameMusic && gameMusic.audio === audio) gameMusic.fadeFrame = null;
      if(onDone) onDone();
    }
  };
  if(gameMusic && gameMusic.audio === audio && gameMusic.fadeFrame) cancelAnimationFrame(gameMusic.fadeFrame);
  frame = requestAnimationFrame(tick);
  if(gameMusic && gameMusic.audio === audio) gameMusic.fadeFrame = frame;
}

function stopGameMusic(immediate=false){
  if(!gameMusic) return;
  const current = gameMusic;
  gameMusic = null;
  current.running = false;
  if(current.type === 'audio'){
    if(current.fadeFrame) cancelAnimationFrame(current.fadeFrame);
    const audio = current.audio;
    if(immediate){
      audio.pause();
      audio.removeAttribute('src');
      audio.load();
    }else{
      fadeGameAudio(audio, 0, 520, () => {
        audio.pause();
        audio.removeAttribute('src');
        audio.load();
      });
    }
    return;
  }
  clearInterval(current.timer);
  const ctx = audioCtx;
  const master = current.master;
  if(ctx && master){
    const now = ctx.currentTime;
    try{
      master.gain.cancelScheduledValues(now);
      master.gain.setValueAtTime(Math.max(master.gain.value, .0001), now);
      if(immediate){
        master.gain.exponentialRampToValueAtTime(.0001, now + .08);
      }else{
        master.gain.exponentialRampToValueAtTime(.0001, now + .45);
      }
      setTimeout(()=>master.disconnect(), immediate ? 120 : 520);
    }catch(e){}
  }
  gameMusic = null;
}

function updateFootsteps(moving, dt){
  if(!moving){
    stepTimer = 0;
    return;
  }
  if(!soundEnabled || !ensureAudioContext()) return;
  stepTimer -= dt;
  if(stepTimer <= 0){
    playFootstep();
    stepTimer = .31;
  }
}

function playFootstep(){
  if(!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const oscGain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(150 + Math.random()*28, t);
  osc.frequency.exponentialRampToValueAtTime(62, t + .11);
  oscGain.gain.setValueAtTime(.0001, t);
  oscGain.gain.exponentialRampToValueAtTime(.055, t + .012);
  oscGain.gain.exponentialRampToValueAtTime(.0001, t + .13);
  osc.connect(oscGain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + .14);

  const len = Math.floor(audioCtx.sampleRate * .075);
  const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<len;i++){
    const fade = 1 - i / len;
    data[i] = (Math.random()*2 - 1) * fade * fade;
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(720, t);
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.setValueAtTime(.032, t);
  noiseGain.gain.exponentialRampToValueAtTime(.0001, t + .09);
  noise.connect(filter).connect(noiseGain).connect(audioCtx.destination);
  noise.start(t);
  noise.stop(t + .1);
}

function setupJoystick(){
  const pad = document.getElementById('mobilePad');
  const stick = document.getElementById('stick');
  const stickHome = () => Math.max(0, (pad.clientWidth - stick.offsetWidth) / 2);
  const resetStick = () => {
    const home = stickHome();
    joy.active=false; joy.x=0; joy.y=0; stick.style.left=home+'px'; stick.style.top=home+'px';
  };
  pad.addEventListener('pointerdown', e => {
    startHubAudio(true);
    joy.active=true; pad.setPointerCapture(e.pointerId); moveStick(e);
  });
  pad.addEventListener('pointermove', e => { if(joy.active) moveStick(e); });
  pad.addEventListener('pointerup', resetStick);
  pad.addEventListener('pointercancel', resetStick);
  function moveStick(e){
    const rect = pad.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    let x = e.clientX - cx;
    let y = e.clientY - cy;
    const len = Math.hypot(x,y);
    const max = Math.max(24, stickHome());
    if(len > max){ x = x/len*max; y = y/len*max; }
    joy.x = x/max;
    joy.y = y/max;
    const home = stickHome();
    stick.style.left = home + x + 'px';
    stick.style.top = home + y + 'px';
  }
  resetStick();
}

function drawRadar(){
  const c = document.getElementById('radar');
  const ctx = c.getContext('2d');
  const w = c.width, h = c.height;
  const compact = innerWidth <= 820 || c.clientWidth < 180;
  ctx.clearRect(0,0,w,h);
  const cx = w/2, cy = compact ? h/2 : h/2 + 8;
  const maxR = Math.min(w,h) * (compact ? .39 : .34);
  ctx.lineWidth = 2;
  for(let ring=1; ring<=4; ring++){
    ctx.beginPath();
    ABILITIES.forEach((a,i)=>{
      const ang = -Math.PI/2 + i/ABILITIES.length*Math.PI*2;
      const r = maxR * ring/4;
      const x = cx + Math.cos(ang)*r;
      const y = cy + Math.sin(ang)*r;
      i ? ctx.lineTo(x,y) : ctx.moveTo(x,y);
    });
    ctx.closePath();
    ctx.strokeStyle = `rgba(180,210,255,${.08 + ring*.045})`;
    ctx.stroke();
  }
  ABILITIES.forEach((a,i)=>{
    const ang = -Math.PI/2 + i/ABILITIES.length*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(ang)*maxR, cy+Math.sin(ang)*maxR);
    ctx.strokeStyle = 'rgba(180,210,255,.12)';
    ctx.stroke();
    if(compact){
      ctx.beginPath();
      ctx.arc(cx+Math.cos(ang)*(maxR+22), cy+Math.sin(ang)*(maxR+22), 8, 0, Math.PI*2);
      ctx.fillStyle = a.color;
      ctx.fill();
    }else{
      ctx.fillStyle = a.color;
      ctx.font = '700 24px PingFang SC, Microsoft YaHei, sans-serif';
      ctx.textAlign = Math.cos(ang) > .2 ? 'left' : Math.cos(ang) < -.2 ? 'right' : 'center';
      ctx.textBaseline = Math.sin(ang) > .2 ? 'top' : Math.sin(ang) < -.2 ? 'bottom' : 'middle';
      ctx.fillText(a.name, cx+Math.cos(ang)*(maxR+28), cy+Math.sin(ang)*(maxR+28));
    }
  });
  ctx.beginPath();
  ABILITIES.forEach((a,i)=>{
    const val = Math.max(0, Math.min(100, state.abilities[a.key])) / 100;
    const ang = -Math.PI/2 + i/ABILITIES.length*Math.PI*2;
    const x = cx + Math.cos(ang)*maxR*val;
    const y = cy + Math.sin(ang)*maxR*val;
    i ? ctx.lineTo(x,y) : ctx.moveTo(x,y);
  });
  ctx.closePath();
  const grad = ctx.createRadialGradient(cx,cy,10,cx,cy,maxR);
  grad.addColorStop(0,'rgba(159,216,255,.42)');
  grad.addColorStop(1,'rgba(255,127,202,.28)');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#9fd8ff';
  ctx.lineWidth = 4;
  ctx.stroke();
}

function pickPortal(x,y, openOnHit){
  const rect = canvas.getBoundingClientRect();
  const mouse = new THREE.Vector2((x-rect.left)/rect.width*2-1, -((y-rect.top)/rect.height*2-1));
  const ray = new THREE.Raycaster();
  ray.setFromCamera(mouse, camera);
  const hit = ray.intersectObjects(portals.map(p=>p.group), true)[0];
  let obj = hit?.object || null;
  hoveredPortal = null;
  while(obj && !hoveredPortal){
    hoveredPortal = portals.find(p=>p.group === obj) || null;
    obj = obj.parent;
  }
  if(openOnHit && hoveredPortal) focusPortal(hoveredPortal);
}

function focusPortal(portal){
  focusedPortal = portal;
  const panel = document.getElementById('portalInfo');
  document.getElementById('portalName').textContent = portal.game.name;
  document.getElementById('portalDesc').textContent = portal.game.desc;
  const tags = document.getElementById('portalTags');
  tags.innerHTML = '';
  Object.entries(portal.game.abilities).forEach(([key,weight])=>{
    const a = abilityByKey(key);
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.textContent = `${a.name} ${Math.round(weight*100)}%`;
    tag.style.borderColor = `${a.color}66`;
    tag.style.color = a.color;
    tags.appendChild(tag);
  });
  const diff = document.createElement('span');
  diff.className = 'tag';
  diff.textContent = portal.game.difficulty;
  tags.appendChild(diff);
  panel.classList.add('show');
  document.getElementById('enterHint').classList.add('show');
}

function openGame(game){
  if(!game) return;
  const gameUrl = new URL(game.path, location.href);
  gameUrl.searchParams.set('from', 'ggame-hub');
  window.location.assign(gameUrl.href);
}
function closeGame(){
  document.getElementById('gameDock').classList.remove('show');
  document.getElementById('gameFrame').src = 'about:blank';
  stopGameMusic(false);
  if(soundEnabled){
    startHubAudio(true);
    fadeHubBgm(.34, 1100);
  }
  activeGame = null;
}
function completeGame(game){
  if(!game) return;
  const first = !state.completed[game.id];
  state.completed[game.id] = {done:true, at:Date.now()};
  const base = first ? 5 : 1.2;
  Object.entries(game.abilities).forEach(([key,weight])=>{
    state.abilities[key] = Math.min(100, state.abilities[key] + base * weight);
  });
  saveState();
  updateAbilityGrid();
  drawRadar();
  toast(first ? `${game.name} 完成，六维能力提升` : `${game.name} 复练完成`);
}
function toast(text){
  const el = document.getElementById('toast');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>el.classList.remove('show'), 1800);
}

function checkCanvasVisible(){
  try{
    renderer.getContext();
  }catch(e){
    document.body.classList.add('fallback');
    const msg = document.getElementById('bootMsg');
    if(msg) msg.textContent = 'WebGL 初始化失败，先用基础列表进入游戏。';
  }
}

function resize(){
  const w = innerWidth, h = innerHeight;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, LOW_POWER_DEVICE ? .9 : 1.15));
  renderer.setSize(w,h,false);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}

function getScreenMoveBasis(){
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  if(forward.lengthSq() < .0001) forward.set(Math.sin(yaw),0,Math.cos(yaw));
  forward.normalize();
  const right = new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld, 0);
  right.y = 0;
  if(right.lengthSq() < .0001) right.set(Math.cos(yaw),0,-Math.sin(yaw));
  right.normalize();
  return {forward, right};
}

function lerpAngle(a, b, t){
  const diff = Math.atan2(Math.sin(b - a), Math.cos(b - a));
  return a + diff * t;
}

function updateMovement(dt){
  const dir = new THREE.Vector3();
  const {forward, right} = getScreenMoveBasis();
  if(keys.has('w') || keys.has('arrowup')) dir.add(forward);
  if(keys.has('s') || keys.has('arrowdown')) dir.sub(forward);
  if(keys.has('d') || keys.has('arrowright')) dir.add(right);
  if(keys.has('a') || keys.has('arrowleft')) dir.sub(right);
  if(joy.active){
    dir.addScaledVector(forward, -joy.y);
    dir.addScaledVector(right, joy.x);
  }
  const moving = dir.lengthSq() > 0;
  avatarMoving = moving && !activeGame;
  if(moving){
    introOrbit = false;
    dir.normalize();
    avatar.group.position.addScaledVector(dir, dt * AVATAR_MOVE_SPEED);
    avatar.group.position.x = Math.max(-30, Math.min(30, avatar.group.position.x));
    avatar.group.position.z = Math.max(-30, Math.min(30, avatar.group.position.z));
    avatar.group.rotation.y = lerpAngle(avatar.group.rotation.y, Math.atan2(dir.x, dir.z), 1 - Math.exp(-dt * 12));
  }
  updateFootsteps(avatarMoving, dt);
  if(introOrbit){
    yaw += dt * .16;
    pitch = .78;
    avatar.group.position.lerp(new THREE.Vector3(0,0,3.5), .04);
  }
  const radius = introOrbit ? 16.5 : 8.4;
  const height = introOrbit ? 11.2 : 5.6 + pitch * 3.6;
  const desired = new THREE.Vector3(
    avatar.group.position.x - Math.sin(yaw) * radius,
    height,
    avatar.group.position.z - Math.cos(yaw) * radius
  );
  camera.position.lerp(desired, 1 - Math.pow(.001, dt));
  camera.lookAt(avatar.group.position.x, 1.45, avatar.group.position.z);
}

function updatePortals(t){
  let nearest = null;
  let nearestD = Infinity;
  portals.forEach((p, i)=>{
    const world = new THREE.Vector3();
    p.group.getWorldPosition(world);
    const d = world.distanceTo(avatar.group.position);
    if(d < nearestD){ nearestD = d; nearest = p; }
    const active = d < 5.2 || p === hoveredPortal || p === focusedPortal;
    p.disc.material.opacity = active ? .46 : .22;
    p.marker.rotation.y += .008 + i*.0002;
    p.marker.position.y = (p.marker.userData.baseY ?? 3.72) + Math.sin(t*1.8+i)*.14;
    if(p.motif){
      p.motif.position.y = .72 + Math.sin(t*1.35+i)*.055;
      p.motif.rotation.y = Math.sin(t*.72+i)*.08;
      if(p.game.id === 'nebula' || p.game.id === 'rotate-array' || p.game.id === 'hex-speed'){
        p.motif.rotation.y += t*.18;
      }
    }
  });
  if(nearest && nearestD < 4.2){
    if(focusedPortal !== nearest) focusPortal(nearest);
  }else if(!hoveredPortal && focusedPortal && nearestD > 6.2){
    focusedPortal = null;
    document.getElementById('portalInfo').classList.remove('show');
    document.getElementById('enterHint').classList.remove('show');
  }
}

function renderLoop(now=performance.now()){
  requestAnimationFrame(renderLoop);
  if(activeGame){
    last = now;
    return;
  }
  if(MOBILE_FRAME_MS && renderLoop._lastFrame && now - renderLoop._lastFrame < MOBILE_FRAME_MS) return;
  renderLoop._lastFrame = now;
  const dt = Math.min(.05, (now-last)/1000);
  last = now;
  updateMovement(dt);
  updateAvatarAnimation(avatarMoving, dt, now/1000);
  updatePortals(now/1000);
  Object.values(crystals).forEach((c,i)=>{
    c.rotation.y += dt * (1.2 + i*.08);
    const baseY = c.userData.floatBaseY ?? c.position.y;
    const amp = c.userData.floatAmp ?? .12;
    c.position.y = baseY + Math.sin(now/650+i)*amp;
  });
  wisdomTreeParts.forEach((part,i)=>{
    const kind = part.userData.kind;
    if(kind === 'crown'){
      part.position.y = part.userData.floatBaseY + Math.sin(now/1150+i)*part.userData.floatAmp;
      part.rotation.y += dt * (.035 + i*.003);
    }else if(kind === 'fruit' || kind === 'fruitHalo'){
      part.position.y = part.userData.floatBaseY + Math.sin(now/520+i)*part.userData.floatAmp;
      part.rotation.y += dt * 1.25;
      part.rotation.z += dt * .35;
    }else if(kind === 'leaf' || kind === 'fallbackLeaf' || kind === 'fallbackCrown'){
      part.position.y = part.userData.floatBaseY + Math.sin(now/620+i)*part.userData.floatAmp;
      part.rotation.x += dt * .18;
      part.rotation.y += dt * .28;
    }else if(kind === 'spark'){
      part.position.y = part.userData.floatBaseY + Math.sin(now/520+i)*part.userData.floatAmp;
      part.rotation.x += dt * .6;
      part.rotation.y += dt * 1.2;
    }else if(kind === 'halo' || kind === 'ring'){
      part.rotation.z += dt * (kind === 'halo' ? .34 : .16);
    }
  });
  renderer.render(scene,camera);
}
</script>
<script id="touchGuardScript">
(function(){
  const allowText = 'input, textarea, [contenteditable="true"]';
  const isAllowed = target => {
    const el = target && target.nodeType === 1 ? target : target && target.parentElement;
    return !!(el && el.closest && el.closest(allowText));
  };
  ['selectstart','dragstart','contextmenu'].forEach(type => {
    document.addEventListener(type, event => {
      if(!isAllowed(event.target)) event.preventDefault();
    }, {passive:false});
  });
})();
</script>
